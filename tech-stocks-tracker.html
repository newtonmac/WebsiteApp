<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Stocks Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1d28, #252836);
            padding: 24px 32px;
            border-bottom: 1px solid #2d3040;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            background: #252836;
            border: 1px solid #2d3040;
            border-radius: 10px;
            color: #8b8fa3;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .back-btn:hover { background: #2d3040; color: #e1e4e8; }

        .header-text h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-text p {
            color: #8b8fa3;
            margin-top: 4px;
            font-size: 14px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            align-items: center;
        }

        .btn-group {
            display: flex;
            background: #1a1d28;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2d3040;
        }

        .btn-group button {
            padding: 10px 16px;
            background: transparent;
            color: #8b8fa3;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-group button.active {
            background: #3b82f6;
            color: white;
        }

        .btn-group button:hover:not(.active) {
            color: #e1e4e8;
            background: #252836;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: #1a1d28;
            color: #8b8fa3;
            border: 1px solid #2d3040;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            margin-left: auto;
        }

        .refresh-btn:hover {
            background: #252836;
            color: #e1e4e8;
        }

        .stock-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .stock-tab {
            padding: 8px 16px;
            background: #1a1d28;
            border: 1px solid #2d3040;
            border-radius: 10px;
            color: #8b8fa3;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .stock-tab:hover { background: #252836; color: #e1e4e8; }

        .stock-tab.active {
            background: var(--tab-color, #3b82f6);
            border-color: var(--tab-color, #3b82f6);
            color: white;
        }

        .price-hero {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 24px;
            padding: 24px;
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            flex-wrap: wrap;
        }

        .price-hero .stock-label {
            font-size: 16px;
            color: #8b8fa3;
        }

        .price-hero .current-price {
            font-size: 48px;
            font-weight: 700;
        }

        .price-hero .price-change {
            font-size: 18px;
            font-weight: 600;
        }

        .price-hero .price-change.up { color: #34d399; }
        .price-hero .price-change.down { color: #f87171; }

        .chart-container {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
            position: relative;
            height: 350px;
            margin-bottom: 24px;
        }

        .chart-container canvas {
            max-height: 400px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 13px;
            color: #8b8fa3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-card .value.green { color: #34d399; }
        .stat-card .value.red { color: #f87171; }
        .stat-card .value.blue { color: #60a5fa; }
        .stat-card .value.purple { color: #a78bfa; }
        .stat-card .value.amber { color: #fbbf24; }

        .recent-table {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
        }

        .recent-table h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        .recent-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .recent-table th {
            text-align: left;
            padding: 10px 12px;
            color: #8b8fa3;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2d3040;
        }

        .recent-table td {
            padding: 12px;
            border-bottom: 1px solid #1e2130;
            font-size: 14px;
        }

        .recent-table tr:last-child td {
            border-bottom: none;
        }

        .data-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 20px;
            background: #1a1d28;
            border-radius: 12px;
            border: 1px solid #2d3040;
            margin-bottom: 24px;
            font-size: 13px;
            color: #8b8fa3;
        }

        .data-status .source-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #6d28d920;
            color: #c084fc;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #8b8fa3;
            font-size: 16px;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2d3040;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: #1a1d28;
            border: 1px solid #f8717133;
            color: #f87171;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        /* Overview cards grid */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .overview-card {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .overview-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        .overview-card .ticker {
            font-size: 14px;
            font-weight: 700;
            color: #8b8fa3;
            margin-bottom: 4px;
        }

        .overview-card .company {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 10px;
        }

        .overview-card .ov-price {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .overview-card .ov-change {
            font-size: 14px;
            font-weight: 600;
        }

        .overview-card .ov-change.up { color: #34d399; }
        .overview-card .ov-change.down { color: #f87171; }

        .signal-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #2d3040;
        }

        .signal-call {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            font-weight: 700;
        }

        .signal-call.up { color: #34d399; }
        .signal-call.down { color: #f87171; }

        .signal-call .arrow {
            font-size: 16px;
        }

        .signal-pct {
            font-size: 11px;
            font-weight: 600;
            margin-left: auto;
            padding: 2px 8px;
            border-radius: 6px;
        }

        .signal-pct.up { background: #34d39915; color: #34d399; }
        .signal-pct.down { background: #f8717115; color: #f87171; }

        .signal-disclaimer {
            font-size: 10px;
            color: #4b5060;
            text-align: center;
            margin-top: -12px;
            margin-bottom: 16px;
        }

        @media (max-width: 600px) {
            .header { padding: 16px; }
            .header-text h1 { font-size: 22px; }
            .container { padding: 16px; }
            .controls { gap: 8px; }
            .btn-group button { padding: 8px 12px; font-size: 12px; }
            .price-hero .current-price { font-size: 36px; }
            .overview-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .overview-card { padding: 14px; }
            .overview-card .ov-price { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">&#8592;</a>
        <div class="header-text">
            <h1>Tech Stocks Tracker</h1>
            <p>Live data &bull; Intraday &amp; historical &bull; Major tech companies</p>
        </div>
    </div>

    <div class="container">
        <div class="controls">
            <div class="stock-tabs" id="stockTabs">
                <button class="stock-tab active" data-symbol="NVDA" style="--tab-color: #76b900;">NVDA</button>
                <button class="stock-tab" data-symbol="MSFT" style="--tab-color: #00a4ef;">MSFT</button>
                <button class="stock-tab" data-symbol="AAPL" style="--tab-color: #a2aaad;">AAPL</button>
                <button class="stock-tab" data-symbol="GOOGL" style="--tab-color: #4285f4;">GOOGL</button>
                <button class="stock-tab" data-symbol="AMZN" style="--tab-color: #ff9900;">AMZN</button>
                <button class="stock-tab" data-symbol="META" style="--tab-color: #0668e1;">META</button>
                <button class="stock-tab" data-symbol="TSLA" style="--tab-color: #cc0000;">TSLA</button>
                <button class="stock-tab" data-symbol="AVGO" style="--tab-color: #cc092f;">AVGO</button>
                <button class="stock-tab" data-symbol="TSM" style="--tab-color: #e30613;">TSM</button>
                <button class="stock-tab" data-symbol="AMD" style="--tab-color: #ed1c24;">AMD</button>
            </div>
        </div>

        <div class="controls">
            <div class="btn-group" id="timeRange">
                <button class="active" data-range="1d" data-interval="5m">1D</button>
                <button data-range="5d" data-interval="15m">5D</button>
                <button data-range="1mo" data-interval="1h">1M</button>
                <button data-range="3mo" data-interval="1d">3M</button>
                <button data-range="6mo" data-interval="1d">6M</button>
                <button data-range="ytd" data-interval="1d">YTD</button>
                <button data-range="1y" data-interval="1d">1Y</button>
            </div>
            <button class="refresh-btn" id="refreshBtn">&#x21bb; Refresh</button>
        </div>

        <!-- Overview cards for all stocks -->
        <div class="overview-grid" id="overviewGrid"></div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Loading tech stock data...
            </div>
        </div>
    </div>

    <script>
        const STOCKS = {
            NVDA:  { name: 'NVIDIA Corp.',     color: '#76b900' },
            MSFT:  { name: 'Microsoft Corp.',  color: '#00a4ef' },
            AAPL:  { name: 'Apple Inc.',       color: '#a2aaad' },
            GOOGL: { name: 'Alphabet Inc.',    color: '#4285f4' },
            AMZN:  { name: 'Amazon.com Inc.',  color: '#ff9900' },
            META:  { name: 'Meta Platforms',   color: '#0668e1' },
            TSLA:  { name: 'Tesla Inc.',       color: '#cc0000' },
            AVGO:  { name: 'Broadcom Inc.',    color: '#cc092f' },
            TSM:   { name: 'Taiwan Semi.',     color: '#e30613' },
            AMD:   { name: 'AMD Inc.',         color: '#ed1c24' }
        };

        const TWELVE_DATA_KEY = '52f351e2d67042889eb1c6d16cd9769f';
        const AV_KEYS = ['demo', 'X86NOH6II01P7R24'];
        const FETCH_TIMEOUT_MS = 10000;
        const CACHE_TTL_MS = 60000;

        const CORS_PROXIES = [
            url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
            url => 'https://corsproxy.io/?' + encodeURIComponent(url)
        ];

        const TWELVE_DATA_MAP = {
            '1d':  { interval: '5min',  outputsize: 78 },
            '5d':  { interval: '15min', outputsize: 130 },
            '1mo': { interval: '1h',    outputsize: 160 },
            '3mo': { interval: '1day',  outputsize: 63 },
            '6mo': { interval: '1day',  outputsize: 126 },
            'ytd': { interval: '1day',  outputsize: 365 },
            '1y':  { interval: '1day',  outputsize: 252 }
        };

        const YAHOO_INTERVAL_MAP = {
            '1d': '5m', '5d': '15m', '1mo': '1h',
            '3mo': '1d', '6mo': '1d', 'ytd': '1d', '1y': '1d'
        };

        const RANGE_LABELS = {
            '1d': '1 Day', '5d': '5 Days', '1mo': '1 Month', '3mo': '3 Months',
            '6mo': '6 Months', 'ytd': 'Year to Date', '1y': '1 Year'
        };

        const RANGE_DAYS = { '1d': 1, '5d': 5, '1mo': 30, '3mo': 90, '6mo': 180, '1y': 365 };

        let selectedSymbol = 'NVDA';
        let selectedRange = '1d';
        let chart = null;
        let lastUpdated = null;
        let activeSource = '';
        let avKeyIndex = 0;

        // TTL-based cache: stores { data, timestamp }
        const stockCache = new Map();

        function getCached(key) {
            const entry = stockCache.get(key);
            if (entry && (Date.now() - entry.timestamp) < CACHE_TTL_MS) return entry.data;
            if (entry) stockCache.delete(key);
            return null;
        }

        function setCache(key, data) {
            stockCache.set(key, { data, timestamp: Date.now() });
        }

        // AbortController to cancel stale fetches on rapid navigation
        let currentFetchController = null;
        let overviewFetchController = null;

        function fetchWithTimeout(url, signal) {
            const timeout = AbortController.abort
                ? AbortSignal.timeout(FETCH_TIMEOUT_MS)
                : null;
            const signals = [signal, timeout].filter(Boolean);
            const combined = signals.length > 1
                ? AbortSignal.any(signals)
                : signals[0] || undefined;
            return fetch(url, { signal: combined });
        }

        // ── Helpers ──
        function safeMinMax(arr) {
            let min = Infinity, max = -Infinity;
            for (const v of arr) {
                if (v < min) min = v;
                if (v > max) max = v;
            }
            return { min, max };
        }

        function getCutoffStr(range) {
            if (range === 'ytd') {
                return new Date(new Date().getFullYear(), 0, 1).toISOString().slice(0, 10);
            }
            const d = new Date();
            d.setDate(d.getDate() - (RANGE_DAYS[range] || 30));
            return d.toISOString().slice(0, 10);
        }

        function normalizeDate(dateStr) {
            return dateStr.includes(' ')
                ? dateStr.replace(' ', 'T')
                : dateStr.includes('T') ? dateStr : dateStr + 'T00:00:00';
        }

        // Stock tab clicks
        document.getElementById('stockTabs').addEventListener('click', e => {
            const btn = e.target.closest('.stock-tab');
            if (!btn) return;
            document.querySelectorAll('.stock-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedSymbol = btn.dataset.symbol;
            fetchAndRender();
        });

        // Time range clicks
        document.getElementById('timeRange').addEventListener('click', e => {
            const btn = e.target.closest('button');
            if (!btn || !btn.dataset.range) return;
            document.querySelectorAll('#timeRange button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedRange = btn.dataset.range;
            fetchAndRender();
        });

        document.getElementById('refreshBtn').addEventListener('click', () => {
            stockCache.clear();
            fetchAndRender();
            fetchOverview();
        });

        // ── Source 1: Yahoo Finance (via CORS proxies) ──
        function parseYahooResponse(json) {
            if (!json.chart?.result?.[0]) return null;

            const result = json.chart.result[0];
            const meta = result.meta || {};
            const timestamps = result.timestamp || [];
            const quote = result.indicators.quote[0] || {};

            const prices = timestamps.reduce((acc, ts, i) => {
                const close = quote.close?.[i];
                if (close != null && !isNaN(close) && close > 0) {
                    acc.push({
                        date: new Date(ts * 1000).toISOString().replace('Z', '').slice(0, 19),
                        price: close,
                        open: quote.open?.[i],
                        high: quote.high?.[i],
                        low: quote.low?.[i],
                        volume: quote.volume?.[i]
                    });
                }
                return acc;
            }, []);

            if (prices.length === 0) return null;

            return {
                prices,
                meta: {
                    previousClose: meta.chartPreviousClose || meta.previousClose,
                    regularMarketPrice: meta.regularMarketPrice
                },
                source: 'Yahoo Finance'
            };
        }

        async function fetchYahoo(symbol, range, signal) {
            const interval = YAHOO_INTERVAL_MAP[range] || '1d';
            const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?range=${range}&interval=${interval}`;

            for (const proxyFn of CORS_PROXIES) {
                try {
                    const resp = await fetchWithTimeout(proxyFn(targetUrl), signal);
                    if (!resp.ok) continue;
                    const data = parseYahooResponse(await resp.json());
                    if (data) return data;
                } catch (e) {
                    if (e.name === 'AbortError') throw e;
                    console.warn(`Yahoo proxy failed for ${symbol}:`, e.message);
                }
            }
            return null;
        }

        // ── Source 2: Twelve Data API ──
        async function fetchTwelveData(symbol, range, signal) {
            const config = TWELVE_DATA_MAP[range];
            if (!config) return null;

            try {
                const url = `https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(symbol)}&interval=${config.interval}&outputsize=${config.outputsize}&apikey=${TWELVE_DATA_KEY}`;
                const resp = await fetchWithTimeout(url, signal);
                if (!resp.ok) return null;
                const json = await resp.json();

                if (json.status === 'error') {
                    console.warn('TwelveData error:', json.message);
                    return null;
                }

                if (!json.values?.length) return null;

                const cutoff = range === 'ytd' ? getCutoffStr('ytd') : null;
                const prices = json.values
                    .reduce((acc, d) => {
                        if (!d.close || d.close === 'null') return acc;
                        const price = parseFloat(d.close);
                        if (isNaN(price) || price <= 0) return acc;
                        const date = normalizeDate(d.datetime);
                        if (cutoff && date.slice(0, 10) < cutoff) return acc;
                        acc.push({
                            date,
                            price,
                            open: parseFloat(d.open),
                            high: parseFloat(d.high),
                            low: parseFloat(d.low),
                            volume: parseInt(d.volume) || 0
                        });
                        return acc;
                    }, [])
                    .sort((a, b) => a.date.localeCompare(b.date));

                if (prices.length === 0) return null;

                return {
                    prices,
                    meta: { previousClose: prices[0].price },
                    source: 'Twelve Data'
                };
            } catch (e) {
                if (e.name === 'AbortError') throw e;
                console.warn(`TwelveData failed for ${symbol}:`, e.message);
            }
            return null;
        }

        // ── Source 3: Alpha Vantage ──
        async function fetchAlphaVantage(symbol, range, signal) {
            const isIntraday = ['1d', '5d', '1mo'].includes(range);
            const avIntervalMap = { '1d': '5min', '5d': '15min', '1mo': '60min' };
            const outputSize = range === '1d' ? 'compact' : 'full';

            for (let attempt = 0; attempt < AV_KEYS.length; attempt++) {
                const key = AV_KEYS[(avKeyIndex + attempt) % AV_KEYS.length];
                try {
                    const fn = isIntraday ? 'TIME_SERIES_INTRADAY' : 'TIME_SERIES_DAILY';
                    const intervalParam = isIntraday ? `&interval=${avIntervalMap[range]}` : '';
                    const url = `https://www.alphavantage.co/query?function=${fn}&symbol=${encodeURIComponent(symbol)}${intervalParam}&outputsize=${outputSize}&apikey=${key}`;

                    const resp = await fetchWithTimeout(url, signal);
                    if (!resp.ok) continue;
                    const json = await resp.json();

                    if (json['Note'] || json['Information'] || json['Error Message']) {
                        console.warn('AlphaVantage limit/error:', json['Note'] || json['Information'] || json['Error Message']);
                        continue;
                    }

                    const tsKey = Object.keys(json).find(k => k.startsWith('Time Series'));
                    if (!tsKey || !json[tsKey]) continue;

                    const cutoffStr = getCutoffStr(range);
                    const prices = Object.entries(json[tsKey])
                        .reduce((acc, [dateStr, vals]) => {
                            const price = parseFloat(vals['4. close']);
                            if (isNaN(price) || price <= 0) return acc;
                            const date = normalizeDate(dateStr);
                            if (date.slice(0, 10) < cutoffStr) return acc;
                            acc.push({
                                date,
                                price,
                                open: parseFloat(vals['1. open']),
                                high: parseFloat(vals['2. high']),
                                low: parseFloat(vals['3. low']),
                                volume: parseInt(vals['5. volume']) || 0
                            });
                            return acc;
                        }, [])
                        .sort((a, b) => a.date.localeCompare(b.date));

                    if (prices.length > 0) {
                        avKeyIndex = (avKeyIndex + attempt) % AV_KEYS.length;
                        return {
                            prices,
                            meta: { previousClose: prices[0].price },
                            source: 'Alpha Vantage'
                        };
                    }
                } catch (e) {
                    if (e.name === 'AbortError') throw e;
                    console.warn(`AlphaVantage failed for ${symbol}:`, e.message);
                }
            }
            return null;
        }

        // ── Multi-source fetch with fallback ──
        async function fetchStock(symbol, range, signal) {
            const cacheKey = `${symbol}_${range}`;
            const cached = getCached(cacheKey);
            if (cached) return cached;

            const [yahooResult, twelveResult, avResult] = await Promise.allSettled([
                fetchYahoo(symbol, range, signal),
                fetchTwelveData(symbol, range, signal),
                fetchAlphaVantage(symbol, range, signal)
            ]);

            const yahoo = yahooResult.status === 'fulfilled' ? yahooResult.value : null;
            const twelve = twelveResult.status === 'fulfilled' ? twelveResult.value : null;
            const av = avResult.status === 'fulfilled' ? avResult.value : null;

            const data = yahoo || twelve || av;

            if (data) {
                setCache(cacheKey, data);
                return data;
            }

            return { prices: [], meta: {}, source: 'none' };
        }

        // ── Tomorrow's Call: UP or DOWN ──
        // Analyzes last month of daily data and commits to a prediction
        function computeSignal(dailyPrices) {
            if (!dailyPrices || dailyPrices.length < 20) return null;

            const closes = dailyPrices.map(p => p.price);
            const volumes = dailyPrices.map(p => p.volume || 0);
            const n = closes.length;

            // 1. SMA-5 vs SMA-20 trend direction
            const sma5 = closes.slice(-5).reduce((s, v) => s + v, 0) / 5;
            const sma20 = closes.slice(-20).reduce((s, v) => s + v, 0) / 20;
            const sma5Prev = closes.slice(-6, -1).reduce((s, v) => s + v, 0) / 5;
            const smaScore = sma5 > sma20 ? 1 : -1;
            // Fresh crossover is a strong signal
            const crossover = (sma5 > sma20 && sma5Prev <= sma20) ? 1
                : (sma5 < sma20 && sma5Prev >= sma20) ? -1 : 0;

            // 2. RSI (14-period) — mean reversion + trend
            let gains = 0, losses = 0;
            const rsiPeriod = Math.min(14, n - 1);
            for (let i = n - rsiPeriod; i < n; i++) {
                const diff = closes[i] - closes[i - 1];
                if (diff > 0) gains += diff;
                else losses -= diff;
            }
            const rs = losses === 0 ? 100 : (gains / rsiPeriod) / (losses / rsiPeriod);
            const rsi = 100 - (100 / (1 + rs));
            // Overbought (>70) → likely down; oversold (<30) → likely up; mid → trend-follow
            let rsiScore;
            if (rsi > 70) rsiScore = -1;
            else if (rsi > 60) rsiScore = 0.5;
            else if (rsi < 30) rsiScore = 1;
            else if (rsi < 40) rsiScore = -0.5;
            else rsiScore = rsi > 50 ? 0.3 : -0.3;

            // 3. 5-day momentum
            const mom5 = (closes[n - 1] - closes[Math.max(0, n - 6)]) / closes[Math.max(0, n - 6)] * 100;
            const momScore = mom5 > 2 ? 1 : mom5 > 0.5 ? 0.5 : mom5 < -2 ? -1 : mom5 < -0.5 ? -0.5 : 0;

            // 4. Last 3 days streak
            let streak = 0;
            for (let i = n - 1; i >= Math.max(1, n - 3); i--) {
                const dir = closes[i] > closes[i - 1] ? 1 : closes[i] < closes[i - 1] ? -1 : 0;
                if (i === n - 1) streak = dir;
                else if (dir !== streak) { streak = 0; break; }
            }

            // 5. Volume confirmation
            const vol5 = volumes.slice(-5).reduce((s, v) => s + v, 0) / 5;
            const vol20 = volumes.slice(-20).reduce((s, v) => s + v, 0) / 20;
            const volConfirm = vol5 > vol20 * 1.15;

            // 6. Price vs SMA-20 (support/resistance)
            const priceVsSma = (closes[n - 1] - sma20) / sma20;
            const supportScore = priceVsSma > 0.02 ? 0.5 : priceVsSma < -0.02 ? -0.5 : 0;

            // Weighted composite — forced to pick a side
            let raw = (smaScore * 0.20)
                + (rsiScore * 0.20)
                + (momScore * 0.25)
                + (streak * 0.10)
                + (crossover * 0.10)
                + (supportScore * 0.15);

            // Volume boost when it confirms the direction
            if (volConfirm && Math.sign(raw) === Math.sign(mom5)) {
                raw += 0.08 * Math.sign(raw);
            }

            // Force a call — no neutral. If score is near zero, lean toward momentum
            if (Math.abs(raw) < 0.05) {
                raw = mom5 >= 0 ? 0.1 : -0.1;
            }

            const call = raw > 0 ? 'UP' : 'DOWN';
            const clampedAbs = Math.min(Math.abs(raw), 1);
            // Map score to confidence: 50% (coin flip) to 85% (very strong)
            const confidence = Math.round(50 + clampedAbs * 35);

            return { call, confidence, rsi: rsi.toFixed(0), mom: mom5.toFixed(1) };
        }

        async function fetchOverview() {
            if (overviewFetchController) overviewFetchController.abort();
            overviewFetchController = new AbortController();
            const signal = overviewFetchController.signal;

            try {
                // Fetch both 1D (for price display) and 1M daily (for signal analysis)
                const results = await Promise.allSettled(
                    Object.keys(STOCKS).map(async sym => {
                        const [dayData, monthData] = await Promise.all([
                            fetchStock(sym, '1d', signal),
                            fetchStock(sym, '1mo', signal)
                        ]);
                        return { symbol: sym, dayData, monthData };
                    })
                );

                if (signal.aborted) return;

                const grid = document.getElementById('overviewGrid');
                grid.innerHTML = '';

                results.forEach(r => {
                    if (r.status !== 'fulfilled') return;
                    const { symbol, dayData, monthData } = r.value;
                    if (!dayData?.prices?.length) return;

                    const latest = dayData.prices[dayData.prices.length - 1];
                    const prevClose = dayData.meta?.previousClose || dayData.prices[0].price;
                    const change = latest.price - prevClose;
                    const pct = (change / prevClose) * 100;
                    const isUp = change >= 0;
                    const stock = STOCKS[symbol];

                    // Tomorrow's call
                    const sig = computeSignal(monthData?.prices);
                    const isCallUp = sig?.call === 'UP';
                    const callClass = isCallUp ? 'up' : 'down';
                    const sigHtml = sig
                        ? `<div class="signal-row">
                            <span class="signal-call ${callClass}">
                                <span class="arrow">${isCallUp ? '&#9650;' : '&#9660;'}</span>
                                Tomorrow: ${sig.call}
                            </span>
                            <span class="signal-pct ${callClass}">${sig.confidence}%</span>
                           </div>`
                        : '';

                    const card = document.createElement('div');
                    card.className = 'overview-card';
                    card.innerHTML = `
                        <div class="ticker" style="color: ${stock.color};">${symbol}</div>
                        <div class="company">${stock.name}</div>
                        <div class="ov-price">$${latest.price.toFixed(2)}</div>
                        <div class="ov-change ${isUp ? 'up' : 'down'}">
                            ${isUp ? '&#9650;' : '&#9660;'}
                            ${change >= 0 ? '+' : ''}${change.toFixed(2)}
                            (${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%)
                        </div>
                        ${sigHtml}
                    `;
                    card.addEventListener('click', () => {
                        document.querySelectorAll('.stock-tab').forEach(b => b.classList.remove('active'));
                        const tab = document.querySelector(`.stock-tab[data-symbol="${symbol}"]`);
                        if (tab) tab.classList.add('active');
                        selectedSymbol = symbol;
                        fetchAndRender();
                    });
                    grid.appendChild(card);
                });

                // Add disclaimer below the grid
                let disc = document.getElementById('signalDisclaimer');
                if (!disc) {
                    disc = document.createElement('div');
                    disc.id = 'signalDisclaimer';
                    disc.className = 'signal-disclaimer';
                    grid.parentNode.insertBefore(disc, grid.nextSibling);
                }
                disc.textContent = 'Tomorrow calls based on SMA, RSI & momentum analysis — for fun, not financial advice.';
            } catch (e) {
                if (e.name === 'AbortError') return;
                console.warn('Overview fetch failed:', e.message);
            }
        }

        async function fetchAndRender() {
            if (currentFetchController) currentFetchController.abort();
            currentFetchController = new AbortController();
            const signal = currentFetchController.signal;

            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading ${selectedSymbol} data...
                </div>`;

            try {
                const data = await fetchStock(selectedSymbol, selectedRange, signal);

                if (signal.aborted) return;

                lastUpdated = new Date();
                activeSource = data.source || 'unknown';

                if (!data.prices?.length) {
                    document.getElementById('content').innerHTML = `
                        <div class="error-msg">
                            No data available for ${selectedSymbol} from any source (Yahoo Finance, Twelve Data, Alpha Vantage).
                            All APIs may be rate-limited. Try refreshing in a minute.
                        </div>`;
                    return;
                }

                render(data);
            } catch (e) {
                if (e.name === 'AbortError') return;
                document.getElementById('content').innerHTML = `
                    <div class="error-msg">Error fetching data: ${e.message}</div>`;
            }
        }

        function formatPrice(val) {
            return '$' + val.toFixed(2);
        }

        function render(data) {
            const { prices, meta } = data;
            const stock = STOCKS[selectedSymbol];
            const latest = prices[prices.length - 1];
            const first = prices[0];
            const prevClose = meta.previousClose || first.price;

            // For intraday (1D), change is vs previous close; otherwise vs first price in range
            const isIntraday = selectedRange === '1d';
            const refPrice = isIntraday ? prevClose : first.price;
            const change = latest.price - refPrice;
            const pctChange = (change / refPrice) * 100;
            const isUp = change >= 0;

            const allPrices = prices.map(p => p.price);
            const { min: low, max: high } = safeMinMax(allPrices);
            const avg = allPrices.reduce((s, v) => s + v, 0) / allPrices.length;
            const totalVolume = prices.reduce((s, p) => s + (p.volume || 0), 0);
            const variance = allPrices.reduce((s, v) => s + (v - avg) ** 2, 0) / (allPrices.length - 1);
            const volatility = (Math.sqrt(variance) / avg) * 100;

            const updatedStr = lastUpdated ? lastUpdated.toLocaleString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: 'numeric', minute: '2-digit', hour12: true
            }) : '-';

            document.getElementById('content').innerHTML = `
                <div class="data-status">
                    <div>${selectedSymbol} &bull; ${RANGE_LABELS[selectedRange]} &bull; Updated: <strong>${updatedStr}</strong></div>
                    <div>Source: <span class="source-tag">${activeSource}</span></div>
                </div>

                <div class="price-hero">
                    <div>
                        <div class="stock-label" style="color: ${stock.color};">${selectedSymbol} &mdash; ${stock.name}</div>
                        <span class="current-price">${formatPrice(latest.price)}</span>
                    </div>
                    <div class="price-change ${isUp ? 'up' : 'down'}">
                        ${isUp ? '&#9650;' : '&#9660;'}
                        ${change >= 0 ? '+' : ''}${change.toFixed(2)}
                        (${pctChange >= 0 ? '+' : ''}${pctChange.toFixed(2)}%)
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="label">High</div>
                        <div class="value green">${formatPrice(high)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Low</div>
                        <div class="value red">${formatPrice(low)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Average</div>
                        <div class="value blue">${formatPrice(avg)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Volatility</div>
                        <div class="value purple">${volatility.toFixed(2)}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Period Change</div>
                        <div class="value ${change >= 0 ? 'green' : 'red'}">
                            ${change >= 0 ? '+' : ''}${change.toFixed(2)}
                            (${pctChange >= 0 ? '+' : ''}${pctChange.toFixed(2)}%)
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Volume</div>
                        <div class="value amber">${formatVolume(totalVolume)}</div>
                    </div>
                </div>

                <div class="recent-table">
                    <h3>Recent Prices</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>${isIntraday ? 'Time' : 'Date'}</th>
                                <th>Price</th>
                                <th>Change</th>
                                <th>Volume</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${prices.slice(-20).reverse().map((p, i, arr) => {
                                const next = i < arr.length - 1 ? arr[i + 1] : null;
                                const dc = next ? p.price - next.price : 0;
                                const dpct = next ? (dc / next.price) * 100 : 0;
                                const cls = dc >= 0 ? 'up' : 'down';
                                const dt = new Date(p.date);
                                let dateLabel;
                                if (isIntraday) {
                                    dateLabel = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                                } else if (selectedRange === '5d') {
                                    dateLabel = dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) + ' ' +
                                        dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                                } else {
                                    dateLabel = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                                }
                                return `<tr>
                                    <td>${dateLabel}</td>
                                    <td><strong>${formatPrice(p.price)}</strong></td>
                                    <td class="price-change ${cls}">
                                        ${dc >= 0 ? '+' : ''}${dc.toFixed(2)}
                                        (${dpct >= 0 ? '+' : ''}${dpct.toFixed(2)}%)
                                    </td>
                                    <td>${p.volume ? formatVolume(p.volume) : '-'}</td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            renderChart(prices, stock.color);
        }

        function formatVolume(vol) {
            if (vol >= 1e9) return (vol / 1e9).toFixed(2) + 'B';
            if (vol >= 1e6) return (vol / 1e6).toFixed(2) + 'M';
            if (vol >= 1e3) return (vol / 1e3).toFixed(1) + 'K';
            return vol.toLocaleString();
        }

        function renderChart(prices, color) {
            const ctx = document.getElementById('priceChart').getContext('2d');

            if (chart) chart.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, color + '40');
            gradient.addColorStop(1, color + '05');

            const timeConfig = (() => {
                if (selectedRange === '1d') {
                    return {
                        parser: "yyyy-MM-dd'T'HH:mm:ss",
                        tooltipFormat: 'h:mm a',
                        unit: 'hour',
                        displayFormats: { hour: 'h:mm a', minute: 'h:mm a' }
                    };
                }
                if (selectedRange === '5d') {
                    return {
                        parser: "yyyy-MM-dd'T'HH:mm:ss",
                        tooltipFormat: 'MMM d, h:mm a',
                        unit: 'day',
                        displayFormats: { day: 'MMM d', hour: 'MMM d ha' }
                    };
                }
                if (selectedRange === '1mo') {
                    return {
                        parser: "yyyy-MM-dd'T'HH:mm:ss",
                        tooltipFormat: 'MMM d, yyyy h:mm a',
                        displayFormats: { day: 'MMM d', week: 'MMM d', month: 'MMM yyyy' }
                    };
                }
                return {
                    parser: "yyyy-MM-dd'T'HH:mm:ss",
                    tooltipFormat: 'MMM d, yyyy',
                    displayFormats: { day: 'MMM d', week: 'MMM d', month: 'MMM yyyy' }
                };
            })();

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: prices.map(p => p.date),
                    datasets: [{
                        label: 'Price (USD)',
                        data: prices.map(p => p.price),
                        borderColor: color,
                        backgroundColor: gradient,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHitRadius: 10,
                        pointHoverRadius: 5,
                        pointHoverBackgroundColor: color
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#252836',
                            titleColor: '#e1e4e8',
                            bodyColor: '#e1e4e8',
                            borderColor: '#2d3040',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: ctx => formatPrice(ctx.parsed.y)
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: timeConfig,
                            grid: {
                                color: '#2d304040',
                                drawBorder: false
                            },
                            ticks: { color: '#8b8fa3', maxTicksLimit: 8 }
                        },
                        y: {
                            grid: {
                                color: '#2d304040',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#8b8fa3',
                                callback: v => '$' + v.toLocaleString('en-US')
                            }
                        }
                    }
                }
            });
        }

        // Initial load
        fetchOverview();
        fetchAndRender();

        // Auto-refresh every 60 seconds (stale cache entries expire via TTL)
        setInterval(() => {
            fetchOverview();
            fetchAndRender();
        }, 60000);
    </script>
</body>
</html>
