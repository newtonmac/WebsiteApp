        // ══════════════════════════════════════════
        // ── Enhanced Signal: BUY, HOLD, or SELL ──
        // Uses 24 weighted indicators + market context + news
        // ══════════════════════════════════════════

        function computeSignal(dailyPrices, ctx = {}, newsSentiment = null) {
            if (!dailyPrices || dailyPrices.length < 20) return null;

            const closes = dailyPrices.map(p => p.price);
            const volumes = dailyPrices.map(p => p.volume || 0);
            const n = closes.length;
            const reasons = [];
            const details = [];

            // ── 1. SMA-5 vs SMA-20 trend ──
            const sma5 = closes.slice(-5).reduce((s, v) => s + v, 0) / 5;
            const sma20 = closes.slice(-20).reduce((s, v) => s + v, 0) / 20;
            const sma5Prev = closes.slice(-6, -1).reduce((s, v) => s + v, 0) / 5;
            const smaScore = sma5 > sma20 ? 1 : -1;
            const crossover = (sma5 > sma20 && sma5Prev <= sma20) ? 1
                : (sma5 < sma20 && sma5Prev >= sma20) ? -1 : 0;
            if (crossover === 1) reasons.push('Golden cross');
            else if (crossover === -1) reasons.push('Death cross');

            // ── 2. RSI (14-period, Wilder's smoothed) ──
            const rsi = calcRSI(closes);
            let rsiScore;
            if (rsi > 75) { rsiScore = -1.2; reasons.push('RSI ' + rsi.toFixed(0) + ' overbought'); }
            else if (rsi > 65) { rsiScore = 0.3; }
            else if (rsi < 25) { rsiScore = 1.2; reasons.push('RSI ' + rsi.toFixed(0) + ' oversold'); }
            else if (rsi < 35) { rsiScore = -0.3; }
            else { rsiScore = rsi > 50 ? 0.2 : -0.2; }
            details.push('RSI:' + rsi.toFixed(0));

            // ── 3. MACD ──
            const macd = calcMACD(closes);
            let macdScore = 0;
            if (macd) {
                if (macd.histogram > 0 && macd.prevHistogram <= 0) {
                    macdScore = 1.2; reasons.push('MACD bullish cross');
                } else if (macd.histogram < 0 && macd.prevHistogram >= 0) {
                    macdScore = -1.2; reasons.push('MACD bearish cross');
                } else if (macd.histogram > 0) {
                    macdScore = 0.5;
                } else {
                    macdScore = -0.5;
                }
                details.push('MACD:' + (macd.histogram > 0 ? '+' : '') + macd.histogram.toFixed(2));
            }

            // ── 4. Bollinger Bands ──
            const bb = calcBollingerBands(closes);
            let bbScore = 0;
            if (bb) {
                const price = closes[n - 1];
                if (price >= bb.upper) {
                    bbScore = -0.8; reasons.push('At upper Bollinger');
                } else if (price <= bb.lower) {
                    bbScore = 0.8; reasons.push('At lower Bollinger');
                } else if (bb.pctB > 0.8) {
                    bbScore = -0.3;
                } else if (bb.pctB < 0.2) {
                    bbScore = 0.3;
                }
                if (bb.bandwidth < 5) details.push('BB squeeze');
                details.push('BB%:' + (bb.pctB * 100).toFixed(0));
            }

            // ── 5. EMA-12/26 crossover (reuse MACD's EMA calc) ──
            let emaScore = 0;
            if (closes.length >= 26) {
                const ema12 = calcEMA(closes, 12);
                const ema26 = calcEMA(closes, 26);
                const curr12 = ema12[ema12.length - 1], curr26 = ema26[ema26.length - 1];
                const prev12 = ema12[ema12.length - 2], prev26 = ema26[ema26.length - 2];
                if (curr12 > curr26 && prev12 <= prev26) {
                    emaScore = 1.0; reasons.push('EMA bullish cross');
                } else if (curr12 < curr26 && prev12 >= prev26) {
                    emaScore = -1.0; reasons.push('EMA bearish cross');
                } else {
                    emaScore = curr12 > curr26 ? 0.3 : -0.3;
                }
            }

            // ── 6. ATR (volatility measure) ──
            const atr = calcATR(dailyPrices);
            const atrPct = atr ? (atr / closes[n - 1]) * 100 : 0;
            const highVolatility = atrPct > 3.5;
            if (highVolatility) details.push('ATR:' + atrPct.toFixed(1) + '%');

            // ── 7. VWAP ──
            const vwap = calcVWAP(dailyPrices.slice(-5));
            let vwapScore = 0;
            if (vwap) {
                const vwapDiff = (closes[n - 1] - vwap) / vwap * 100;
                vwapScore = vwapDiff > 1.5 ? 0.4 : vwapDiff < -1.5 ? -0.4 : 0;
                if (Math.abs(vwapDiff) > 1.5) details.push('VWAP:' + (vwapDiff > 0 ? 'above' : 'below'));
            }

            // ── 8. 5-day momentum ──
            const mom5 = (closes[n - 1] - closes[Math.max(0, n - 6)]) / closes[Math.max(0, n - 6)] * 100;
            const momScore = mom5 > 3 ? 1.2 : mom5 > 1 ? 0.6 : mom5 < -3 ? -1.2 : mom5 < -1 ? -0.6 : 0;
            if (Math.abs(mom5) > 1.5) reasons.push((mom5 > 0 ? '+' : '') + mom5.toFixed(1) + '% 5d');

            // ── 9. 3-day streak ──
            let streak = 0;
            for (let i = n - 1; i >= Math.max(1, n - 3); i--) {
                const dir = closes[i] > closes[i - 1] ? 1 : closes[i] < closes[i - 1] ? -1 : 0;
                if (i === n - 1) streak = dir;
                else if (dir !== streak) { streak = 0; break; }
            }

            // ── 10. Volume confirmation ──
            const vol5 = volumes.slice(-5).reduce((s, v) => s + v, 0) / 5;
            const vol20 = volumes.slice(-20).reduce((s, v) => s + v, 0) / 20;
            const volConfirm = vol5 > vol20 * 1.2;
            if (volConfirm) reasons.push('High volume');

            // ── 11. Price vs SMA-20 ──
            const priceVsSma = (closes[n - 1] - sma20) / sma20;
            const supportScore = priceVsSma > 0.03 ? 0.6 : priceVsSma < -0.03 ? -0.6 : 0;

            // ── 12. 20-day range position ──
            const high20 = Math.max(...closes.slice(-20));
            const low20 = Math.min(...closes.slice(-20));
            const range20 = high20 - low20;
            const posInRange = range20 > 0 ? (closes[n - 1] - low20) / range20 : 0.5;
            const rangeScore = posInRange > 0.85 ? -0.5 : posInRange < 0.15 ? 0.5 : 0;

            // ── 13. VIX (market fear) ──
            let vixScore = 0;
            if (ctx.vix != null) {
                if (ctx.vix > 35) { vixScore = -0.6; reasons.push('VIX ' + ctx.vix.toFixed(0) + ' high fear'); }
                else if (ctx.vix > 25) { vixScore = -0.3; }
                else if (ctx.vix < 14) { vixScore = 0.3; }
            }

            // ── 14. SPY correlation / market trend ──
            let spyScore = 0;
            if (ctx.spy?.closes?.length >= 6) {
                const spyMom = ctx.spy.mom5;
                if (spyMom > 2) spyScore = 0.4;
                else if (spyMom < -2) spyScore = -0.4;
                if (Math.sign(mom5) !== Math.sign(spyMom) && Math.abs(spyMom) > 1) {
                    if (mom5 > 0) details.push('Outperforming mkt');
                    else details.push('Underperforming mkt');
                }
            }

            // ── 15. Fear & Greed Index ──
            let fgScore = 0;
            if (ctx.fearGreed?.value != null) {
                const fg = ctx.fearGreed.value;
                if (fg <= 20) { fgScore = 0.5; reasons.push('Extreme fear (contrarian buy)'); }
                else if (fg <= 35) { fgScore = 0.2; }
                else if (fg >= 80) { fgScore = -0.5; reasons.push('Extreme greed (caution)'); }
                else if (fg >= 65) { fgScore = -0.2; }
            }

            // ── 16. News sentiment ──
            let newsScore = 0;
            if (newsSentiment) {
                newsScore = newsSentiment.score * 0.8;
                if (newsSentiment.score > 0.3) reasons.push('Positive news');
                else if (newsSentiment.score < -0.3) reasons.push('Negative news');
                if (newsSentiment.headline) details.push(newsSentiment.headline.slice(0, 40));
            }

            // ── 17. Stochastic Oscillator ──
            let stochScore = 0;
            const stoch = calcStochastic(closes);
            if (stoch) {
                if (stoch.k < 20 && stoch.d < 20) {
                    stochScore = 0.8;
                    if (stoch.prevK != null && stoch.k > stoch.d && stoch.prevK <= stoch.prevD) {
                        stochScore = 1.2; reasons.push('Stoch bullish cross');
                    }
                } else if (stoch.k > 80 && stoch.d > 80) {
                    stochScore = -0.8;
                    if (stoch.prevK != null && stoch.k < stoch.d && stoch.prevK >= stoch.prevD) {
                        stochScore = -1.2; reasons.push('Stoch bearish cross');
                    }
                } else {
                    stochScore = stoch.k > 50 ? 0.2 : -0.2;
                }
                details.push('Stoch:' + stoch.k.toFixed(0) + '/' + stoch.d.toFixed(0));
            }

            // ── 18. ADX (trend strength) ──
            let adxScore = 0;
            let strongTrend = false;
            const adxData = calcADX(dailyPrices);
            if (adxData) {
                strongTrend = adxData.adx > 25;
                const trendDir = adxData.plusDI > adxData.minusDI ? 1 : -1;
                if (adxData.adx > 40) {
                    adxScore = trendDir * 0.6; // Very strong trend — follow it
                    reasons.push('ADX ' + adxData.adx.toFixed(0) + ' strong ' + (trendDir > 0 ? 'up' : 'down') + ' trend');
                } else if (adxData.adx > 25) {
                    adxScore = trendDir * 0.3;
                } else {
                    // Weak/no trend — signals less reliable
                    adxScore = 0;
                    if (adxData.adx < 15) details.push('ADX:' + adxData.adx.toFixed(0) + ' choppy');
                }
            }

            // ── 19. OBV (On-Balance Volume divergence) ──
            let obvScore = 0;
            const obv = calcOBV(dailyPrices);
            if (obv) {
                if (obv.bullishDiv) {
                    obvScore = 0.7; reasons.push('OBV bullish divergence');
                } else if (obv.bearishDiv) {
                    obvScore = -0.7; reasons.push('OBV bearish divergence');
                } else {
                    obvScore = obv.trend * 0.2; // Confirms direction
                }
            }

            // ── 20. Williams %R ──
            let willRScore = 0;
            const willR = calcWilliamsR(closes);
            if (willR !== null) {
                if (willR > -20) { willRScore = -0.5; } // Overbought
                else if (willR < -80) { willRScore = 0.5; } // Oversold
                else { willRScore = willR > -50 ? -0.1 : 0.1; }
            }

            // ── 21. Ichimoku Cloud ──
            let ichimokuScore = 0;
            const ichi = calcIchimoku(dailyPrices);
            if (ichi) {
                if (ichi.aboveCloud) {
                    ichimokuScore = 0.5;
                    if (ichi.tkCross > 0) { ichimokuScore = 0.8; reasons.push('Ichimoku bullish'); }
                } else if (ichi.belowCloud) {
                    ichimokuScore = -0.5;
                    if (ichi.tkCross < 0) { ichimokuScore = -0.8; reasons.push('Ichimoku bearish'); }
                } else {
                    ichimokuScore = ichi.cloudBullish ? 0.1 : -0.1;
                    details.push('In Ichimoku cloud');
                }
            }

            // ── 22. XLK Sector Relative Strength ──
            let xlkScore = 0;
            if (ctx.xlk?.closes?.length >= 6) {
                const xlkMom = ctx.xlk.mom5;
                // Stock outperforming tech sector = bullish
                const relStrength = mom5 - xlkMom;
                if (relStrength > 2) { xlkScore = 0.4; details.push('Outperforming XLK'); }
                else if (relStrength < -2) { xlkScore = -0.4; details.push('Underperforming XLK'); }
                else { xlkScore = relStrength > 0 ? 0.1 : -0.1; }
            }

            // ── 23. 10-Year Treasury Yield ──
            let treasuryScore = 0;
            if (ctx.treasury10y) {
                const yld = ctx.treasury10y.yield;
                const yldChg = ctx.treasury10y.change;
                // Rising yields hurt growth/tech; falling yields help
                if (yldChg > 0.05) { treasuryScore = -0.4; }
                else if (yldChg < -0.05) { treasuryScore = 0.4; }
                if (yld > 4.5) { treasuryScore -= 0.2; details.push('10Y:' + yld.toFixed(2) + '% high'); }
                else if (yld < 3.5) { treasuryScore += 0.2; }
            }

            // ── 24. USD Index (DXY) ──
            let dxyScore = 0;
            if (ctx.dxy) {
                // Strong dollar hurts multinational tech earnings
                if (ctx.dxy.change > 0.5) { dxyScore = -0.3; details.push('USD strengthening'); }
                else if (ctx.dxy.change < -0.5) { dxyScore = 0.3; details.push('USD weakening'); }
                if (ctx.dxy.value > 106) { dxyScore -= 0.1; }
                else if (ctx.dxy.value < 100) { dxyScore += 0.1; }
            }

            // ══════════════════════════════════════════
            // Weighted composite — 24 factors
            // Weights sum to ~1.0
            // ══════════════════════════════════════════
            let raw = (smaScore * 0.05)
                + (rsiScore * 0.07)
                + (macdScore * 0.08)
                + (bbScore * 0.05)
                + (emaScore * 0.05)
                + (vwapScore * 0.03)
                + (momScore * 0.07)
                + (streak * 0.02)
                + (crossover * 0.04)
                + (supportScore * 0.03)
                + (rangeScore * 0.04)
                + (vixScore * 0.04)
                + (spyScore * 0.04)
                + (fgScore * 0.04)
                + (newsScore * 0.05)
                + (stochScore * 0.06)
                + (adxScore * 0.05)
                + (obvScore * 0.05)
                + (willRScore * 0.03)
                + (ichimokuScore * 0.05)
                + (xlkScore * 0.03)
                + (treasuryScore * 0.04)
                + (dxyScore * 0.03);

            // Volume boost when confirming direction
            if (volConfirm && Math.sign(raw) === Math.sign(mom5)) {
                raw += 0.06 * Math.sign(raw);
            }

            // ADX trend strength modifier: amplify in strong trends, dampen in choppy markets
            if (adxData) {
                if (adxData.adx > 30) raw *= 1.15; // Strong trend — more conviction
                else if (adxData.adx < 15) raw *= 0.75; // Choppy — less conviction
            }

            // ATR volatility dampener
            if (highVolatility) {
                raw *= 0.7;
            }

            // Three-way classification
            let call, confidence;
            const absRaw = Math.abs(raw);
            if (absRaw < 0.22) {
                call = 'HOLD';
                confidence = Math.round(55 + (1 - absRaw / 0.22) * 30);
                if (!reasons.length) reasons.push('Mixed signals');
            } else if (raw > 0) {
                call = 'BUY';
                confidence = Math.round(55 + Math.min((absRaw - 0.22) / 0.78, 1) * 30);
            } else {
                call = 'SELL';
                confidence = Math.round(55 + Math.min((absRaw - 0.22) / 0.78, 1) * 30);
            }

            const topReasons = reasons.slice(0, 3).join(' · ');
            const detailStr = details.slice(0, 5).join(' | ');

            return { call, confidence, reason: topReasons, detail: detailStr, rsi: rsi.toFixed(0), mom: mom5.toFixed(1) };
        }

        // ══════════════════════════════════════════
        // ── Overview with market context + news ──
        // ══════════════════════════════════════════

        const SIGNAL_REFRESH_MS = 20 * 60 * 1000; // 20 minutes

        function renderSkeletonCards(grid) {
            grid.innerHTML = '';
            for (const [symbol, stock] of Object.entries(STOCKS)) {
                const card = document.createElement('div');
                card.className = 'overview-card skeleton';
                card.dataset.symbol = symbol;
                card.innerHTML = `
                    <div class="ticker" style="color: ${stock.color};">${symbol}</div>
                    <div class="company">${stock.name}</div>
                    <div class="skeleton-bar wide"></div>
                    <div class="skeleton-bar medium"></div>
                `;
                card.addEventListener('click', () => {
                    document.querySelectorAll('.stock-tab').forEach(b => b.classList.remove('active'));
                    const tab = document.querySelector(`.stock-tab[data-symbol="${symbol}"]`);
                    if (tab) tab.classList.add('active');
                    selectedSymbol = symbol;
                    fetchAndRender();
                });
                grid.appendChild(card);
            }
        }

        function renderCardContent(card, symbol, dayData, monthData, news, ctx) {
            const stock = STOCKS[symbol];

            if (!dayData?.prices?.length) {
                card.classList.remove('skeleton');
                card.innerHTML = `
                    <div class="ticker" style="color: ${stock.color};">${symbol}</div>
                    <div class="company">${stock.name}</div>
                    <div class="ov-price" style="color:#8b8fa3;font-size:14px;">No data</div>
                `;
                return;
            }

            const latest = dayData.prices[dayData.prices.length - 1];
            const prevClose = dayData.meta?.previousClose || dayData.prices[0].price;
            const change = latest.price - prevClose;
            const pct = (change / prevClose) * 100;
            const isUp = change >= 0;

            if (news) marketContext.news[symbol] = news;

            const sig = computeSignal(monthData?.prices, ctx, news);
            const callClass = sig ? sig.call.toLowerCase() : '';
            const callIcon = sig?.call === 'BUY' ? '&#9650;' : sig?.call === 'SELL' ? '&#9660;' : '&#9644;';
            const sigHtml = sig
                ? `<div class="signal-row">
                    <span class="signal-icon ${callClass}">${callIcon}</span>
                    <span class="signal-call ${callClass}">${sig.call}</span>
                    <span class="signal-pct ${callClass}">${sig.confidence}%</span>
                   </div>
                   ${sig.reason ? `<div class="signal-reason">${sig.reason}</div>` : ''}
                   ${sig.detail ? `<div class="signal-detail">${sig.detail}</div>` : ''}`
                : '';

            card.classList.remove('skeleton');
            card.innerHTML = `
                <div class="ticker" style="color: ${stock.color};">${symbol}</div>
                <div class="company">${stock.name}</div>
                <div class="ov-price">$${latest.price.toFixed(2)}</div>
                <div class="ov-change ${isUp ? 'up' : 'down'}">
                    ${isUp ? '&#9650;' : '&#9660;'}
                    ${change >= 0 ? '+' : ''}${change.toFixed(2)}
                    (${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%)
                </div>
                ${sigHtml}
            `;
        }

        async function fetchOverview() {
            if (overviewFetchController) overviewFetchController.abort();
            overviewFetchController = new AbortController();
            const signal = overviewFetchController.signal;

            try {
                const grid = document.getElementById('overviewGrid');

                // 1. Show all skeleton cards instantly
                renderSkeletonCards(grid);

                const symbols = Object.keys(STOCKS);

                // 2. Kick off market context in parallel with stock data
                const ctxPromise = fetchMarketContext(signal);

                // 3. Fetch stocks in pairs, 1d then 1mo per stock, rendering progressively
                const stockData = {};
                async function fetchOneStock(sym) {
                    const card = grid.querySelector(`[data-symbol="${sym}"]`);
                    if (!card) return;

                    // Fetch 1d first — show price immediately
                    const dayData = await fetchStock(sym, '1d', signal);
                    if (signal.aborted) return;
                    renderCardContent(card, sym, dayData, null, null, marketContext);

                    // Then fetch 1mo for signal/recommendation
                    const monthData = await fetchStock(sym, '1mo', signal);
                    if (signal.aborted) return;

                    stockData[sym] = { dayData, monthData };
                    renderCardContent(card, sym, dayData, monthData, null, marketContext);
                }

                for (let i = 0; i < symbols.length; i += 2) {
                    const batch = symbols.slice(i, i + 2);
                    await Promise.allSettled(batch.map(fetchOneStock));
                    if (signal.aborted) return;
                }

                if (signal.aborted) return;

                // 4. Retry loop — keep retrying failed stocks until all succeed
                let retryCount = 0;
                while (!signal.aborted) {
                    const failedPrice = symbols.filter(s => !stockData[s]?.dayData?.prices?.length);
                    const failedSignal = symbols.filter(s => stockData[s]?.dayData?.prices?.length && !stockData[s]?.monthData?.prices?.length);
                    const needsRetry = [...new Set([...failedPrice, ...failedSignal])];

                    if (needsRetry.length === 0) break;
                    retryCount++;

                    // Back off progressively: 2s, 4s, 6s... capped at 10s
                    const delay = Math.min(retryCount * 2000, 10000);
                    console.log(`[overview] retry ${retryCount}: rescuing ${needsRetry.join(', ')} (waiting ${delay/1000}s)`);

                    // Clear cached failures so fetchStock tries again
                    for (const sym of needsRetry) {
                        if (failedPrice.includes(sym)) stockCache.delete(`${sym}_1d`);
                        if (failedSignal.includes(sym)) stockCache.delete(`${sym}_1mo`);
                    }

                    await new Promise(r => setTimeout(r, delay));
                    if (signal.aborted) return;

                    for (const sym of needsRetry) {
                        await fetchOneStock(sym);
                        if (signal.aborted) return;
                    }
                }

                if (signal.aborted) return;

                // 5. Wait for market context, re-render signals with full context
                const ctx = await ctxPromise;
                if (signal.aborted) return;
                renderMarketContextBar(ctx);

                for (const [sym, { dayData, monthData }] of Object.entries(stockData)) {
                    const card = grid.querySelector(`[data-symbol="${sym}"]`);
                    if (card) renderCardContent(card, sym, dayData, monthData, null, ctx);
                }

                // 6. Fetch news in background, update signals when each arrives
                await Promise.allSettled(symbols.map(async sym => {
                    const d = stockData[sym];
                    if (!d) return;
                    const news = await fetchNewsForStock(sym, signal);
                    if (signal.aborted || !news) return;
                    const card = grid.querySelector(`[data-symbol="${sym}"]`);
                    if (card) renderCardContent(card, sym, d.dayData, d.monthData, news, ctx);
                }));

                if (signal.aborted) return;

                // Disclaimer
                let disc = document.getElementById('signalDisclaimer');
                if (!disc) {
                    disc = document.createElement('div');
                    disc.id = 'signalDisclaimer';
                    disc.className = 'signal-disclaimer';
                    grid.parentNode.insertBefore(disc, grid.nextSibling);
                }
                disc.textContent = 'Signals use 24 indicators: MACD, RSI, Stochastic, Bollinger, EMA, Ichimoku, ADX, OBV, Williams %R, ATR, VWAP, SMA, momentum, volume, VIX, S&P 500, XLK sector, Fear & Greed, 10Y yield, USD, news sentiment — for fun, not financial advice.';

                let refreshNote = document.getElementById('signalRefreshNote');
                if (!refreshNote) {
                    refreshNote = document.createElement('div');
                    refreshNote.id = 'signalRefreshNote';
                    refreshNote.className = 'signal-refresh-note';
                    disc.parentNode.insertBefore(refreshNote, disc.nextSibling);
                }
                const nextRefresh = new Date(Date.now() + SIGNAL_REFRESH_MS);
                refreshNote.textContent = 'Signals reassess every 20 min · Next: ' +
                    nextRefresh.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

            } catch (e) {
                if (e.name === 'AbortError') return;
                console.warn('Overview fetch failed:', e.message);
            }
        }

        async function fetchAndRender() {
            if (currentFetchController) currentFetchController.abort();
            currentFetchController = new AbortController();
            const signal = currentFetchController.signal;

            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading ${selectedSymbol} data...
                </div>`;

            try {
                const data = await fetchStock(selectedSymbol, selectedRange, signal);

                if (signal.aborted) return;

                lastUpdated = new Date();
                activeSource = data.source || 'unknown';

                if (!data.prices?.length) {
                    document.getElementById('content').innerHTML = `
                        <div class="error-msg">
                            No data available for ${selectedSymbol} from any source (Yahoo Finance, Twelve Data, Alpha Vantage).
                            All APIs may be rate-limited. Try refreshing in a minute.
                        </div>`;
                    return;
                }

                render(data);
            } catch (e) {
                if (e.name === 'AbortError') return;
                document.getElementById('content').innerHTML = `
                    <div class="error-msg">Error fetching data: ${e.message}</div>`;
            }
        }

        function formatPrice(val) {
            return '$' + val.toFixed(2);
        }

        function render(data) {
            const { prices, meta } = data;
            const stock = STOCKS[selectedSymbol];
            const latest = prices[prices.length - 1];
            const first = prices[0];
            const prevClose = meta.previousClose || first.price;

            // For intraday (1D), change is vs previous close; otherwise vs first price in range
            const isIntraday = selectedRange === '1d';
            const refPrice = isIntraday ? prevClose : first.price;
            const change = latest.price - refPrice;
            const pctChange = (change / refPrice) * 100;
            const isUp = change >= 0;

            const allPrices = prices.map(p => p.price);
            const { min: low, max: high } = safeMinMax(allPrices);
            const avg = allPrices.reduce((s, v) => s + v, 0) / allPrices.length;
            const totalVolume = prices.reduce((s, p) => s + (p.volume || 0), 0);
            const variance = allPrices.reduce((s, v) => s + (v - avg) ** 2, 0) / (allPrices.length - 1);
            const volatility = (Math.sqrt(variance) / avg) * 100;

            const updatedStr = lastUpdated ? lastUpdated.toLocaleString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: 'numeric', minute: '2-digit', hour12: true
            }) : '-';

            document.getElementById('content').innerHTML = `
                <div class="data-status">
                    <div>${selectedSymbol} &bull; ${RANGE_LABELS[selectedRange]} &bull; Updated: <strong>${updatedStr}</strong></div>
                    <div>Source: <span class="source-tag">${activeSource}</span></div>
                </div>

                <div class="price-hero">
                    <div>
                        <div class="stock-label" style="color: ${stock.color};">${selectedSymbol} &mdash; ${stock.name}</div>
                        <span class="current-price">${formatPrice(latest.price)}</span>
                    </div>
                    <div class="price-change ${isUp ? 'up' : 'down'}">
                        ${isUp ? '&#9650;' : '&#9660;'}
                        ${change >= 0 ? '+' : ''}${change.toFixed(2)}
                        (${pctChange >= 0 ? '+' : ''}${pctChange.toFixed(2)}%)
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="label">High</div>
                        <div class="value green">${formatPrice(high)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Low</div>
                        <div class="value red">${formatPrice(low)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Average</div>
                        <div class="value blue">${formatPrice(avg)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Volatility</div>
                        <div class="value purple">${volatility.toFixed(2)}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Period Change</div>
                        <div class="value ${change >= 0 ? 'green' : 'red'}">
                            ${change >= 0 ? '+' : ''}${change.toFixed(2)}
                            (${pctChange >= 0 ? '+' : ''}${pctChange.toFixed(2)}%)
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Volume</div>
                        <div class="value amber">${formatVolume(totalVolume)}</div>
                    </div>
                </div>

                <div class="recent-table">
                    <h3>Recent Prices</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>${isIntraday ? 'Time' : 'Date'}</th>
                                <th>Price</th>
                                <th>Change</th>
                                <th>Volume</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${prices.slice(-20).reverse().map((p, i, arr) => {
                                const next = i < arr.length - 1 ? arr[i + 1] : null;
                                const dc = next ? p.price - next.price : 0;
                                const dpct = next ? (dc / next.price) * 100 : 0;
                                const cls = dc >= 0 ? 'up' : 'down';
                                const dt = new Date(p.date);
                                let dateLabel;
                                if (isIntraday) {
                                    dateLabel = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                                } else if (selectedRange === '5d') {
                                    dateLabel = dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) + ' ' +
                                        dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                                } else {
                                    dateLabel = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                                }
                                return `<tr>
                                    <td>${dateLabel}</td>
                                    <td><strong>${formatPrice(p.price)}</strong></td>
                                    <td class="price-change ${cls}">
                                        ${dc >= 0 ? '+' : ''}${dc.toFixed(2)}
                                        (${dpct >= 0 ? '+' : ''}${dpct.toFixed(2)}%)
                                    </td>
                                    <td>${p.volume ? formatVolume(p.volume) : '-'}</td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            renderChart(prices, stock.color);
        }

        function formatVolume(vol) {
            if (vol >= 1e9) return (vol / 1e9).toFixed(2) + 'B';
            if (vol >= 1e6) return (vol / 1e6).toFixed(2) + 'M';
            if (vol >= 1e3) return (vol / 1e3).toFixed(1) + 'K';
            return vol.toLocaleString();
        }

        function renderChart(prices, color) {
            const ctx = document.getElementById('priceChart').getContext('2d');

            if (chart) chart.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, color + '40');
            gradient.addColorStop(1, color + '05');

            const timeConfig = (() => {
                if (selectedRange === '1d') {
                    return {
                        parser: "yyyy-MM-dd'T'HH:mm:ss",
                        tooltipFormat: 'h:mm a',
                        unit: 'hour',
                        displayFormats: { hour: 'h:mm a', minute: 'h:mm a' }
                    };
                }
                if (selectedRange === '5d') {
                    return {
                        parser: "yyyy-MM-dd'T'HH:mm:ss",
                        tooltipFormat: 'MMM d, h:mm a',
                        unit: 'day',
                        displayFormats: { day: 'MMM d', hour: 'MMM d ha' }
                    };
                }
                if (selectedRange === '1mo') {
                    return {
                        parser: "yyyy-MM-dd'T'HH:mm:ss",
                        tooltipFormat: 'MMM d, yyyy h:mm a',
                        displayFormats: { day: 'MMM d', week: 'MMM d', month: 'MMM yyyy' }
                    };
                }
                return {
                    parser: "yyyy-MM-dd'T'HH:mm:ss",
                    tooltipFormat: 'MMM d, yyyy',
                    displayFormats: { day: 'MMM d', week: 'MMM d', month: 'MMM yyyy' }
                };
            })();

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: prices.map(p => p.date),
                    datasets: [{
                        label: 'Price (USD)',
                        data: prices.map(p => p.price),
                        borderColor: color,
                        backgroundColor: gradient,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHitRadius: 10,
                        pointHoverRadius: 5,
                        pointHoverBackgroundColor: color
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#252836',
                            titleColor: '#e1e4e8',
                            bodyColor: '#e1e4e8',
                            borderColor: '#2d3040',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: ctx => formatPrice(ctx.parsed.y)
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: timeConfig,
                            grid: {
                                color: '#2d304040',
                                drawBorder: false
                            },
                            ticks: { color: '#8b8fa3', maxTicksLimit: 8 }
                        },
                        y: {
                            grid: {
                                color: '#2d304040',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#8b8fa3',
                                callback: v => '$' + v.toLocaleString('en-US')
                            }
                        }
                    }
                }
            });
        }

        // Initial load — both run in parallel
        fetchOverview();
        fetchAndRender();

        // Price data refreshes every 60 seconds
        setInterval(fetchAndRender, 60000);

        // Signals reassess every 20 minutes (market context + news + indicators)
        setInterval(() => {
            lastMarketContextFetch = 0; // Force market context refresh
            stockCache.clear(); // Clear price cache to get fresh data
            fetchOverview();
        }, SIGNAL_REFRESH_MS);
    </script>
</body>
</html>
