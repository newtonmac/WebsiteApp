<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Stocks Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1d28, #252836);
            padding: 24px 32px;
            border-bottom: 1px solid #2d3040;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            background: #252836;
            border: 1px solid #2d3040;
            border-radius: 10px;
            color: #8b8fa3;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .back-btn:hover { background: #2d3040; color: #e1e4e8; }

        .header-text h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-text p {
            color: #8b8fa3;
            margin-top: 4px;
            font-size: 14px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            align-items: center;
        }

        .btn-group {
            display: flex;
            background: #1a1d28;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2d3040;
        }

        .btn-group button {
            padding: 10px 16px;
            background: transparent;
            color: #8b8fa3;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-group button.active {
            background: #3b82f6;
            color: white;
        }

        .btn-group button:hover:not(.active) {
            color: #e1e4e8;
            background: #252836;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: #1a1d28;
            color: #8b8fa3;
            border: 1px solid #2d3040;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            margin-left: auto;
        }

        .refresh-btn:hover {
            background: #252836;
            color: #e1e4e8;
        }

        .stock-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .stock-tab {
            padding: 8px 16px;
            background: #1a1d28;
            border: 1px solid #2d3040;
            border-radius: 10px;
            color: #8b8fa3;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .stock-tab:hover { background: #252836; color: #e1e4e8; }

        .stock-tab.active {
            background: var(--tab-color, #3b82f6);
            border-color: var(--tab-color, #3b82f6);
            color: white;
        }

        .price-hero {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 24px;
            padding: 24px;
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            flex-wrap: wrap;
        }

        .price-hero .stock-label {
            font-size: 16px;
            color: #8b8fa3;
        }

        .price-hero .current-price {
            font-size: 48px;
            font-weight: 700;
        }

        .price-hero .price-change {
            font-size: 18px;
            font-weight: 600;
        }

        .price-hero .price-change.up { color: #34d399; }
        .price-hero .price-change.down { color: #f87171; }

        .chart-container {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
            position: relative;
            height: 350px;
            margin-bottom: 24px;
        }

        .chart-container canvas {
            max-height: 400px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 13px;
            color: #8b8fa3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-card .value.green { color: #34d399; }
        .stat-card .value.red { color: #f87171; }
        .stat-card .value.blue { color: #60a5fa; }
        .stat-card .value.purple { color: #a78bfa; }
        .stat-card .value.amber { color: #fbbf24; }

        .recent-table {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
        }

        .recent-table h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        .recent-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .recent-table th {
            text-align: left;
            padding: 10px 12px;
            color: #8b8fa3;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2d3040;
        }

        .recent-table td {
            padding: 12px;
            border-bottom: 1px solid #1e2130;
            font-size: 14px;
        }

        .recent-table tr:last-child td {
            border-bottom: none;
        }

        .data-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 20px;
            background: #1a1d28;
            border-radius: 12px;
            border: 1px solid #2d3040;
            margin-bottom: 24px;
            font-size: 13px;
            color: #8b8fa3;
        }

        .data-status .source-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #6d28d920;
            color: #c084fc;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #8b8fa3;
            font-size: 16px;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2d3040;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: #1a1d28;
            border: 1px solid #f8717133;
            color: #f87171;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        /* Overview cards grid */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .overview-card {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .overview-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        .overview-card.skeleton .ov-price,
        .overview-card.skeleton .ov-change,
        .overview-card.skeleton .signal-row,
        .overview-card.skeleton .signal-reason,
        .overview-card.skeleton .signal-detail {
            display: none;
        }

        .skeleton-bar {
            height: 14px;
            background: linear-gradient(90deg, #252836 25%, #2d3040 50%, #252836 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
            margin-top: 8px;
        }

        .skeleton-bar.wide { width: 80%; height: 28px; margin-bottom: 4px; }
        .skeleton-bar.medium { width: 60%; }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .overview-card .ticker {
            font-size: 14px;
            font-weight: 700;
            color: #8b8fa3;
            margin-bottom: 4px;
        }

        .overview-card .company {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 10px;
        }

        .overview-card .ov-price {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .overview-card .ov-change {
            font-size: 14px;
            font-weight: 600;
        }

        .overview-card .ov-change.up { color: #34d399; }
        .overview-card .ov-change.down { color: #f87171; }

        .signal-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #2d3040;
        }

        .signal-call {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            font-weight: 700;
        }

        .signal-call.buy { color: #34d399; }
        .signal-call.sell { color: #f87171; }
        .signal-call.hold { color: #fbbf24; }

        .signal-call .arrow {
            font-size: 16px;
        }

        .signal-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px; height: 22px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .signal-icon.buy { background: #34d39920; color: #34d399; }
        .signal-icon.sell { background: #f8717120; color: #f87171; }
        .signal-icon.hold { background: #fbbf2420; color: #fbbf24; }

        .signal-pct {
            font-size: 11px;
            font-weight: 600;
            margin-left: auto;
            padding: 2px 8px;
            border-radius: 6px;
        }

        .signal-pct.buy { background: #34d39915; color: #34d399; }
        .signal-pct.sell { background: #f8717115; color: #f87171; }
        .signal-pct.hold { background: #fbbf2415; color: #fbbf24; }

        .signal-reason {
            font-size: 10px;
            color: #6b7280;
            margin-top: 4px;
            line-height: 1.4;
        }

        .signal-disclaimer {
            font-size: 10px;
            color: #4b5060;
            text-align: center;
            margin-top: -12px;
            margin-bottom: 16px;
        }

        .market-context-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding: 12px 16px;
            background: #1a1d28;
            border: 1px solid #2d3040;
            border-radius: 12px;
            margin-bottom: 16px;
            align-items: center;
        }

        .ctx-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #8b8fa3;
            padding: 4px 10px;
            background: #252836;
            border-radius: 8px;
        }

        .ctx-item .ctx-label { font-weight: 500; }
        .ctx-item .ctx-val { font-weight: 700; color: #e1e4e8; }
        .ctx-item .ctx-val.fear { color: #f87171; }
        .ctx-item .ctx-val.greed { color: #34d399; }
        .ctx-item .ctx-val.neutral { color: #fbbf24; }
        .ctx-item .ctx-val.up { color: #34d399; }
        .ctx-item .ctx-val.down { color: #f87171; }

        .signal-detail {
            font-size: 9px;
            color: #4b5060;
            margin-top: 2px;
            line-height: 1.3;
        }

        .signal-refresh-note {
            font-size: 10px;
            color: #4b5060;
            text-align: center;
            margin-bottom: 8px;
        }

        @media (max-width: 600px) {
            .header { padding: 16px; }
            .header-text h1 { font-size: 22px; }
            .container { padding: 16px; }
            .controls { gap: 8px; }
            .btn-group button { padding: 8px 12px; font-size: 12px; }
            .price-hero .current-price { font-size: 36px; }
            .overview-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .overview-card { padding: 14px; }
            .overview-card .ov-price { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">&#8592;</a>
        <div class="header-text">
            <h1>Tech Stocks Tracker</h1>
            <p>Live data &bull; Intraday &amp; historical &bull; Major tech companies</p>
        </div>
    </div>

    <div class="container">
        <div class="controls">
            <div class="stock-tabs" id="stockTabs">
                <button class="stock-tab active" data-symbol="NVDA" style="--tab-color: #76b900;">NVDA</button>
                <button class="stock-tab" data-symbol="MSFT" style="--tab-color: #00a4ef;">MSFT</button>
                <button class="stock-tab" data-symbol="AAPL" style="--tab-color: #a2aaad;">AAPL</button>
                <button class="stock-tab" data-symbol="GOOGL" style="--tab-color: #4285f4;">GOOGL</button>
                <button class="stock-tab" data-symbol="AMZN" style="--tab-color: #ff9900;">AMZN</button>
                <button class="stock-tab" data-symbol="META" style="--tab-color: #0668e1;">META</button>
                <button class="stock-tab" data-symbol="TSLA" style="--tab-color: #cc0000;">TSLA</button>
                <button class="stock-tab" data-symbol="AVGO" style="--tab-color: #cc092f;">AVGO</button>
                <button class="stock-tab" data-symbol="TSM" style="--tab-color: #e30613;">TSM</button>
                <button class="stock-tab" data-symbol="AMD" style="--tab-color: #ed1c24;">AMD</button>
                <button class="stock-tab" data-symbol="RIVN" style="--tab-color: #1a3c34;">RIVN</button>
            </div>
        </div>

        <div class="controls">
            <div class="btn-group" id="timeRange">
                <button class="active" data-range="1d" data-interval="5m">1D</button>
                <button data-range="5d" data-interval="15m">5D</button>
                <button data-range="1mo" data-interval="1h">1M</button>
                <button data-range="3mo" data-interval="1d">3M</button>
                <button data-range="6mo" data-interval="1d">6M</button>
                <button data-range="ytd" data-interval="1d">YTD</button>
                <button data-range="1y" data-interval="1d">1Y</button>
            </div>
            <button class="refresh-btn" id="refreshBtn">&#x21bb; Refresh</button>
        </div>

        <!-- Market context bar -->
        <div class="market-context-bar" id="marketContextBar" style="display:none;"></div>

        <!-- Overview cards for all stocks -->
        <div class="overview-grid" id="overviewGrid"></div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Loading tech stock data...
            </div>
        </div>
    </div>

    <script>
        const STOCKS = {
            NVDA:  { name: 'NVIDIA Corp.',     color: '#76b900' },
            MSFT:  { name: 'Microsoft Corp.',  color: '#00a4ef' },
            AAPL:  { name: 'Apple Inc.',       color: '#a2aaad' },
            GOOGL: { name: 'Alphabet Inc.',    color: '#4285f4' },
            AMZN:  { name: 'Amazon.com Inc.',  color: '#ff9900' },
            META:  { name: 'Meta Platforms',   color: '#0668e1' },
            TSLA:  { name: 'Tesla Inc.',       color: '#cc0000' },
            AVGO:  { name: 'Broadcom Inc.',    color: '#cc092f' },
            TSM:   { name: 'Taiwan Semi.',     color: '#e30613' },
            AMD:   { name: 'AMD Inc.',         color: '#ed1c24' },
            RIVN:  { name: 'Rivian Automotive', color: '#1a3c34' }
        };

        const TWELVE_DATA_KEY = '52f351e2d67042889eb1c6d16cd9769f';
        const AV_KEYS = ['demo', 'X86NOH6II01P7R24'];
        const FETCH_TIMEOUT_MS = 12000;
        const CACHE_TTL_MS = 60000;

        const CORS_PROXIES = [
            { url: u => 'https://api.allorigins.win/get?url=' + encodeURIComponent(u), wrapped: true },
            { url: u => 'https://corsproxy.io/?' + encodeURIComponent(u), wrapped: false }
        ];

        // Track which proxy index last succeeded — try it first next time
        let preferredProxyIndex = 0;
        // Track which source last succeeded — reorder waterfall accordingly
        // 0=yahoo, 1=twelve, 2=alphavantage
        let preferredSourceIndex = 0;

        // Fetch via CORS proxy, handling wrapped responses (allorigins /get returns {"contents": "..."})
        async function fetchViaProxy(targetUrl, signal, responseType = 'json') {
            return proxyLimiter(async () => {
                for (let attempt = 0; attempt < CORS_PROXIES.length; attempt++) {
                    const idx = (preferredProxyIndex + attempt) % CORS_PROXIES.length;
                    const proxy = CORS_PROXIES[idx];
                    try {
                        if (signal?.aborted) throw new DOMException('Aborted', 'AbortError');
                        console.log(`[proxy ${idx}] fetching:`, targetUrl);
                        const resp = await fetchWithTimeout(proxy.url(targetUrl), signal);
                        console.log(`[proxy ${idx}] status:`, resp.status);
                        if (!resp.ok) continue;
                        if (proxy.wrapped) {
                            const wrapper = await resp.json();
                            if (!wrapper.contents) { console.warn(`[proxy ${idx}] empty contents`); continue; }
                            preferredProxyIndex = idx;
                            return responseType === 'json' ? JSON.parse(wrapper.contents) : wrapper.contents;
                        }
                        preferredProxyIndex = idx;
                        return responseType === 'json' ? await resp.json() : await resp.text();
                    } catch (e) {
                        console.warn(`[proxy ${idx}] error:`, e.message);
                        if (e.name === 'AbortError') throw e;
                    }
                }
                console.warn('[proxy] all proxies failed for:', targetUrl);
                return null;
            });
        }

        const TWELVE_DATA_MAP = {
            '1d':  { interval: '5min',  outputsize: 78 },
            '5d':  { interval: '15min', outputsize: 130 },
            '1mo': { interval: '1h',    outputsize: 160 },
            '3mo': { interval: '1day',  outputsize: 63 },
            '6mo': { interval: '1day',  outputsize: 126 },
            'ytd': { interval: '1day',  outputsize: 365 },
            '1y':  { interval: '1day',  outputsize: 252 }
        };

        const YAHOO_INTERVAL_MAP = {
            '1d': '5m', '5d': '15m', '1mo': '1h',
            '3mo': '1d', '6mo': '1d', 'ytd': '1d', '1y': '1d'
        };

        const RANGE_LABELS = {
            '1d': '1 Day', '5d': '5 Days', '1mo': '1 Month', '3mo': '3 Months',
            '6mo': '6 Months', 'ytd': 'Year to Date', '1y': '1 Year'
        };

        const RANGE_DAYS = { '1d': 1, '5d': 5, '1mo': 30, '3mo': 90, '6mo': 180, '1y': 365 };

        let selectedSymbol = 'NVDA';
        let selectedRange = '1d';
        let chart = null;
        let lastUpdated = null;
        let activeSource = '';
        let avKeyIndex = 0;

        // TTL-based cache: stores { data, timestamp }
        const stockCache = new Map();

        function getCached(key) {
            const entry = stockCache.get(key);
            if (entry && (Date.now() - entry.timestamp) < CACHE_TTL_MS) return entry.data;
            if (entry) stockCache.delete(key);
            return null;
        }

        function setCache(key, data) {
            stockCache.set(key, { data, timestamp: Date.now() });
        }

        // AbortController to cancel stale fetches on rapid navigation
        let currentFetchController = null;
        let overviewFetchController = null;

        // Concurrency limiter to avoid overwhelming CORS proxies
        function createConcurrencyLimiter(maxConcurrent, delayMs = 0) {
            let active = 0;
            const queue = [];
            function next() {
                if (queue.length === 0 || active >= maxConcurrent) return;
                active++;
                const { fn, resolve, reject } = queue.shift();
                fn().then(resolve, reject).finally(() => {
                    active--;
                    if (delayMs > 0) {
                        setTimeout(next, delayMs);
                    } else {
                        next();
                    }
                });
            }
            return function limit(fn) {
                return new Promise((resolve, reject) => {
                    queue.push({ fn, resolve, reject });
                    next();
                });
            };
        }
        const proxyLimiter = createConcurrencyLimiter(2, 1500);

        function fetchWithTimeout(url, signal) {
            const timeout = typeof AbortSignal.timeout === 'function'
                ? AbortSignal.timeout(FETCH_TIMEOUT_MS)
                : null;
            const signals = [signal, timeout].filter(Boolean);
            const combined = signals.length > 1 && typeof AbortSignal.any === 'function'
                ? AbortSignal.any(signals)
                : signals[0] || undefined;
            return fetch(url, { signal: combined });
        }

        // ── Helpers ──
        function safeMinMax(arr) {
            let min = Infinity, max = -Infinity;
            for (const v of arr) {
                if (v < min) min = v;
                if (v > max) max = v;
            }
            return { min, max };
        }

        function getCutoffStr(range) {
            if (range === 'ytd') {
                return new Date(new Date().getFullYear(), 0, 1).toISOString().slice(0, 10);
            }
            const d = new Date();
            d.setDate(d.getDate() - (RANGE_DAYS[range] || 30));
            return d.toISOString().slice(0, 10);
        }

        function normalizeDate(dateStr) {
            return dateStr.includes(' ')
                ? dateStr.replace(' ', 'T')
                : dateStr.includes('T') ? dateStr : dateStr + 'T00:00:00';
        }

        // Stock tab clicks
        document.getElementById('stockTabs').addEventListener('click', e => {
            const btn = e.target.closest('.stock-tab');
            if (!btn) return;
            document.querySelectorAll('.stock-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedSymbol = btn.dataset.symbol;
            fetchAndRender();
        });

        // Time range clicks
        document.getElementById('timeRange').addEventListener('click', e => {
            const btn = e.target.closest('button');
            if (!btn || !btn.dataset.range) return;
            document.querySelectorAll('#timeRange button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedRange = btn.dataset.range;
            fetchAndRender();
        });

        document.getElementById('refreshBtn').addEventListener('click', () => {
            stockCache.clear();
            fetchAndRender();
            fetchOverview();
        });

        // ── Source 1: Yahoo Finance (via CORS proxies) ──
        function parseYahooResponse(json) {
            if (!json.chart?.result?.[0]) return null;

            const result = json.chart.result[0];
            const meta = result.meta || {};
            const timestamps = result.timestamp || [];
            const quote = result.indicators.quote[0] || {};

            const prices = timestamps.reduce((acc, ts, i) => {
                const close = quote.close?.[i];

                        high: quote.high?.[i],
                        low: quote.low?.[i],
                        volume: quote.volume?.[i]
                    });

            }, []);

            if (prices.length === 0) return null;

            return {

                meta: {
                    previousClose: meta.chartPreviousClose || meta.previousClose,

                },

        async function fetchYahoo(symbol, range, signal) {

        // ── Source 2: Twelve Data API ──
        async function fetchTwelveData(symbol, range, signal) {
            const config = TWELVE_DATA_MAP[range];
            if (!config) return null;

            try {
                const url = `https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(symbol)}&interval=${config.interval}&outputsize=${config.outputsize}&apikey=${TWELVE_DATA_KEY}`;
                const resp = await fetchWithTimeout(url, signal);
                if (!resp.ok) return null;
                const json = await resp.json();

                if (json.status === 'error') {
                    console.warn('TwelveData error:', json.message);
                    return null;
                }

                if (!json.values?.length) return null;

                const cutoff = range === 'ytd' ? getCutoffStr('ytd') : null;
                const prices = json.values
                    .reduce((acc, d) => {
                        if (!d.close || d.close === 'null') return acc;
                        const price = parseFloat(d.close);
                        if (isNaN(price) || price <= 0) return acc;
                        const date = normalizeDate(d.datetime);
                        if (cutoff && date.slice(0, 10) < cutoff) return acc;
                        acc.push({
                            date,
                            price,
                            open: parseFloat(d.open),
                            high: parseFloat(d.high),
                            low: parseFloat(d.low),
                            volume: parseInt(d.volume) || 0
                        });
                        return acc;
                    }, [])
                    .sort((a, b) => a.date.localeCompare(b.date));

                if (prices.length === 0) return null;

                return {
                    prices,
                    meta: { previousClose: prices[0].price },
                    source: 'Twelve Data'
                };
            } catch (e) {
                if (e.name === 'AbortError') throw e;
                console.warn(`TwelveData failed for ${symbol}:`, e.message);
            }
            return null;
        }

        // ── Source 3: Alpha Vantage ──
        async function fetchAlphaVantage(symbol, range, signal) {
            const isIntraday = ['1d', '5d', '1mo'].includes(range);
            const avIntervalMap = { '1d': '5min', '5d': '15min', '1mo': '60min' };
            const outputSize = range === '1d' ? 'compact' : 'full';

            for (let attempt = 0; attempt < AV_KEYS.length; attempt++) {
                const key = AV_KEYS[(avKeyIndex + attempt) % AV_KEYS.length];
                try {
                    const fn = isIntraday ? 'TIME_SERIES_INTRADAY' : 'TIME_SERIES_DAILY';
                    const intervalParam = isIntraday ? `&interval=${avIntervalMap[range]}` : '';
                    const url = `https://www.alphavantage.co/query?function=${fn}&symbol=${encodeURIComponent(symbol)}${intervalParam}&outputsize=${outputSize}&apikey=${key}`;

                    const resp = await fetchWithTimeout(url, signal);
                    if (!resp.ok) continue;
                    const json = await resp.json();

                    if (json['Note'] || json['Information'] || json['Error Message']) {
                        console.warn('AlphaVantage limit/error:', json['Note'] || json['Information'] || json['Error Message']);
                        continue;
                    }

                    const tsKey = Object.keys(json).find(k => k.startsWith('Time Series'));
                    if (!tsKey || !json[tsKey]) continue;

                    const cutoffStr = getCutoffStr(range);
                    const prices = Object.entries(json[tsKey])
                        .reduce((acc, [dateStr, vals]) => {
                            const price = parseFloat(vals['4. close']);
                            if (isNaN(price) || price <= 0) return acc;
                            const date = normalizeDate(dateStr);
                            if (date.slice(0, 10) < cutoffStr) return acc;
                            acc.push({
                                date,
                                price,
                                open: parseFloat(vals['1. open']),
                                high: parseFloat(vals['2. high']),
                                low: parseFloat(vals['3. low']),
                                volume: parseInt(vals['5. volume']) || 0
                            });
                            return acc;
                        }, [])
                        .sort((a, b) => a.date.localeCompare(b.date));

                    if (prices.length > 0) {
                        avKeyIndex = (avKeyIndex + attempt) % AV_KEYS.length;
                        return {
                            prices,
                            meta: { previousClose: prices[0].price },
                            source: 'Alpha Vantage'
                        };
                    }
                } catch (e) {
                    if (e.name === 'AbortError') throw e;
                    console.warn(`AlphaVantage failed for ${symbol}:`, e.message);
                }
            }
            return null;
        }

        // ── Multi-source fetch with fallback ──
        async function fetchStock(symbol, range, signal) {
            const cacheKey = `${symbol}_${range}`;
            const cached = getCached(cacheKey);
            if (cached) return cached;

            // Waterfall: try preferred source first, then fallbacks
            const sourceNames = ['Yahoo', 'TwelveData', 'AlphaVantage'];
            const sources = [
                () => fetchYahoo(symbol, range, signal),
                () => fetchTwelveData(symbol, range, signal),
                () => fetchAlphaVantage(symbol, range, signal)
            ];

            for (let attempt = 0; attempt < sources.length; attempt++) {
                const idx = (preferredSourceIndex + attempt) % sources.length;
                try {
                    console.log(`[fetchStock] trying ${sourceNames[idx]} for ${symbol}/${range}`);
                    const data = await sources[idx]();
                    if (data?.prices?.length) {
                        console.log(`[fetchStock] ${sourceNames[idx]} succeeded with ${data.prices.length} prices`);
                        preferredSourceIndex = idx;
                        setCache(cacheKey, data);
                        return data;
                    }
                    console.warn(`[fetchStock] ${sourceNames[idx]} returned no data`);
                } catch (e) {
                    if (e.name === 'AbortError') throw e;
                    console.warn(`[fetchStock] ${sourceNames[idx]} threw:`, e.message);
                }
            }

            console.error(`[fetchStock] ALL sources failed for ${symbol}/${range}`);
            return { prices: [], meta: {}, source: 'none' };
        }

        // ══════════════════════════════════════════
        // ── Technical Indicator Helpers ──
        // ══════════════════════════════════════════

        function calcEMA(data, period) {
            const k = 2 / (period + 1);
            const ema = [data[0]];
            for (let i = 1; i < data.length; i++) {
                ema.push(data[i] * k + ema[i - 1] * (1 - k));
            }
            return ema;
        }

        function calcMACD(closes) {
            if (closes.length < 26) return null;
            const ema12 = calcEMA(closes, 12);
            const ema26 = calcEMA(closes, 26);
            const macdLine = ema12.map((v, i) => v - ema26[i]);
            const signalLine = calcEMA(macdLine.slice(26), 9);
            const offset = macdLine.length - signalLine.length;
            const histogram = signalLine.map((v, i) => macdLine[i + offset] - v);
            return {
                macd: macdLine[macdLine.length - 1],
                signal: signalLine[signalLine.length - 1],
                histogram: histogram[histogram.length - 1],
                prevHistogram: histogram.length > 1 ? histogram[histogram.length - 2] : 0
            };
        }

        function calcBollingerBands(closes, period = 20) {
            if (closes.length < period) return null;
            const slice = closes.slice(-period);
            const sma = slice.reduce((s, v) => s + v, 0) / period;
            const variance = slice.reduce((s, v) => s + (v - sma) ** 2, 0) / period;
            const stddev = Math.sqrt(variance);
            return {
                upper: sma + 2 * stddev,
                middle: sma,
                lower: sma - 2 * stddev,
                bandwidth: (4 * stddev) / sma * 100, // % width
                pctB: stddev > 0 ? (closes[closes.length - 1] - (sma - 2 * stddev)) / (4 * stddev) : 0.5
            };
        }

        function calcATR(prices, period = 14) {
            if (prices.length < period + 1) return null;
            const trs = [];
            for (let i = 1; i < prices.length; i++) {
                const h = prices[i].high || prices[i].price;
                const l = prices[i].low || prices[i].price;
                const pc = prices[i - 1].price;
                trs.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
            }
            // Smoothed ATR
            let atr = trs.slice(0, period).reduce((s, v) => s + v, 0) / period;
            for (let i = period; i < trs.length; i++) {
                atr = (atr * (period - 1) + trs[i]) / period;
            }
            return atr;
        }

        function calcVWAP(prices) {
            if (!prices.length) return null;
            let cumVP = 0, cumVol = 0;
            for (const p of prices) {
                const vol = p.volume || 0;
                const typical = ((p.high || p.price) + (p.low || p.price) + p.price) / 3;
                cumVP += typical * vol;
                cumVol += vol;
            }
            return cumVol > 0 ? cumVP / cumVol : null;
        }

        function calcRSI(closes, period = 14) {
            const n = closes.length;
            if (n < period + 1) return 50;
            // Wilder's smoothed RSI
            let avgGain = 0, avgLoss = 0;
            for (let i = 1; i <= period; i++) {
                const diff = closes[i] - closes[i - 1];
                if (diff > 0) avgGain += diff; else avgLoss -= diff;
            }
            avgGain /= period;
            avgLoss /= period;
            for (let i = period + 1; i < n; i++) {
                const diff = closes[i] - closes[i - 1];
                avgGain = (avgGain * (period - 1) + (diff > 0 ? diff : 0)) / period;
                avgLoss = (avgLoss * (period - 1) + (diff < 0 ? -diff : 0)) / period;
            }
            if (avgLoss === 0) return 100;
            const rs = avgGain / avgLoss;
            return 100 - (100 / (1 + rs));
        }

        // ── Stochastic Oscillator (%K / %D) ──
        function calcStochastic(closes, kPeriod = 14, dPeriod = 3) {
            if (closes.length < kPeriod + dPeriod) return null;
            const kValues = [];
            for (let i = kPeriod - 1; i < closes.length; i++) {
                const slice = closes.slice(i - kPeriod + 1, i + 1);
                const high = Math.max(...slice);
                const low = Math.min(...slice);
                kValues.push(high !== low ? ((closes[i] - low) / (high - low)) * 100 : 50);
            }
            // %D is SMA of %K
            const dValues = [];
            for (let i = dPeriod - 1; i < kValues.length; i++) {
                dValues.push(kValues.slice(i - dPeriod + 1, i + 1).reduce((s, v) => s + v, 0) / dPeriod);
            }
            return {
                k: kValues[kValues.length - 1],
                d: dValues[dValues.length - 1],
                prevK: kValues.length > 1 ? kValues[kValues.length - 2] : null,
                prevD: dValues.length > 1 ? dValues[dValues.length - 2] : null
            };
        }

        // ── ADX (Average Directional Index) ──
        function calcADX(prices, period = 14) {
            if (prices.length < period * 2 + 1) return null;
            const plusDM = [], minusDM = [], tr = [];
            for (let i = 1; i < prices.length; i++) {
                const h = prices[i].high || prices[i].price;
                const l = prices[i].low || prices[i].price;
                const ph = prices[i - 1].high || prices[i - 1].price;
                const pl = prices[i - 1].low || prices[i - 1].price;
                const pc = prices[i - 1].price;
                const upMove = h - ph;
                const downMove = pl - l;
                plusDM.push(upMove > downMove && upMove > 0 ? upMove : 0);
                minusDM.push(downMove > upMove && downMove > 0 ? downMove : 0);
                tr.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
            }
            // Smoothed averages
            let smoothTR = tr.slice(0, period).reduce((s, v) => s + v, 0);
            let smoothPlusDM = plusDM.slice(0, period).reduce((s, v) => s + v, 0);
            let smoothMinusDM = minusDM.slice(0, period).reduce((s, v) => s + v, 0);
            const dxValues = [];
            for (let i = period; i < tr.length; i++) {
                smoothTR = smoothTR - (smoothTR / period) + tr[i];
                smoothPlusDM = smoothPlusDM - (smoothPlusDM / period) + plusDM[i];
                smoothMinusDM = smoothMinusDM - (smoothMinusDM / period) + minusDM[i];
                const plusDI = smoothTR > 0 ? (smoothPlusDM / smoothTR) * 100 : 0;
                const minusDI = smoothTR > 0 ? (smoothMinusDM / smoothTR) * 100 : 0;
                const diSum = plusDI + minusDI;
                dxValues.push(diSum > 0 ? (Math.abs(plusDI - minusDI) / diSum) * 100 : 0);
            }
            if (dxValues.length < period) return null;
            // ADX is smoothed average of DX
            let adx = dxValues.slice(0, period).reduce((s, v) => s + v, 0) / period;
            for (let i = period; i < dxValues.length; i++) {
                adx = (adx * (period - 1) + dxValues[i]) / period;
            }
            // Also return latest +DI/-DI for trend direction
            const lastPlusDI = smoothTR > 0 ? (smoothPlusDM / smoothTR) * 100 : 0;
            const lastMinusDI = smoothTR > 0 ? (smoothMinusDM / smoothTR) * 100 : 0;
            return { adx, plusDI: lastPlusDI, minusDI: lastMinusDI };
        }

        // ── OBV (On-Balance Volume) ──
        function calcOBV(prices) {
            if (prices.length < 10) return null;
            let obv = 0;
            const obvArr = [0];
            for (let i = 1; i < prices.length; i++) {
                const vol = prices[i].volume || 0;
                if (prices[i].price > prices[i - 1].price) obv += vol;
                else if (prices[i].price < prices[i - 1].price) obv -= vol;
                obvArr.push(obv);
            }
            // OBV trend: compare 5-period SMA of OBV
            const n = obvArr.length;
            if (n < 10) return null;
            const obvRecent = obvArr.slice(-5).reduce((s, v) => s + v, 0) / 5;
            const obvPrior = obvArr.slice(-10, -5).reduce((s, v) => s + v, 0) / 5;
            // Price trend for divergence detection
            const priceRecent = prices.slice(-5).reduce((s, p) => s + p.price, 0) / 5;
            const pricePrior = prices.slice(-10, -5).reduce((s, p) => s + p.price, 0) / 5;
            const obvTrend = obvRecent > obvPrior ? 1 : -1;
            const priceTrend = priceRecent > pricePrior ? 1 : -1;
            return {
                trend: obvTrend,
                divergence: obvTrend !== priceTrend, // Bearish or bullish divergence
                bullishDiv: obvTrend > 0 && priceTrend < 0,
                bearishDiv: obvTrend < 0 && priceTrend > 0
            };
        }

        // ── Williams %R ──
        function calcWilliamsR(closes, period = 14) {
            if (closes.length < period) return null;
            const slice = closes.slice(-period);
            const high = Math.max(...slice);
            const low = Math.min(...slice);
            if (high === low) return -50;
            return ((high - closes[closes.length - 1]) / (high - low)) * -100;
        }

        // ── Ichimoku Cloud ──
        function calcIchimoku(prices) {
            const n = prices.length;
            if (n < 52) return null;
            const closes = prices.map(p => p.price);
            const highs = prices.map(p => p.high || p.price);
            const lows = prices.map(p => p.low || p.price);
            // Tenkan-sen (9-period)
            const tenkan = (Math.max(...highs.slice(-9)) + Math.min(...lows.slice(-9))) / 2;
            // Kijun-sen (26-period)
            const kijun = (Math.max(...highs.slice(-26)) + Math.min(...lows.slice(-26))) / 2;
            // Senkou Span A (average of Tenkan + Kijun, shifted 26 ahead — we use current)
            const spanA = (tenkan + kijun) / 2;
            // Senkou Span B (52-period high+low / 2, shifted 26 ahead)
            const spanB = (Math.max(...highs.slice(-52)) + Math.min(...lows.slice(-52))) / 2;
            const price = closes[n - 1];
            const cloudTop = Math.max(spanA, spanB);
            const cloudBottom = Math.min(spanA, spanB);
            return {
                tenkan, kijun, spanA, spanB,
                aboveCloud: price > cloudTop,
                belowCloud: price < cloudBottom,
                inCloud: price >= cloudBottom && price <= cloudTop,
                tkCross: tenkan > kijun ? 1 : tenkan < kijun ? -1 : 0,
                cloudBullish: spanA > spanB
            };
        }

        function parseNewsSentiment(rssText, symbol) {
            // Extract titles from RSS XML
            const titles = [];
            const titleRegex = /<title><!\[CDATA\[(.*?)\]\]><\/title>|<title>(.*?)<\/title>/gi;
            let match;
            while ((match = titleRegex.exec(rssText)) !== null) {
                const title = (match[1] || match[2] || '').trim();
                if (title && title !== 'Google News' && !title.startsWith('<?')) {
                    titles.push(title.toLowerCase());
                }
            }

            if (titles.length === 0) return null;

            // Keyword sentiment scoring
            const bullish = ['surge', 'soar', 'rally', 'jump', 'gain', 'rise', 'beat', 'record', 'upgrade',
                'buy', 'outperform', 'strong', 'boost', 'growth', 'profit', 'revenue beat', 'bullish',
                'breakout', 'partnership', 'deal', 'contract', 'innovation', 'expand', 'dividend',
                'acquisition', 'merger', 'launch', 'ai deal', 'breakthrough'];
            const bearish = ['fall', 'drop', 'plunge', 'crash', 'decline', 'loss', 'miss', 'cut',
                'downgrade', 'sell', 'underperform', 'weak', 'risk', 'concern', 'lawsuit', 'probe',
                'investigation', 'layoff', 'recall', 'warning', 'bearish', 'debt', 'fine', 'penalty',
                'antitrust', 'regulation', 'tariff', 'ban'];

            let score = 0, bullCount = 0, bearCount = 0;
            const recentTitles = titles.slice(0, 10); // Focus on top 10 headlines

            for (const title of recentTitles) {
                for (const word of bullish) {
                    if (title.includes(word)) { score += 1; bullCount++; break; }
                }
                for (const word of bearish) {
                    if (title.includes(word)) { score -= 1; bearCount++; break; }
                }
            }
            const headline = recentTitles.find(t => t.length > 10) || '';

            const total = recentTitles.length;
            return {
                score: total > 0 ? score / total : 0, // -1 to +1 range
                bullCount,
                bearCount,
                total,
                headline: headline ? headline.slice(0, 60) : ''
            };
        }

        async function fetchMarketContext(signal) {
            // Only refresh every 20 minutes
            if (Date.now() - lastMarketContextFetch < MARKET_CONTEXT_TTL && marketContext.vix !== null) {
                return marketContext;
            }

            const [vix, spy, fg, xlk, treasury, dxy] = await Promise.allSettled([
                fetchVIX(signal),
                fetchSPY(signal),
                fetchFearGreedIndex(signal),
                fetchXLK(signal),
                fetchTreasury10Y(signal),
                fetchDXY(signal)
            ]);

            marketContext.vix = vix.status === 'fulfilled' ? vix.value : null;
            marketContext.spy = spy.status === 'fulfilled' ? spy.value : null;
            marketContext.fearGreed = fg.status === 'fulfilled' ? fg.value : null;
            marketContext.xlk = xlk.status === 'fulfilled' ? xlk.value : null;
            marketContext.treasury10y = treasury.status === 'fulfilled' ? treasury.value : null;
            marketContext.dxy = dxy.status === 'fulfilled' ? dxy.value : null;
            lastMarketContextFetch = Date.now();

            return marketContext;
        }
