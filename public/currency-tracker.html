<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MXN/USD Currency Exchange Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1d28, #252836);
            padding: 24px 32px;
            border-bottom: 1px solid #2d3040;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #8b8fa3;
            margin-top: 4px;
            font-size: 14px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .btn-group {
            display: flex;
            background: #1a1d28;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2d3040;
        }

        .btn-group button {
            padding: 10px 20px;
            background: transparent;
            color: #8b8fa3;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-group button.active {
            background: #3b82f6;
            color: white;
        }

        .btn-group button:hover:not(.active) {
            color: #e1e4e8;
            background: #252836;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: #1a1d28;
            color: #8b8fa3;
            border: 1px solid #2d3040;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            margin-left: auto;
        }

        .refresh-btn:hover {
            background: #252836;
            color: #e1e4e8;
        }

        .price-hero {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 24px;
            padding: 24px;
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            flex-wrap: wrap;
        }

        .price-hero .current-price {
            font-size: 48px;
            font-weight: 700;
        }

        .price-hero .price-change {
            font-size: 18px;
            font-weight: 600;
        }

        .price-hero .price-change.up { color: #34d399; }
        .price-hero .price-change.down { color: #f87171; }

        .price-hero .pair-label {
            font-size: 16px;
            color: #8b8fa3;
        }

        .price-hero .inverse-rate {
            font-size: 14px;
            color: #8b8fa3;
            margin-top: 4px;
        }

        .flag-pair {
            font-size: 28px;
            margin-right: 4px;
        }

        .chart-container {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
            margin-bottom: 24px;
        }

        .chart-container {
            position: relative;
            height: 350px;
            margin-bottom: 24px;
        }

        .chart-container canvas {
            max-height: 400px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 13px;
            color: #8b8fa3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-card .value.green { color: #34d399; }
        .stat-card .value.red { color: #f87171; }
        .stat-card .value.blue { color: #60a5fa; }
        .stat-card .value.purple { color: #a78bfa; }
        .stat-card .value.amber { color: #fbbf24; }

        .stat-date {
            font-size: 11px;
            color: #8b8fa3;
            margin-top: 4px;
        }

        .recent-table {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
        }

        .recent-table h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        .recent-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .recent-table th {
            text-align: left;
            padding: 10px 12px;
            color: #8b8fa3;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2d3040;
        }

        .recent-table td {
            padding: 12px;
            border-bottom: 1px solid #1e2130;
            font-size: 14px;
        }

        .recent-table tr:last-child td {
            border-bottom: none;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #8b8fa3;
            font-size: 16px;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2d3040;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: #1a1d28;
            border: 1px solid #f8717133;
            color: #f87171;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .data-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 20px;
            background: #1a1d28;
            border-radius: 12px;
            border: 1px solid #2d3040;
            margin-bottom: 24px;
            font-size: 13px;
            color: #8b8fa3;
        }

        .data-status .source-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-status .source-fred { background: #f59e0b20; color: #fbbf24; }
        .data-status .source-frankfurter { background: #10b98120; color: #34d399; }
        .data-status .source-yahoo { background: #6d28d920; color: #c084fc; }
        .data-status .source-twelvedata { background: #3b82f620; color: #60a5fa; }
        .data-status .source-banxico { background: #dc262620; color: #ef4444; }

        .nav-link {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 14px;
            background: #252836;
            color: #60a5fa;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #2d3040;
            transition: all 0.2s;
        }
        .nav-link:hover { background: #2d3040; color: #a78bfa; }
    </style>
</head>
<body>
    <div class="header">
        <h1>MXN / USD Exchange Rate Tracker</h1>
        <p>Mexican Peso to US Dollar &bull; FRED, Frankfurter, Yahoo, Twelve Data &amp; Banxico &bull; Updated daily</p>
        <a href="index.html" class="nav-link">&larr; Oil Tracker</a>
        <a href="flight-tracker.html" class="nav-link">Flight Tracker &rarr;</a>
        <a href="traffic-dashboard.html" class="nav-link">Traffic Dashboard</a>
        <a href="powerwall-dashboard.html" class="nav-link">Powerwall Dashboard</a>
        <a href="gold-tracker.html" class="nav-link">Gold/Silver/BTC &rarr;</a>
        <a href="webcam-dashboard.html" class="nav-link">SD Webcams &rarr;</a>
    </div>

    <div class="container">
        <div class="controls">
            <div class="btn-group" id="viewMode">
                <button class="active" data-mode="mxn-usd">MXN &rarr; USD</button>
                <button data-mode="usd-mxn">USD &rarr; MXN</button>
            </div>
            <div class="btn-group" id="timeRange">
                <button data-range="1">1D</button>
                <button data-range="7">1W</button>
                <button class="active" data-range="30">1M</button>
                <button data-range="90">3M</button>
                <button data-range="180">6M</button>
                <button data-range="ytd">YTD</button>
                <button data-range="365">1Y</button>
            </div>
            <button class="refresh-btn" id="refreshBtn">&#x21bb; Refresh</button>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Loading exchange rate data...
            </div>
        </div>
    </div>

    <script>
        const FRED_KEY = 'b157e132862f8b31185abd4da930b21a';
        const FRED_BASE = 'https://api.stlouisfed.org/fred/series/observations';

        let rateData = [];
        let selectedRange = 30;
        let selectedMode = 'mxn-usd';
        let chart = null;
        let lastUpdated = null;
        let dataSources = [];

        // Controls
        document.querySelectorAll('#viewMode button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#viewMode button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedMode = btn.dataset.mode;
                render();
            });
        });

        document.querySelectorAll('#timeRange button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#timeRange button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRange = btn.dataset.range === 'ytd' ? 'ytd' : parseInt(btn.dataset.range);
                render();
            });
        });

        document.getElementById('refreshBtn').addEventListener('click', fetchRates);

        // FRED API - DEXMXUS series (MXN per 1 USD, daily business days)
        async function fetchFRED() {
            try {
                const oneYearAgo = new Date();
                oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
                const startDate = oneYearAgo.toISOString().split('T')[0];

                const params = new URLSearchParams({
                    series_id: 'DEXMXUS',
                    api_key: FRED_KEY,
                    file_type: 'json',
                    observation_start: startDate,
                    sort_order: 'asc'
                });

                const resp = await fetch(FRED_BASE + '?' + params.toString());
                const json = await resp.json();

                if (json.observations) {
                    return json.observations
                        .filter(d => d.value !== '.' && d.value != null)
                        .map(d => ({
                            date: d.date,
                            rate: 1 / parseFloat(d.value),
                            source: 'FRED'
                        }));
                }
            } catch (e) {
                console.warn('FRED fetch failed:', e.message);
            }
            return [];
        }

        // Frankfurter API - free, no key required, ECB data (backup)
        async function fetchFrankfurter() {
            try {
                const endDate = new Date().toISOString().split('T')[0];
                const startDate = new Date();
                startDate.setFullYear(startDate.getFullYear() - 1);
                const startStr = startDate.toISOString().split('T')[0];

                const resp = await fetch(
                    `https://api.frankfurter.app/${startStr}..${endDate}?from=MXN&to=USD`
                );
                const json = await resp.json();

                if (json.rates) {
                    return Object.entries(json.rates).map(([date, rates]) => ({
                        date,
                        rate: rates.USD,
                        source: 'Frankfurter'
                    })).sort((a, b) => a.date.localeCompare(b.date));
                }
            } catch (e) {
                console.warn('Frankfurter fetch failed:', e.message);
            }
            return [];
        }

        // Yahoo Finance (MXNUSD=X returns MXN per 1 USD, we want USD per 1 MXN)
        async function fetchYahoo() {
            try {
                const targetUrl = 'https://query1.finance.yahoo.com/v8/finance/chart/MXNUSD%3DX?range=1y&interval=1d';
                const resp = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl));
                const json = await resp.json();
                if (json.chart && json.chart.result && json.chart.result[0]) {
                    const result = json.chart.result[0];
                    const timestamps = result.timestamp || [];
                    const closes = result.indicators.quote[0].close || [];
                    return timestamps.map((ts, i) => {
                        const d = new Date(ts * 1000);
                        const dateStr = d.toISOString().split('T')[0];
                        return { date: dateStr, rate: closes[i], source: 'Yahoo' };
                    }).filter(p => p.rate != null && !isNaN(p.rate) && p.rate > 0);
                }
            } catch (e) {
                console.warn('Yahoo Finance fetch failed:', e.message);
            }
            return [];
        }

        // Yahoo Finance intraday/hourly data for all time ranges
        // Keyed by range: { 1: [...], 7: [...], 30: [...], 90: [...], 180: [...], 365: [...] }
        let yahooGranularData = {};

        function parseYahooIntraday(json, invert = false) {
            if (json.chart && json.chart.result && json.chart.result[0]) {
                const result = json.chart.result[0];
                const timestamps = result.timestamp || [];
                const closes = result.indicators.quote[0].close || [];
                return timestamps.map((ts, i) => {
                    const d = new Date(ts * 1000);
                    const dateStr = d.toISOString().replace('Z', '').slice(0, 19);
                    const rate = invert ? 1 / closes[i] : closes[i];
                    return { date: dateStr, rate, source: 'Yahoo' };
                }).filter(p => p.rate != null && !isNaN(p.rate) && p.rate > 0 && isFinite(p.rate));
            }
            return [];
        }

        async function fetchYahooGranular(yahooRange, interval, rangeKey) {
            // Try MXN=X (USD/MXN, inverted) first — better intraday coverage
            // Then fall back to MXNUSD=X (direct rate)
            const symbols = [
                { sym: 'MXN%3DX', invert: true },
                { sym: 'MXNUSD%3DX', invert: false }
            ];
            for (const { sym, invert } of symbols) {
                try {
                    const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?range=${yahooRange}&interval=${interval}`;
                    const resp = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl));
                    const data = parseYahooIntraday(await resp.json(), invert);
                    if (data.length > 0) return { key: rangeKey, data };
                } catch (e) {
                    console.warn(`Yahoo ${sym} ${yahooRange}/${interval} fetch failed:`, e.message);
                }
            }
            return { key: rangeKey, data: [] };
        }

        // Banxico SIE API - SF43718 is the official Peso/Dollar FIX rate
        // To enable: get a free 64-char token at https://www.banxico.org.mx/SieAPIRest/service/v1/
        // Then replace the empty string below with your token
        const BANXICO_TOKEN = '889a6a2e5d57fa9635e403a9aef392c2ba6c12e771bb6c9ecc63bcbf893bd840';
        const BANXICO_BASE = 'https://www.banxico.org.mx/SieAPIRest/service/v1';

        async function fetchBanxico() {
            if (!BANXICO_TOKEN) { console.info('Banxico: No token configured. Get one at https://www.banxico.org.mx/SieAPIRest/service/v1/'); return []; }
            try {
                const oneYearAgo = new Date();
                oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
                const startDate = oneYearAgo.toISOString().split('T')[0];
                const endDate = new Date().toISOString().split('T')[0];

                const apiUrl = `${BANXICO_BASE}/series/SF43718/datos/${startDate}/${endDate}`;
                const resp = await fetch(apiUrl, { headers: { 'Bmx-Token': BANXICO_TOKEN } });
                const json = await resp.json();

                if (json.bmx && json.bmx.series && json.bmx.series[0] && json.bmx.series[0].datos) {
                    return json.bmx.series[0].datos
                        .filter(d => d.dato && d.dato !== 'N/E')
                        .map(d => {
                            // Banxico dates are DD/MM/YYYY format
                            const parts = d.fecha.split('/');
                            const dateStr = `${parts[2]}-${parts[1]}-${parts[0]}`;
                            const mxnPerUsd = parseFloat(d.dato.replace(',', ''));
                            return { date: dateStr, rate: 1 / mxnPerUsd, source: 'Banxico' };
                        })
                        .filter(d => !isNaN(d.rate) && d.rate > 0)
                        .sort((a, b) => a.date.localeCompare(b.date));
                }
            } catch (e) {
                console.warn('Banxico fetch failed:', e.message);
            }
            return [];
        }

        // Twelve Data
        const TWELVE_DATA_KEY = '52f351e2d67042889eb1c6d16cd9769f';

        async function fetchTwelveData() {
            try {
                const resp = await fetch(
                    'https://api.twelvedata.com/time_series?symbol=USD/MXN&interval=1day&outputsize=365&apikey=' + TWELVE_DATA_KEY
                );
                const json = await resp.json();
                if (json.values) {
                    return json.values
                        .filter(d => d.close && d.close !== 'null')
                        .map(d => ({ date: d.datetime, rate: 1 / parseFloat(d.close), source: 'TwelveData' }))
                        .filter(d => !isNaN(d.rate) && d.rate > 0)
                        .sort((a, b) => a.date.localeCompare(b.date));
                }
            } catch (e) {
                console.warn('Twelve Data fetch failed:', e.message);
            }
            return [];
        }

        // Twelve Data intraday for forex (USD/MXN inverted to MXN/USD)
        let twelveDataGranular = {};

        async function fetchTwelveDataGranular(interval, outputsize, rangeKey) {
            try {
                const resp = await fetch(
                    `https://api.twelvedata.com/time_series?symbol=USD/MXN&interval=${interval}&outputsize=${outputsize}&apikey=${TWELVE_DATA_KEY}`
                );
                const json = await resp.json();
                if (json.values) {
                    const data = json.values
                        .filter(d => d.close && d.close !== 'null')
                        .map(d => ({
                            date: d.datetime.replace(' ', 'T'),
                            rate: 1 / parseFloat(d.close),
                            source: 'TwelveData'
                        }))
                        .filter(d => !isNaN(d.rate) && d.rate > 0)
                        .sort((a, b) => a.date.localeCompare(b.date));
                    return { key: rangeKey, data };
                }
            } catch (e) {
                console.warn(`TwelveData ${interval} fetch failed:`, e.message);
            }
            return { key: rangeKey, data: [] };
        }

        function mergePrices(...priceSets) {
            const dateMap = new Map();
            priceSets.forEach(prices => {
                prices.forEach(p => {
                    if (!dateMap.has(p.date)) {
                        dateMap.set(p.date, p);
                    }
                });
            });
            return Array.from(dateMap.values()).sort((a, b) => a.date.localeCompare(b.date));
        }

        async function fetchRates() {
            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading exchange rate data...
                </div>`;

            try {
                dataSources = [];

                // Fetch daily sources + granular Yahoo/TwelveData for each time range
                const [fredResult, frankfurterResult, yahooResult, tdResult, banxicoResult,
                       g1D, g1W, g1M, g3M, g6M, g1Y,
                       td1D, td1W, td1M] = await Promise.allSettled([
                    fetchFRED(),
                    fetchFrankfurter(),
                    fetchYahoo(),
                    fetchTwelveData(),
                    fetchBanxico(),
                    // Granular Yahoo: range / interval / key
                    fetchYahooGranular('1d',  '5m',  1),
                    fetchYahooGranular('5d',  '15m', 7),
                    fetchYahooGranular('1mo', '1h',  30),
                    fetchYahooGranular('3mo', '1h',  90),
                    fetchYahooGranular('6mo', '1h',  180),
                    fetchYahooGranular('1y',  '1h',  365),
                    // Twelve Data intraday (forex has good coverage)
                    fetchTwelveDataGranular('5min', 78, 1),
                    fetchTwelveDataGranular('15min', 200, 7),
                    fetchTwelveDataGranular('1h', 500, 30)
                ]);

                const val = r => r.status === 'fulfilled' ? r.value : [];

                const fredData = val(fredResult);
                const frankfurterData = val(frankfurterResult);
                const yahooData = val(yahooResult);
                const tdData = val(tdResult);
                const banxicoData = val(banxicoResult);

                // Store granular data keyed by range (Yahoo first, Twelve Data as fallback)
                yahooGranularData = {};
                [g1D, g1W, g1M, g3M, g6M, g1Y].forEach(r => {
                    if (r.status === 'fulfilled' && r.value.data.length > 0) {
                        yahooGranularData[r.value.key] = r.value.data;
                    }
                });
                // Fill gaps with Twelve Data intraday
                twelveDataGranular = {};
                [td1D, td1W, td1M].forEach(r => {
                    if (r.status === 'fulfilled' && r.value.data.length > 0) {
                        twelveDataGranular[r.value.key] = r.value.data;
                        // Use Twelve Data if Yahoo didn't return data for this range
                        if (!yahooGranularData[r.value.key]) {
                            yahooGranularData[r.value.key] = r.value.data;
                        }
                    }
                });

                if (fredData.length > 0) dataSources.push('FRED');
                if (banxicoData.length > 0) dataSources.push('Banxico');
                if (frankfurterData.length > 0) dataSources.push('Frankfurter');
                if (yahooData.length > 0) dataSources.push('Yahoo');
                if (tdData.length > 0) dataSources.push('TwelveData');

                // Priority: FRED > Banxico > Frankfurter > Yahoo > Twelve Data
                rateData = mergePrices(fredData, banxicoData, frankfurterData, yahooData, tdData);

                lastUpdated = new Date();

                if (rateData.length === 0) {
                    document.getElementById('content').innerHTML = `
                        <div class="error-msg">
                            Unable to fetch exchange rate data from any source. Check your connection.
                        </div>`;
                    return;
                }

                render();
            } catch (err) {
                document.getElementById('content').innerHTML = `
                    <div class="error-msg">
                        Error fetching data: ${err.message}
                    </div>`;
            }
        }

        function getFilteredRates() {
            // Use granular Yahoo data when available (captures intraday highs/lows)
            if (selectedRange !== 'ytd' && yahooGranularData[selectedRange]) {
                return yahooGranularData[selectedRange];
            }
            // YTD: use the 1Y hourly data filtered from Jan 1
            if (selectedRange === 'ytd' && yahooGranularData[365]) {
                const ytdCutoff = new Date(new Date().getFullYear(), 0, 1);
                return yahooGranularData[365].filter(p => new Date(p.date) >= ytdCutoff);
            }
            // Fallback to daily data
            const cutoff = selectedRange === 'ytd'
                ? new Date(new Date().getFullYear(), 0, 1)
                : (() => { const d = new Date(); d.setDate(d.getDate() - selectedRange); return d; })();
            return rateData.filter(p => new Date(p.date) >= cutoff);
        }

        function getDisplayRate(rate) {
            if (selectedMode === 'usd-mxn') {
                return 1 / rate;
            }
            return rate;
        }

        function render() {
            const rates = getFilteredRates();
            if (rates.length === 0) return;

            const isMxnToUsd = selectedMode === 'mxn-usd';
            const pairLabel = isMxnToUsd ? '1 MXN in USD' : '1 USD in MXN';
            const decimals = isMxnToUsd ? 4 : 2;

            const rangeLabels = { 1: '1D', 7: '1W', 30: '1M', 90: '3M', 180: '6M', ytd: 'YTD', 365: '1Y' };
            const rangeLabel = rangeLabels[selectedRange] || selectedRange + 'd';

            const latest = rates[rates.length - 1];
            const first = rates[0];

            const latestRate = getDisplayRate(latest.rate);
            const firstRate = getDisplayRate(first.rate);

            const change = latestRate - firstRate;
            const pctChange = firstRate ? (change / firstRate) * 100 : 0;
            const isUp = change >= 0;

            const displayRates = rates.map(r => getDisplayRate(r.rate));
            const high = Math.max(...displayRates);
            const low = Math.min(...displayRates);
            const highIdx = displayRates.indexOf(high);
            const lowIdx = displayRates.indexOf(low);
            const avg = displayRates.reduce((s, r) => s + r, 0) / displayRates.length;
            const variance = displayRates.reduce((s, r) => s + Math.pow(r - avg, 2), 0) / (displayRates.length - 1);
            const volatility = (Math.sqrt(variance) / avg) * 100;

            // Format date/time stamps for stats
            function formatStatDate(dateStr) {
                const isIntraday = dateStr.includes('T');
                const d = new Date(isIntraday ? dateStr + 'Z' : dateStr);
                if (isIntraday) {
                    return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
                }
                return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            }
            const highDate = formatStatDate(rates[highIdx].date);
            const lowDate = formatStatDate(rates[lowIdx].date);

            // Find closest point to average and use its date
            let avgIdx = 0, minDiff = Infinity;
            displayRates.forEach((r, i) => {
                const diff = Math.abs(r - avg);
                if (diff < minDiff) { minDiff = diff; avgIdx = i; }
            });
            const avgDate = formatStatDate(rates[avgIdx].date);

            const periodChange = pctChange;

            const inverseRate = isMxnToUsd ? (1 / latest.rate).toFixed(2) : (latest.rate).toFixed(4);
            const inverseLabel = isMxnToUsd ? `1 USD = ${inverseRate} MXN` : `1 MXN = ${inverseRate} USD`;

            const latestDate = latest.date;
            const updatedStr = lastUpdated ? lastUpdated.toLocaleString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: 'numeric', minute: '2-digit', hour12: true
            }) : '—';
            const sourcesTags = dataSources.map(s =>
                `<span class="source-tag source-${s.toLowerCase()}">${s}</span>`
            ).join(' ');

            const color = '#10b981';

            document.getElementById('content').innerHTML = `
                <div class="data-status">
                    <div>Latest data: <strong>${latestDate}</strong> &bull; Updated: <strong>${updatedStr}</strong></div>
                    <div>Sources: ${sourcesTags}</div>
                </div>
                <div class="price-hero">
                    <div>
                        <div class="pair-label"><span class="flag-pair">🇲🇽🇺🇸</span> ${pairLabel}</div>
                        <span class="current-price">$${latestRate.toFixed(decimals)}</span>
                        <div class="inverse-rate">${inverseLabel}</div>
                    </div>
                    <div class="price-change ${isUp ? 'up' : 'down'}">
                        ${isUp ? '&#9650;' : '&#9660;'}
                        ${change >= 0 ? '+' : ''}${change.toFixed(decimals)}
                        (${pctChange >= 0 ? '+' : ''}${pctChange.toFixed(2)}%)
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="rateChart"></canvas>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="label">High</div>
                        <div class="value green">$${high.toFixed(decimals)}</div>
                        <div class="stat-date">${highDate}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Low</div>
                        <div class="value red">$${low.toFixed(decimals)}</div>
                        <div class="stat-date">${lowDate}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Average</div>
                        <div class="value blue">$${avg.toFixed(decimals)}</div>
                        <div class="stat-date">~${avgDate}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Volatility</div>
                        <div class="value purple">${volatility.toFixed(2)}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">${rangeLabel} Change</div>
                        <div class="value ${periodChange >= 0 ? 'green' : 'red'}">${periodChange >= 0 ? '+' : ''}${periodChange.toFixed(2)}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Spread (H-L)</div>
                        <div class="value amber">$${(high - low).toFixed(decimals)}</div>
                    </div>
                </div>

                <div class="recent-table">
                    <h3>Recent Exchange Rates</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Rate</th>
                                <th>Change</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rates.slice(-15).reverse().map((r, i, arr) => {
                                const dr = getDisplayRate(r.rate);
                                const next = i < arr.length - 1 ? arr[i + 1] : null;
                                const nr = next ? getDisplayRate(next.rate) : null;
                                const dayChange = nr ? dr - nr : 0;
                                const dayPct = nr ? (dayChange / nr) * 100 : 0;
                                const cls = dayChange >= 0 ? 'up' : 'down';
                                const isIntraday = r.date.includes('T');
                                let dateLabel;
                                if (isIntraday && selectedRange === 1) {
                                    dateLabel = new Date(r.date + 'Z').toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                                } else if (isIntraday) {
                                    const dt = new Date(r.date + 'Z');
                                    dateLabel = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
                                        dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                                } else {
                                    dateLabel = r.date;
                                }
                                return `<tr>
                                    <td>${dateLabel}</td>
                                    <td><strong>$${dr.toFixed(decimals)}</strong></td>
                                    <td class="price-change ${cls}">
                                        ${dayChange >= 0 ? '+' : ''}${dayChange.toFixed(decimals)}
                                        (${dayPct >= 0 ? '+' : ''}${dayPct.toFixed(2)}%)
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            renderChart(rates, color, decimals);
        }

        function renderChart(prices, color, decimals) {
            const ctx = document.getElementById('rateChart').getContext('2d');

            if (chart) chart.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, color + '40');
            gradient.addColorStop(1, color + '05');

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: prices.map(p => p.date),
                    datasets: [{
                        label: 'Rate',
                        data: prices.map(p => getDisplayRate(p.rate)),
                        borderColor: color,
                        backgroundColor: gradient,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHitRadius: 10,
                        pointHoverRadius: 5,
                        pointHoverBackgroundColor: color
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#252836',
                            titleColor: '#e1e4e8',
                            bodyColor: '#e1e4e8',
                            borderColor: '#2d3040',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: ctx => `$${ctx.parsed.y.toFixed(decimals)}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: (() => {
                                const useGranular = selectedRange !== 'ytd'
                                    ? !!yahooGranularData[selectedRange]
                                    : !!yahooGranularData[365];
                                if (!useGranular) {
                                    return {
                                        parser: 'yyyy-MM-dd',
                                        tooltipFormat: 'MMM d, yyyy',
                                        displayFormats: { day: 'MMM d', week: 'MMM d', month: 'MMM yyyy' }
                                    };
                                }
                                if (selectedRange === 1) {
                                    return {
                                        parser: "yyyy-MM-dd'T'HH:mm:ss",
                                        tooltipFormat: 'MMM d, yyyy h:mm a',
                                        unit: 'hour',
                                        displayFormats: { hour: 'h:mm a', minute: 'h:mm a' }
                                    };
                                }
                                if (selectedRange === 7) {
                                    return {
                                        parser: "yyyy-MM-dd'T'HH:mm:ss",
                                        tooltipFormat: 'MMM d, yyyy h:mm a',
                                        unit: 'day',
                                        displayFormats: { day: 'MMM d', hour: 'MMM d ha' }
                                    };
                                }
                                // 1M, 3M, 6M, 1Y, YTD — hourly data, show days/weeks/months
                                return {
                                    parser: "yyyy-MM-dd'T'HH:mm:ss",
                                    tooltipFormat: 'MMM d, yyyy h:mm a',
                                    displayFormats: { day: 'MMM d', week: 'MMM d', month: 'MMM yyyy' }
                                };
                            })(),
                            grid: {
                                color: '#2d304040',
                                drawBorder: false
                            },
                            ticks: { color: '#8b8fa3', maxTicksLimit: 8 }
                        },
                        y: {
                            grid: {
                                color: '#2d304040',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#8b8fa3',
                                callback: v => '$' + v.toFixed(decimals)
                            }
                        }
                    }
                }
            });
        }

        // Initial load
        fetchRates();
    </script>
</body>
</html>
