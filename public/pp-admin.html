<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaddlePoint — Admin</title>
<link rel="icon" type="image/svg+xml" href="paddle-pin.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh;display:flex;flex-direction:column}
.login{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
.login h1{font-size:28px;font-weight:800;background:linear-gradient(90deg,#06b6d4,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login p{color:#6b7080;font-size:13px}
.login input{background:#1a1d28;border:1px solid #2d3040;color:#e1e4e8;padding:12px 18px;border-radius:10px;font-size:15px;width:260px;text-align:center}
.login button{background:linear-gradient(135deg,#06b6d4,#8b5cf6);color:#fff;border:none;padding:12px 32px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s}
.login button:hover{transform:scale(1.03)}
</style>
</head>
<body>
<style>
#adminPanel{display:none;height:100vh;flex-direction:column}
.topbar{display:flex;align-items:center;background:#1a1d28;border-bottom:1px solid #2d3040;padding:0 20px;height:52px;gap:6px;flex-shrink:0}
.topbar h1{font-size:18px;font-weight:800;background:linear-gradient(90deg,#06b6d4,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:24px}
.tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#6b7080;border:none;background:transparent;transition:all .2s}
.tab:hover{color:#e1e4e8;background:#252836}
.tab.active{color:#fff;background:#252836;box-shadow:inset 0 -2px 0 #06b6d4}
.tab .badge{display:inline-block;background:#2d3040;color:#8b8fa3;font-size:10px;padding:1px 7px;border-radius:10px;margin-left:6px;font-weight:700}
.tab.active .badge{background:#06b6d4;color:#fff}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.topbar-right a{color:#6b7080;text-decoration:none;font-size:12px;transition:color .2s}
.topbar-right a:hover{color:#e1e4e8}
.content{flex:1;overflow:hidden}
.content iframe{width:100%;height:100%;border:none;background:#0f1117}
.panel{display:none;height:100%}
.panel.active{display:block}
@media(max-width:640px){
    .tab{padding:8px 12px;font-size:12px}
    .tab .badge{display:none}
    .topbar h1{font-size:15px;margin-right:12px}
}
</style>

<!-- LOGIN -->
<div class="login" id="loginView">
    <h1>🎯 PaddlePoint Admin</h1>
    <p>Manage clubs, events, gear brands & federations</p>
    <input type="password" id="passInput" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
    <div class="topbar">
        <h1>🎯 Admin</h1>
        <button class="tab active" onclick="switchTab(this,'clubs')">🛶 Clubs <span class="badge" id="badgeClubs">—</span></button>
        <button class="tab" onclick="switchTab(this,'events')">🏁 Events <span class="badge" id="badgeEvents">—</span></button>
        <button class="tab" onclick="switchTab(this,'gear')">🎯 Gear <span class="badge" id="badgeGear">—</span></button>
        <button class="tab" onclick="switchTab(this,'analytics')">📊 Analytics</button>
        <button class="tab" onclick="switchTab(this,'traffic')">📊 Traffic</button>
        <div class="topbar-right">
            <a href="paddlepoint.html">← Back to Site</a>
        </div>
    </div>
    <div class="content">
        <div class="panel active" id="panel-clubs"><iframe id="frame-clubs"></iframe></div>
        <div class="panel" id="panel-events"><iframe id="frame-events"></iframe></div>
        <div class="panel" id="panel-gear"><iframe id="frame-gear"></iframe></div>
        <div class="panel" id="panel-analytics" style="overflow-y:auto;padding:20px;">
            <div style="max-width:1200px;margin:0 auto;" id="analyticsContent">Loading analytics...</div>
        </div>
        <div class="panel" id="panel-traffic"><iframe id="frame-traffic"></iframe></div>
    </div>
</div>

<script>
const PASS='paddle2026';
const PAGES={
    clubs:'paddle-clubs-admin.html',
    events:'paddle-events-admin.html',
    gear:'paddle-gear-admin.html',
    traffic:'paddle-traffic.html'
};
const loaded={};

async function doLogin(){
    const pass=document.getElementById('passInput').value;
    try{
        const res=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({password:pass})});
        if(res.ok){
            document.getElementById('loginView').style.display='none';
            const panel=document.getElementById('adminPanel');
            panel.style.display='flex';
            loadTab('clubs');
            fetchCounts();
        } else alert('Wrong password');
    }catch(e){alert('Login failed: '+e.message);}
}
// Auto-login via session cookie
(async function(){try{const r=await fetch('/api/admin/session',{credentials:'include'});if(r.ok){document.getElementById('passInput').value='••••';doLogin();}}catch(e){}})();

function switchTab(btn, name){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+name).classList.add('active');
    loadTab(name);
}

function loadTab(name){
    if(loaded[name]) return;
    loaded[name]=true;
    if(name==='analytics'){loadAnalytics();return;}
    const frame=document.getElementById('frame-'+name);
    frame.src=PAGES[name];
}

async function loadAnalytics(){
    const C='https://visitor-counter.newtonmac.workers.dev';
    const pages=['paddlepoint','conditions','clubs','weather','events','gear','federations'];
    const container=document.getElementById('analyticsContent');
    container.innerHTML='<div style="color:#6b7080;">Loading analytics across all pages...</div>';
    
    let html='<h2 style="font-size:18px;margin-bottom:16px;background:linear-gradient(90deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">📊 Site Analytics — Last 7 Days</h2>';
    
    // Fetch stats + referrers for all pages
    const allStats={}, allRefs={};
    await Promise.all(pages.map(async p=>{
        try{
            const [s,r]=await Promise.all([
                fetch(`${C}/stats?page=${p}`).then(r=>r.json()),
                fetch(`${C}/stats/referrers?page=${p}`).then(r=>r.json())
            ]);
            allStats[p]=s;
            allRefs[p]=r;
        }catch(e){allStats[p]={total:0,days:[]};allRefs[p]={totals:{}};}
    }));

    // Overview cards
    html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px;">';
    for(const p of pages){
        const s=allStats[p];
        const week=s.days?s.days.reduce((a,d)=>a+d.uniqueVisitors,0):0;
        const today=s.days&&s.days.length?s.days[s.days.length-1].uniqueVisitors:0;
        const label=p==='paddlepoint'?'Home':p==='conditions'?'Water':p.charAt(0).toUpperCase()+p.slice(1);
        html+=`<div style="background:#1a1d28;border:1px solid #2d3040;border-radius:12px;padding:16px;text-align:center;">
            <div style="font-size:24px;font-weight:800;color:#06b6d4;">${s.total||0}</div>
            <div style="font-size:11px;color:#6b7080;margin-top:2px;">${label}</div>
            <div style="font-size:11px;color:#8b8fa3;margin-top:4px;">Today: ${today} · Week: ${week}</div>
        </div>`;
    }
    html+='</div>';

    // Referrers table
    html+='<h3 style="font-size:15px;color:#e1e4e8;margin-bottom:10px;">🔗 Where Visitors Come From</h3>';
    html+='<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:24px;">';
    html+='<thead><tr><th style="text-align:left;padding:8px 12px;color:#8b8fa3;border-bottom:1px solid #2d3040;">Page</th><th style="text-align:left;padding:8px 12px;color:#8b8fa3;border-bottom:1px solid #2d3040;">Source</th><th style="text-align:right;padding:8px 12px;color:#8b8fa3;border-bottom:1px solid #2d3040;">Visitors</th></tr></thead><tbody>';
    for(const p of pages){
        const refs=allRefs[p].totals||{};
        const sorted=Object.entries(refs).sort((a,b)=>b[1]-a[1]);
        const label=p==='paddlepoint'?'Home':p==='conditions'?'Water':p.charAt(0).toUpperCase()+p.slice(1);
        if(sorted.length===0){
            html+=`<tr><td style="padding:8px 12px;border-bottom:1px solid #1a1d28;color:#e1e4e8;">${label}</td><td style="padding:8px 12px;border-bottom:1px solid #1a1d28;color:#6b7080;">—</td><td style="padding:8px 12px;border-bottom:1px solid #1a1d28;text-align:right;">0</td></tr>`;
        } else {
            sorted.forEach((ref,i)=>{
                const srcColor=ref[0]==='Direct'?'#fbbf24':ref[0].includes('google')?'#34d399':ref[0].includes('facebook')?'#60a5fa':ref[0].includes('reddit')?'#f97316':'#a78bfa';
                html+=`<tr><td style="padding:6px 12px;border-bottom:1px solid #1a1d28;color:#e1e4e8;">${i===0?label:''}</td>
                    <td style="padding:6px 12px;border-bottom:1px solid #1a1d28;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${srcColor};margin-right:8px;"></span><span style="color:#e1e4e8;">${ref[0]}</span></td>
                    <td style="padding:6px 12px;border-bottom:1px solid #1a1d28;text-align:right;color:#06b6d4;font-weight:600;">${ref[1]}</td></tr>`;
            });
        }
    }
    html+='</tbody></table>';

    // Daily breakdown for homepage (most interesting)
    const homeStats=allStats['paddlepoint'];
    if(homeStats.days&&homeStats.days.length){
        html+='<h3 style="font-size:15px;color:#e1e4e8;margin-bottom:10px;">📅 Daily Visitors (Home Page)</h3>';
        html+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;">';
        homeStats.days.forEach(d=>{
            const date=new Date(d.date+'T12:00:00');
            const dayName=date.toLocaleDateString('en-US',{weekday:'short'});
            const dayNum=date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
            const cities=Object.entries(d.cities||{}).map(c=>`${c[0]}: ${c[1]}`).join(', ');
            html+=`<div style="background:#1a1d28;border:1px solid #2d3040;border-radius:10px;padding:12px 16px;min-width:120px;text-align:center;" title="${cities}">
                <div style="font-size:20px;font-weight:800;color:#06b6d4;">${d.uniqueVisitors}</div>
                <div style="font-size:11px;color:#6b7080;">${dayName} ${dayNum}</div>
            </div>`;
        });
        html+='</div>';
    }

    container.innerHTML=html;
}

async function fetchCounts(){
    const token='pp-clubs-7742-v1';
    const h={headers:{'X-API-Token':token}};
    try{
        const [c,e,g]=await Promise.all([
            fetch('/api/clubs',h).then(r=>r.json()).then(d=>d.length).catch(()=>'?'),
            fetch('/api/events',h).then(r=>r.json()).then(d=>d.length).catch(()=>'?'),
            fetch('/api/gear-brands',h).then(r=>r.json()).then(d=>d.length).catch(()=>'?'),
        ]);
        document.getElementById('badgeClubs').textContent=c.toLocaleString();
        document.getElementById('badgeEvents').textContent=e;
        document.getElementById('badgeGear').textContent=g;
    }catch(e){}
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('loginView').style.display!=='none')doLogin();});
</script>
</body>
</html>
