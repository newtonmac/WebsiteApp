<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold, Silver &amp; Bitcoin Price Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1d28, #252836);
            padding: 24px 32px;
            border-bottom: 1px solid #2d3040;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #8b8fa3;
            margin-top: 4px;
            font-size: 14px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .btn-group {
            display: flex;
            background: #1a1d28;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2d3040;
        }

        .btn-group button {
            padding: 10px 20px;
            background: transparent;
            color: #8b8fa3;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-group button.active {
            background: #f59e0b;
            color: white;
        }

        .btn-group button:hover:not(.active) {
            color: #e1e4e8;
            background: #252836;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: #1a1d28;
            color: #8b8fa3;
            border: 1px solid #2d3040;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            margin-left: auto;
        }

        .refresh-btn:hover {
            background: #252836;
            color: #e1e4e8;
        }

        .price-hero {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 24px;
            padding: 24px;
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            flex-wrap: wrap;
        }

        .price-hero .current-price {
            font-size: 48px;
            font-weight: 700;
        }

        .price-hero .price-change {
            font-size: 18px;
            font-weight: 600;
        }

        .price-hero .price-change.up { color: #34d399; }
        .price-hero .price-change.down { color: #f87171; }

        .price-hero .metal-label {
            font-size: 16px;
            color: #8b8fa3;
        }

        .price-hero .metal-icon {
            font-size: 28px;
            margin-right: 4px;
        }

        .chart-container {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
            margin-bottom: 24px;
        }

        .chart-container {
            position: relative;
            height: 350px;
            margin-bottom: 24px;
        }

        .chart-container canvas {
            max-height: 400px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 13px;
            color: #8b8fa3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-card .value.green { color: #34d399; }
        .stat-card .value.red { color: #f87171; }
        .stat-card .value.blue { color: #60a5fa; }
        .stat-card .value.purple { color: #a78bfa; }
        .stat-card .value.amber { color: #fbbf24; }

        .recent-table {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
        }

        .recent-table h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        .recent-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .recent-table th {
            text-align: left;
            padding: 10px 12px;
            color: #8b8fa3;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2d3040;
        }

        .recent-table td {
            padding: 12px;
            border-bottom: 1px solid #1e2130;
            font-size: 14px;
        }

        .recent-table tr:last-child td {
            border-bottom: none;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #8b8fa3;
            font-size: 16px;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2d3040;
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: #1a1d28;
            border: 1px solid #f8717133;
            color: #f87171;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .data-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 20px;
            background: #1a1d28;
            border-radius: 12px;
            border: 1px solid #2d3040;
            margin-bottom: 24px;
            font-size: 13px;
            color: #8b8fa3;
        }

        .data-status .source-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-status .source-freegoldapi { background: #fbbf2420; color: #fbbf24; }
        .data-status .source-coingecko { background: #8dc63f20; color: #8dc63f; }
        .data-status .source-metals\.live { background: #e0e0e020; color: #e0e0e0; }

        .nav-link {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 14px;
            background: #252836;
            color: #60a5fa;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #2d3040;
            transition: all 0.2s;
        }
        .nav-link:hover { background: #2d3040; color: #a78bfa; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Gold, Silver &amp; Bitcoin Tracker</h1>
        <p>Live data &bull; FreeGoldAPI, CoinGecko &amp; metals.live &bull; Daily + Intraday</p>
        <a href="index.html" class="nav-link">&larr; Oil Tracker</a>
        <a href="currency-tracker.html" class="nav-link">MXN/USD Tracker &rarr;</a>
        <a href="flight-tracker.html" class="nav-link">Flight Tracker &rarr;</a>
        <a href="traffic-dashboard.html" class="nav-link">Traffic Dashboard</a>
        <a href="powerwall-dashboard.html" class="nav-link">Powerwall Dashboard</a>
        <a href="webcam-dashboard.html" class="nav-link">SD Webcams</a>
    </div>

    <div class="container">
        <div class="controls">
            <div class="btn-group" id="metalType">
                <button class="active" data-type="gold">Gold</button>
                <button data-type="silver">Silver</button>
                <button data-type="bitcoin">Bitcoin</button>
            </div>
            <div class="btn-group" id="timeRange">
                <button data-range="1d">1D</button>
                <button data-range="7">1W</button>
                <button class="active" data-range="30">1M</button>
                <button data-range="90">3M</button>
                <button data-range="180">6M</button>
                <button data-range="ytd">YTD</button>
                <button data-range="365">1Y</button>
            </div>
            <button class="refresh-btn" id="refreshBtn">&#x21bb; Refresh</button>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Loading live precious metal prices...
            </div>
        </div>
    </div>

    <script>
        let goldPrices = [];
        let silverPrices = [];
        let bitcoinPrices = [];
        let intradayGold = [];
        let intradaySilver = [];
        let intradayBitcoin = [];
        let selectedType = 'gold';
        let selectedRange = 30;
        let chart = null;
        let lastUpdated = null;
        let dataSources = [];

        // Controls
        document.querySelectorAll('#metalType button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#metalType button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedType = btn.dataset.type;
                render();
            });
        });

        document.querySelectorAll('#timeRange button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#timeRange button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const r = btn.dataset.range;
                selectedRange = r === 'ytd' ? 'ytd' : r === '1d' ? '1d' : parseInt(r);
                render();
            });
        });

        document.getElementById('refreshBtn').addEventListener('click', fetchAllPrices);

        function formatPrice(value) {
            if (selectedType === 'bitcoin') {
                return '$' + value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }
            return '$' + value.toFixed(2);
        }

        // Free Gold API - no key required, CORS enabled
        // Try CSV first (has silver data), fall back to JSON (gold only)
        async function fetchGoldSilverPrices() {
            const oneYearAgo = new Date();
            oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
            const startDate = oneYearAgo.toISOString().split('T')[0];

            // Attempt 1: CSV with gold + silver ratio data
            try {
                console.log('Fetching gold/silver CSV from freegoldapi.com...');
                const resp = await fetch('https://freegoldapi.com/data/gold_silver_ratio_enriched.csv');
                if (!resp.ok) throw new Error('CSV HTTP ' + resp.status);
                const text = await resp.text();
                console.log('CSV fetched, length:', text.length);
                const lines = text.trim().split('\n').slice(1);

                const gold = [];
                const silver = [];

                for (const line of lines) {
                    const [date, price, currency, ratio] = line.split(',');
                    if (currency !== 'USD' || !price || date < startDate) continue;

                    const goldPrice = parseFloat(price);
                    if (isNaN(goldPrice)) continue;

                    gold.push({ date, price: goldPrice, source: 'FreeGoldAPI' });

                    if (ratio) {
                        const silverPrice = goldPrice / parseFloat(ratio);
                        if (!isNaN(silverPrice)) {
                            silver.push({ date, price: silverPrice, source: 'FreeGoldAPI' });
                        }
                    }
                }

                console.log('Parsed gold:', gold.length, 'silver:', silver.length);
                if (gold.length > 0) return { gold, silver };
            } catch (e) {
                console.warn('FreeGoldAPI CSV failed:', e.message);
            }

            // Attempt 2: JSON endpoint (gold only, no silver ratios)
            try {
                console.log('Trying JSON fallback from freegoldapi.com...');
                const resp = await fetch('https://freegoldapi.com/data/latest.json');
                if (!resp.ok) throw new Error('JSON HTTP ' + resp.status);
                const data = await resp.json();
                console.log('JSON fetched, entries:', data.length);

                const gold = data
                    .filter(d => d.date >= startDate && d.price > 0 && d.source && d.source.includes('yahoo'))
                    .map(d => ({ date: d.date, price: d.price, source: 'FreeGoldAPI' }));

                console.log('JSON gold entries:', gold.length);
                return { gold, silver: [] };
            } catch (e) {
                console.warn('FreeGoldAPI JSON also failed:', e.message);
            }

            return { gold: [], silver: [] };
        }

        // CoinGecko for Bitcoin (free, CORS enabled, no API key)
        async function fetchBitcoin() {
            try {
                console.log('Fetching Bitcoin from CoinGecko...');
                const resp = await fetch(
                    'https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=365&interval=daily'
                );
                if (!resp.ok) throw new Error('CoinGecko HTTP ' + resp.status);
                const json = await resp.json();

                if (json.prices) {
                    const results = json.prices.map(([timestamp, price]) => {
                        const d = new Date(timestamp);
                        const date = d.toISOString().split('T')[0];
                        return { date, price, source: 'CoinGecko' };
                    });
                    console.log('Bitcoin entries:', results.length);
                    return results;
                }
            } catch (e) {
                console.warn('CoinGecko fetch failed:', e.message);
            }
            return [];
        }

        // Intraday Bitcoin from CoinGecko (days=1 gives ~5-min intervals)
        async function fetchIntradayBitcoin() {
            try {
                const resp = await fetch(
                    'https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=1'
                );
                if (!resp.ok) throw new Error('CoinGecko HTTP ' + resp.status);
                const json = await resp.json();
                if (json.prices) {
                    return json.prices.map(([timestamp, price]) => ({
                        date: new Date(timestamp).toISOString(),
                        price,
                        source: 'CoinGecko'
                    }));
                }
            } catch (e) {
                console.warn('CoinGecko intraday failed:', e.message);
            }
            return [];
        }

        // Intraday gold from metals.live
        async function fetchIntradayGold() {
            try {
                const resp = await fetch('https://api.metals.live/v1/spot/gold');
                if (!resp.ok) throw new Error('metals.live HTTP ' + resp.status);
                const data = await resp.json();
                if (Array.isArray(data)) {
                    return data
                        .filter(d => d.timestamp && d.price)
                        .map(d => ({
                            date: new Date(d.timestamp * 1000).toISOString(),
                            price: parseFloat(d.price),
                            source: 'metals.live'
                        }))
                        .sort((a, b) => a.date.localeCompare(b.date));
                }
            } catch (e) {
                console.warn('metals.live gold intraday failed:', e.message);
            }
            return [];
        }

        // Intraday silver from metals.live
        async function fetchIntradaySilver() {
            try {
                const resp = await fetch('https://api.metals.live/v1/spot/silver');
                if (!resp.ok) throw new Error('metals.live HTTP ' + resp.status);
                const data = await resp.json();
                if (Array.isArray(data)) {
                    return data
                        .filter(d => d.timestamp && d.price)
                        .map(d => ({
                            date: new Date(d.timestamp * 1000).toISOString(),
                            price: parseFloat(d.price),
                            source: 'metals.live'
                        }))
                        .sort((a, b) => a.date.localeCompare(b.date));
                }
            } catch (e) {
                console.warn('metals.live silver intraday failed:', e.message);
            }
            return [];
        }

        async function fetchAllPrices() {
            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading from multiple sources...
                </div>`;

            try {
                dataSources = [];

                const [metalsResult, btcResult, idGold, idSilver, idBtc] = await Promise.allSettled([
                    fetchGoldSilverPrices(),
                    fetchBitcoin(),
                    fetchIntradayGold(),
                    fetchIntradaySilver(),
                    fetchIntradayBitcoin()
                ]);

                const metals = metalsResult.status === 'fulfilled' ? metalsResult.value : { gold: [], silver: [] };
                const btcData = btcResult.status === 'fulfilled' ? btcResult.value : [];
                const val = r => r.status === 'fulfilled' ? r.value : [];

                console.log('Metals result:', metalsResult.status, 'gold:', metals.gold.length, 'silver:', metals.silver.length);
                console.log('BTC result:', btcResult.status, 'count:', btcData.length);
                if (metalsResult.status === 'rejected') console.error('Metals error:', metalsResult.reason);
                if (btcResult.status === 'rejected') console.error('BTC error:', btcResult.reason);

                if (metals.gold.length > 0 || metals.silver.length > 0) dataSources.push('FreeGoldAPI');
                if (btcData.length > 0) dataSources.push('CoinGecko');

                intradayGold = val(idGold);
                intradaySilver = val(idSilver);
                intradayBitcoin = val(idBtc);
                if (intradayGold.length > 0 || intradaySilver.length > 0) {
                    if (!dataSources.includes('metals.live')) dataSources.push('metals.live');
                }

                goldPrices = metals.gold;
                silverPrices = metals.silver;
                bitcoinPrices = btcData;

                lastUpdated = new Date();

                if (goldPrices.length === 0 && silverPrices.length === 0 && bitcoinPrices.length === 0) {
                    const errors = [];
                    if (metalsResult.status === 'rejected') errors.push('Gold/Silver: ' + metalsResult.reason);
                    if (btcResult.status === 'rejected') errors.push('Bitcoin: ' + btcResult.reason);
                    document.getElementById('content').innerHTML = `
                        <div class="error-msg">
                            Unable to fetch data from any source. Check your connection and browser console for details.
                            ${errors.length ? '<br>' + errors.join('<br>') : ''}
                        </div>`;
                    return;
                }

                render();
            } catch (err) {
                document.getElementById('content').innerHTML = `
                    <div class="error-msg">
                        Error fetching data: ${err.message}
                    </div>`;
            }
        }

        function getFilteredPrices() {
            if (selectedRange === '1d') {
                const intradayMap = { gold: intradayGold, silver: intradaySilver, bitcoin: intradayBitcoin };
                return intradayMap[selectedType] || [];
            }
            const typeMap = { gold: goldPrices, silver: silverPrices, bitcoin: bitcoinPrices };
            const all = typeMap[selectedType] || goldPrices;
            const cutoff = selectedRange === 'ytd'
                ? new Date(new Date().getFullYear(), 0, 1)
                : (() => { const d = new Date(); d.setDate(d.getDate() - selectedRange); return d; })();
            return all.filter(p => new Date(p.date) >= cutoff);
        }

        function render() {
            const prices = getFilteredPrices();
            if (prices.length === 0) return;

            const latest = prices[prices.length - 1];
            const prev = prices.length >= 2 ? prices[prices.length - 2] : null;
            const change = prev ? latest.price - prev.price : 0;
            const pctChange = prev ? (change / prev.price) * 100 : 0;
            const isUp = change >= 0;

            const high = Math.max(...prices.map(p => p.price));
            const low = Math.min(...prices.map(p => p.price));
            const avg = prices.reduce((s, p) => s + p.price, 0) / prices.length;
            const variance = prices.reduce((s, p) => s + Math.pow(p.price - avg, 2), 0) / (prices.length - 1);
            const volatility = (Math.sqrt(variance) / avg) * 100;

            // Period change (first to last)
            const first = prices[0];
            const periodChange = latest.price - first.price;
            const periodPct = (periodChange / first.price) * 100;

            const typeLabels = { gold: 'Gold (XAU/USD)', silver: 'Silver (XAG/USD)', bitcoin: 'Bitcoin (BTC/USD)' };
            const typeColors = { gold: '#fbbf24', silver: '#94a3b8', bitcoin: '#f7931a' };
            const typeLabel = typeLabels[selectedType];
            const color = typeColors[selectedType];

            const latestDate = latest.date;
            const updatedStr = lastUpdated ? lastUpdated.toLocaleString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: 'numeric', minute: '2-digit', hour12: true
            }) : '—';
            const sourcesTags = dataSources.map(s =>
                `<span class="source-tag source-${s.toLowerCase()}">${s}</span>`
            ).join(' ');

            document.getElementById('content').innerHTML = `
                <div class="data-status">
                    <div>Latest data: <strong>${selectedRange === '1d' ? new Date(latestDate).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true }) : latestDate}</strong>${selectedRange === '1d' ? ' (intraday)' : ''} &bull; Updated: <strong>${updatedStr}</strong></div>
                    <div>Sources: ${sourcesTags}</div>
                </div>
                <div class="price-hero">
                    <div>
                        <div class="metal-label">${typeLabel}</div>
                        <span class="current-price">${formatPrice(latest.price)}</span>
                    </div>
                    <div class="price-change ${isUp ? 'up' : 'down'}">
                        ${isUp ? '&#9650;' : '&#9660;'}
                        ${change >= 0 ? '+' : ''}${formatPrice(Math.abs(change)).replace('$', change < 0 ? '-$' : '$')}
                        (${pctChange >= 0 ? '+' : ''}${pctChange.toFixed(2)}%)
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="label">High</div>
                        <div class="value green">${formatPrice(high)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Low</div>
                        <div class="value red">${formatPrice(low)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Average</div>
                        <div class="value blue">${formatPrice(avg)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Volatility</div>
                        <div class="value purple">${volatility.toFixed(2)}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Period Change</div>
                        <div class="value ${periodChange >= 0 ? 'green' : 'red'}">
                            ${periodChange >= 0 ? '+' : '-'}${formatPrice(Math.abs(periodChange))}
                            (${periodPct >= 0 ? '+' : ''}${periodPct.toFixed(2)}%)
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Spread (High-Low)</div>
                        <div class="value amber">${formatPrice(high - low)}</div>
                    </div>
                </div>

                <div class="recent-table">
                    <h3>Recent Prices</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>${selectedRange === '1d' ? 'Time' : 'Date'}</th>
                                <th>Price</th>
                                <th>Change</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${prices.slice(-15).reverse().map((p, i, arr) => {
                                const next = i < arr.length - 1 ? arr[i + 1] : null;
                                const dayChange = next ? p.price - next.price : 0;
                                const dayPct = next ? (dayChange / next.price) * 100 : 0;
                                const cls = dayChange >= 0 ? 'up' : 'down';
                                const displayDate = selectedRange === '1d'
                                    ? new Date(p.date).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true })
                                    : p.date;
                                return `<tr>
                                    <td>${displayDate}</td>
                                    <td><strong>${formatPrice(p.price)}</strong></td>
                                    <td class="price-change ${cls}">
                                        ${dayChange >= 0 ? '+' : '-'}${formatPrice(Math.abs(dayChange)).replace('$','')}
                                        (${dayPct >= 0 ? '+' : ''}${dayPct.toFixed(2)}%)
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            renderChart(prices, color, selectedRange === '1d');
        }

        function renderChart(prices, color, intraday) {
            const ctx = document.getElementById('priceChart').getContext('2d');

            if (chart) chart.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, color + '40');
            gradient.addColorStop(1, color + '05');

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: prices.map(p => p.date),
                    datasets: [{
                        label: 'Price (USD)',
                        data: prices.map(p => p.price),
                        borderColor: color,
                        backgroundColor: gradient,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHitRadius: 10,
                        pointHoverRadius: 5,
                        pointHoverBackgroundColor: color
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#252836',
                            titleColor: '#e1e4e8',
                            bodyColor: '#e1e4e8',
                            borderColor: '#2d3040',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: ctx => formatPrice(ctx.parsed.y)
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: intraday ? {
                                tooltipFormat: 'MMM d, h:mm a',
                                displayFormats: {
                                    hour: 'h:mm a',
                                    minute: 'h:mm a'
                                }
                            } : {
                                parser: 'yyyy-MM-dd',
                                tooltipFormat: 'MMM d, yyyy',
                                displayFormats: {
                                    day: 'MMM d',
                                    week: 'MMM d',
                                    month: 'MMM yyyy'
                                }
                            },
                            grid: {
                                color: '#2d304040',
                                drawBorder: false
                            },
                            ticks: { color: '#8b8fa3', maxTicksLimit: 8 }
                        },
                        y: {
                            grid: {
                                color: '#2d304040',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#8b8fa3',
                                callback: v => '$' + v.toLocaleString('en-US')
                            }
                        }
                    }
                }
            });
        }

        // Initial load
        fetchAllPrices();
    </script>
</body>
</html>
