<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold, Silver &amp; Bitcoin Price Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1d28, #252836);
            padding: 24px 32px;
            border-bottom: 1px solid #2d3040;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #8b8fa3;
            margin-top: 4px;
            font-size: 14px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .btn-group {
            display: flex;
            background: #1a1d28;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2d3040;
        }

        .btn-group button {
            padding: 10px 20px;
            background: transparent;
            color: #8b8fa3;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-group button.active {
            background: #f59e0b;
            color: white;
        }

        .btn-group button:hover:not(.active) {
            color: #e1e4e8;
            background: #252836;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: #1a1d28;
            color: #8b8fa3;
            border: 1px solid #2d3040;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            margin-left: auto;
        }

        .refresh-btn:hover {
            background: #252836;
            color: #e1e4e8;
        }

        .price-hero {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 24px;
            padding: 24px;
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            flex-wrap: wrap;
        }

        .price-hero .current-price {
            font-size: 48px;
            font-weight: 700;
        }

        .price-hero .price-change {
            font-size: 18px;
            font-weight: 600;
        }

        .price-hero .price-change.up { color: #34d399; }
        .price-hero .price-change.down { color: #f87171; }

        .price-hero .metal-label {
            font-size: 16px;
            color: #8b8fa3;
        }

        .price-hero .metal-icon {
            font-size: 28px;
            margin-right: 4px;
        }

        .chart-container {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
            margin-bottom: 24px;
        }

        .chart-container {
            position: relative;
            height: 350px;
            margin-bottom: 24px;
        }

        .chart-container canvas {
            max-height: 400px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 13px;
            color: #8b8fa3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-card .value.green { color: #34d399; }
        .stat-card .value.red { color: #f87171; }
        .stat-card .value.blue { color: #60a5fa; }
        .stat-card .value.purple { color: #a78bfa; }
        .stat-card .value.amber { color: #fbbf24; }

        .recent-table {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
        }

        .recent-table h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        .recent-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .recent-table th {
            text-align: left;
            padding: 10px 12px;
            color: #8b8fa3;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2d3040;
        }

        .recent-table td {
            padding: 12px;
            border-bottom: 1px solid #1e2130;
            font-size: 14px;
        }

        .recent-table tr:last-child td {
            border-bottom: none;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #8b8fa3;
            font-size: 16px;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2d3040;
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: #1a1d28;
            border: 1px solid #f8717133;
            color: #f87171;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .data-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 20px;
            background: #1a1d28;
            border-radius: 12px;
            border: 1px solid #2d3040;
            margin-bottom: 24px;
            font-size: 13px;
            color: #8b8fa3;
        }

        .data-status .source-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-status .source-freegoldapi { background: #fbbf2420; color: #fbbf24; }
        .data-status .source-coingecko { background: #8dc63f20; color: #8dc63f; }
        .data-status .source-yahoo { background: #6d28d920; color: #c084fc; }
        .data-status .source-twelvedata { background: #10b98120; color: #34d399; }
        .data-status .source-metals\.live { background: #e0e0e020; color: #e0e0e0; }

        .nav-link {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 14px;
            background: #252836;
            color: #60a5fa;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #2d3040;
            transition: all 0.2s;
        }
        .nav-link:hover { background: #2d3040; color: #a78bfa; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Gold, Silver &amp; Bitcoin Tracker</h1>
        <p>Live data &bull; CoinGecko, Yahoo, Twelve Data &amp; metals.live &bull; Daily + Intraday</p>
        <a href="index.html" class="nav-link">&larr; Oil Tracker</a>
        <a href="currency-tracker.html" class="nav-link">MXN/USD Tracker &rarr;</a>
        <a href="flight-tracker.html" class="nav-link">Flight Tracker &rarr;</a>
        <a href="traffic-dashboard.html" class="nav-link">Traffic Dashboard</a>
        <a href="powerwall-dashboard.html" class="nav-link">Powerwall Dashboard</a>
        <a href="webcam-dashboard.html" class="nav-link">SD Webcams</a>
    </div>

    <div class="container">
        <div class="controls">
            <div class="btn-group" id="metalType">
                <button class="active" data-type="gold">Gold</button>
                <button data-type="silver">Silver</button>
                <button data-type="bitcoin">Bitcoin</button>
            </div>
            <div class="btn-group" id="timeRange">
                <button data-range="1">1D</button>
                <button data-range="7">1W</button>
                <button class="active" data-range="30">1M</button>
                <button data-range="90">3M</button>
                <button data-range="180">6M</button>
                <button data-range="ytd">YTD</button>
                <button data-range="365">1Y</button>
            </div>
            <button class="refresh-btn" id="refreshBtn">&#x21bb; Refresh</button>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Loading live precious metal prices...
            </div>
        </div>
    </div>

    <script>
        let goldPrices = [];
        let silverPrices = [];
        let bitcoinPrices = [];
        let intradaySilver = [];
        let intradayBitcoin = [];
        let selectedType = 'gold';
        let selectedRange = 30;
        let chart = null;
        let lastUpdated = null;
        let dataSources = [];

        // Controls
        document.querySelectorAll('#metalType button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#metalType button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedType = btn.dataset.type;
                render();
            });
        });

        document.querySelectorAll('#timeRange button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#timeRange button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const r = btn.dataset.range;
                selectedRange = r === 'ytd' ? 'ytd' : parseInt(r);
                render();
            });
        });

        document.getElementById('refreshBtn').addEventListener('click', fetchAllPrices);

        // Yahoo Finance (via CORS proxy)
        async function fetchYahooFinance(symbol) {
            try {
                const targetUrl = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(symbol) +
                    '?range=1y&interval=1d';
                const resp = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl));
                const json = await resp.json();
                if (json.chart && json.chart.result && json.chart.result[0]) {
                    const result = json.chart.result[0];
                    const timestamps = result.timestamp || [];
                    const closes = result.indicators.quote[0].close || [];
                    return timestamps.map((ts, i) => {
                        const d = new Date(ts * 1000);
                        const dateStr = d.toISOString().split('T')[0];
                        return { date: dateStr, price: closes[i], source: 'Yahoo' };
                    }).filter(p => p.price != null && !isNaN(p.price));
                }
            } catch (e) {
                console.warn('Yahoo Finance fetch failed:', e.message);
            }
            return [];
        }

        // Yahoo Finance intraday/hourly data for all time ranges
        // Keyed by range: { 1: [...], 7: [...], 30: [...], 90: [...], 180: [...], 365: [...] }
        let yahooGranularData = {};

        function parseYahooIntraday(json) {
            if (json.chart && json.chart.result && json.chart.result[0]) {
                const result = json.chart.result[0];
                const timestamps = result.timestamp || [];
                const closes = result.indicators.quote[0].close || [];
                return timestamps.map((ts, i) => {
                    const d = new Date(ts * 1000);
                    const dateStr = d.toISOString().replace('Z', '').slice(0, 19);
                    return { date: dateStr, price: closes[i], source: 'Yahoo' };
                }).filter(p => p.price != null && !isNaN(p.price) && p.price > 0);
            }
            return [];
        }

        async function fetchYahooGranular(yahooRange, interval, rangeKey) {
            try {
                const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/GC%3DF?range=${yahooRange}&interval=${interval}`;
                const resp = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl));
                return { key: rangeKey, data: parseYahooIntraday(await resp.json()) };
            } catch (e) {
                console.warn(`Yahoo ${yahooRange}/${interval} fetch failed:`, e.message);
            }
            return { key: rangeKey, data: [] };
        }

        // Twelve Data API
        const TWELVE_DATA_KEY = '52f351e2d67042889eb1c6d16cd9769f';

        async function fetchTwelveData(symbol) {
            try {
                const resp = await fetch(
                    'https://api.twelvedata.com/time_series?symbol=' + encodeURIComponent(symbol) +
                    '&interval=1day&outputsize=365&apikey=' + TWELVE_DATA_KEY
                );
                const json = await resp.json();
                if (json.values) {
                    return json.values
                        .filter(d => d.close && d.close !== 'null')
                        .map(d => ({ date: d.datetime, price: parseFloat(d.close), source: 'TwelveData' }))
                        .sort((a, b) => a.date.localeCompare(b.date));
                }
            } catch (e) {
                console.warn('Twelve Data fetch failed:', e.message);
            }
            return [];
        }

        function mergePrices(...priceSets) {
            const dateMap = new Map();
            priceSets.forEach(prices => {
                prices.forEach(p => {
                    if (!dateMap.has(p.date)) dateMap.set(p.date, p);
                });
            });
            return Array.from(dateMap.values()).sort((a, b) => a.date.localeCompare(b.date));
        }

        function formatPrice(value) {
            if (selectedType === 'bitcoin') {
                return '$' + value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }
            return '$' + value.toFixed(2);
        }

        // FreeGoldAPI - removed (site is down/404)

        // CoinGecko for Bitcoin (free, CORS enabled, no API key)
        async function fetchBitcoin() {
            try {
                console.log('Fetching Bitcoin from CoinGecko...');
                const resp = await fetch(
                    'https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=365&interval=daily'
                );
                if (!resp.ok) throw new Error('CoinGecko HTTP ' + resp.status);
                const json = await resp.json();

                if (json.prices) {
                    const results = json.prices.map(([timestamp, price]) => {
                        const d = new Date(timestamp);
                        const date = d.toISOString().split('T')[0];
                        return { date, price, source: 'CoinGecko' };
                    });
                    console.log('Bitcoin entries:', results.length);
                    return results;
                }
            } catch (e) {
                console.warn('CoinGecko fetch failed:', e.message);
            }
            return [];
        }

        // Intraday Bitcoin from CoinGecko (days=1 gives ~5-min intervals)
        async function fetchIntradayBitcoin() {
            try {
                const resp = await fetch(
                    'https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=1'
                );
                if (!resp.ok) throw new Error('CoinGecko HTTP ' + resp.status);
                const json = await resp.json();
                if (json.prices) {
                    return json.prices.map(([timestamp, price]) => ({
                        date: new Date(timestamp).toISOString().replace('Z', '').slice(0, 19),
                        price,
                        source: 'CoinGecko'
                    }));
                }
            } catch (e) {
                console.warn('CoinGecko intraday failed:', e.message);
            }
            return [];
        }

        // Intraday silver from metals.live
        async function fetchIntradaySilver() {
            try {
                const resp = await fetch('https://api.metals.live/v1/spot/silver');
                if (!resp.ok) throw new Error('metals.live HTTP ' + resp.status);
                const data = await resp.json();
                if (Array.isArray(data)) {
                    return data
                        .filter(d => d.timestamp && d.price)
                        .map(d => ({
                            date: new Date(d.timestamp * 1000).toISOString().replace('Z', '').slice(0, 19),
                            price: parseFloat(d.price),
                            source: 'metals.live'
                        }))
                        .sort((a, b) => a.date.localeCompare(b.date));
                }
            } catch (e) {
                console.warn('metals.live silver intraday failed:', e.message);
            }
            return [];
        }

        async function fetchAllPrices() {
            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading from multiple sources...
                </div>`;

            try {
                dataSources = [];

                const [btcResult, yahooGold, yahooSilver, yahooBtc, tdGold, tdBtc,
                       g1D, g1W, g1M, g3M, g6M, g1Y,
                       idSilver, idBtc] = await Promise.allSettled([
                    fetchBitcoin(),
                    fetchYahooFinance('GC=F'),
                    fetchYahooFinance('SI=F'),
                    fetchYahooFinance('BTC-USD'),
                    fetchTwelveData('XAU/USD'),
                    fetchTwelveData('BTC/USD'),
                    // Granular Yahoo for gold: range / interval / key
                    fetchYahooGranular('1d',  '5m',  1),
                    fetchYahooGranular('5d',  '15m', 7),
                    fetchYahooGranular('1mo', '1h',  30),
                    fetchYahooGranular('3mo', '1h',  90),
                    fetchYahooGranular('6mo', '1h',  180),
                    fetchYahooGranular('1y',  '1h',  365),
                    // Intraday silver & bitcoin
                    fetchIntradaySilver(),
                    fetchIntradayBitcoin()
                ]);

                const val = r => r.status === 'fulfilled' ? r.value : [];
                const btcData = val(btcResult);

                const yahooGoldData = val(yahooGold);
                const yahooSilverData = val(yahooSilver);
                const yahooBtcData = val(yahooBtc);
                const tdGoldData = val(tdGold);
                const tdBtcData = val(tdBtc);

                // Store granular data keyed by range
                yahooGranularData = {};
                [g1D, g1W, g1M, g3M, g6M, g1Y].forEach(r => {
                    if (r.status === 'fulfilled' && r.value.data.length > 0) {
                        yahooGranularData[r.value.key] = r.value.data;
                    }
                });

                if (btcData.length > 0) dataSources.push('CoinGecko');
                if (yahooGoldData.length > 0 || yahooSilverData.length > 0 || yahooBtcData.length > 0) dataSources.push('Yahoo');
                if (tdGoldData.length > 0 || tdBtcData.length > 0) dataSources.push('TwelveData');

                // Intraday for silver & bitcoin
                intradaySilver = val(idSilver);
                intradayBitcoin = val(idBtc);
                if (intradaySilver.length > 0) {
                    if (!dataSources.includes('metals.live')) dataSources.push('metals.live');
                }

                // Merge: Yahoo first (most reliable), then Twelve Data, then CoinGecko
                goldPrices = mergePrices(yahooGoldData, tdGoldData);
                silverPrices = mergePrices(yahooSilverData);
                bitcoinPrices = mergePrices(btcData, yahooBtcData, tdBtcData);

                lastUpdated = new Date();

                if (goldPrices.length === 0 && silverPrices.length === 0 && bitcoinPrices.length === 0) {
                    const errors = [];
                    if (btcResult.status === 'rejected') errors.push('Bitcoin: ' + btcResult.reason);
                    document.getElementById('content').innerHTML = `
                        <div class="error-msg">
                            Unable to fetch data from any source. Check your connection and browser console for details.
                            ${errors.length ? '<br>' + errors.join('<br>') : ''}
                        </div>`;
                    return;
                }

                render();
            } catch (err) {
                document.getElementById('content').innerHTML = `
                    <div class="error-msg">
                        Error fetching data: ${err.message}
                    </div>`;
            }
        }

        function getFilteredPrices() {
            // Use granular Yahoo data for gold when available
            if (selectedType === 'gold') {
                if (selectedRange !== 'ytd' && yahooGranularData[selectedRange]) {
                    return yahooGranularData[selectedRange];
                }
                if (selectedRange === 'ytd' && yahooGranularData[365]) {
                    const ytdCutoff = new Date(new Date().getFullYear(), 0, 1);
                    return yahooGranularData[365].filter(p => new Date(p.date) >= ytdCutoff);
                }
            }
            // Intraday silver/bitcoin for 1D
            if (selectedRange === 1 && selectedType === 'silver' && intradaySilver.length > 0) {
                return intradaySilver;
            }
            if (selectedRange === 1 && selectedType === 'bitcoin' && intradayBitcoin.length > 0) {
                return intradayBitcoin;
            }
            // Fallback to daily data
            const typeMap = { gold: goldPrices, silver: silverPrices, bitcoin: bitcoinPrices };
            const all = typeMap[selectedType] || goldPrices;
            const cutoff = selectedRange === 'ytd'
                ? new Date(new Date().getFullYear(), 0, 1)
                : (() => { const d = new Date(); d.setDate(d.getDate() - selectedRange); return d; })();
            return all.filter(p => new Date(p.date) >= cutoff);
        }

        function render() {
            const prices = getFilteredPrices();
            if (prices.length === 0) return;

            const latest = prices[prices.length - 1];
            const prev = prices.length >= 2 ? prices[prices.length - 2] : null;
            const change = prev ? latest.price - prev.price : 0;
            const pctChange = prev ? (change / prev.price) * 100 : 0;
            const isUp = change >= 0;

            const high = Math.max(...prices.map(p => p.price));
            const low = Math.min(...prices.map(p => p.price));
            const avg = prices.reduce((s, p) => s + p.price, 0) / prices.length;
            const variance = prices.reduce((s, p) => s + Math.pow(p.price - avg, 2), 0) / (prices.length - 1);
            const volatility = (Math.sqrt(variance) / avg) * 100;

            // Period change (first to last)
            const first = prices[0];
            const periodChange = latest.price - first.price;
            const periodPct = (periodChange / first.price) * 100;

            const typeLabels = { gold: 'Gold (XAU/USD)', silver: 'Silver (XAG/USD)', bitcoin: 'Bitcoin (BTC/USD)' };
            const typeColors = { gold: '#fbbf24', silver: '#94a3b8', bitcoin: '#f7931a' };
            const typeLabel = typeLabels[selectedType];
            const color = typeColors[selectedType];

            const latestDate = latest.date;
            const updatedStr = lastUpdated ? lastUpdated.toLocaleString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: 'numeric', minute: '2-digit', hour12: true
            }) : '—';
            const sourcesTags = dataSources.map(s =>
                `<span class="source-tag source-${s.toLowerCase()}">${s}</span>`
            ).join(' ');

            document.getElementById('content').innerHTML = `
                <div class="data-status">
                    <div>Latest data: <strong>${selectedRange === 1 ? new Date(latestDate).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true }) : latestDate}</strong>${selectedRange === 1 ? ' (intraday)' : ''} &bull; Updated: <strong>${updatedStr}</strong></div>
                    <div>Sources: ${sourcesTags}</div>
                </div>
                <div class="price-hero">
                    <div>
                        <div class="metal-label">${typeLabel}</div>
                        <span class="current-price">${formatPrice(latest.price)}</span>
                    </div>
                    <div class="price-change ${isUp ? 'up' : 'down'}">
                        ${isUp ? '&#9650;' : '&#9660;'}
                        ${change >= 0 ? '+' : ''}${formatPrice(Math.abs(change)).replace('$', change < 0 ? '-$' : '$')}
                        (${pctChange >= 0 ? '+' : ''}${pctChange.toFixed(2)}%)
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="label">High</div>
                        <div class="value green">${formatPrice(high)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Low</div>
                        <div class="value red">${formatPrice(low)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Average</div>
                        <div class="value blue">${formatPrice(avg)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Volatility</div>
                        <div class="value purple">${volatility.toFixed(2)}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Period Change</div>
                        <div class="value ${periodChange >= 0 ? 'green' : 'red'}">
                            ${periodChange >= 0 ? '+' : '-'}${formatPrice(Math.abs(periodChange))}
                            (${periodPct >= 0 ? '+' : ''}${periodPct.toFixed(2)}%)
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Spread (High-Low)</div>
                        <div class="value amber">${formatPrice(high - low)}</div>
                    </div>
                </div>

                <div class="recent-table">
                    <h3>Recent Prices</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>${selectedRange === 1 ? 'Time' : 'Date'}</th>
                                <th>Price</th>
                                <th>Change</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${prices.slice(-15).reverse().map((p, i, arr) => {
                                const next = i < arr.length - 1 ? arr[i + 1] : null;
                                const dayChange = next ? p.price - next.price : 0;
                                const dayPct = next ? (dayChange / next.price) * 100 : 0;
                                const cls = dayChange >= 0 ? 'up' : 'down';
                                const isIntraday = p.date.includes('T');
                                let dateLabel;
                                if (isIntraday && selectedRange === 1) {
                                    dateLabel = new Date(p.date + 'Z').toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                                } else if (isIntraday) {
                                    const dt = new Date(p.date + 'Z');
                                    dateLabel = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
                                        dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                                } else {
                                    dateLabel = p.date;
                                }
                                return `<tr>
                                    <td>${dateLabel}</td>
                                    <td><strong>${formatPrice(p.price)}</strong></td>
                                    <td class="price-change ${cls}">
                                        ${dayChange >= 0 ? '+' : '-'}${formatPrice(Math.abs(dayChange)).replace('$','')}
                                        (${dayPct >= 0 ? '+' : ''}${dayPct.toFixed(2)}%)
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            renderChart(prices, color, selectedRange === 1);
        }

        function renderChart(prices, color, intraday) {
            const ctx = document.getElementById('priceChart').getContext('2d');

            if (chart) chart.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, color + '40');
            gradient.addColorStop(1, color + '05');

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: prices.map(p => p.date),
                    datasets: [{
                        label: 'Price (USD)',
                        data: prices.map(p => p.price),
                        borderColor: color,
                        backgroundColor: gradient,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHitRadius: 10,
                        pointHoverRadius: 5,
                        pointHoverBackgroundColor: color
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#252836',
                            titleColor: '#e1e4e8',
                            bodyColor: '#e1e4e8',
                            borderColor: '#2d3040',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: ctx => formatPrice(ctx.parsed.y)
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: (() => {
                                // Check if data is intraday (has 'T' in dates)
                                const hasIntraday = prices.length > 0 && prices[0].date.includes('T');
                                if (!hasIntraday) {
                                    return {
                                        parser: 'yyyy-MM-dd',
                                        tooltipFormat: 'MMM d, yyyy',
                                        displayFormats: { day: 'MMM d', week: 'MMM d', month: 'MMM yyyy' }
                                    };
                                }
                                if (selectedRange === 1) {
                                    return {
                                        parser: "yyyy-MM-dd'T'HH:mm:ss",
                                        tooltipFormat: 'MMM d, yyyy h:mm a',
                                        unit: 'hour',
                                        displayFormats: { hour: 'h:mm a', minute: 'h:mm a' }
                                    };
                                }
                                if (selectedRange === 7) {
                                    return {
                                        parser: "yyyy-MM-dd'T'HH:mm:ss",
                                        tooltipFormat: 'MMM d, yyyy h:mm a',
                                        unit: 'day',
                                        displayFormats: { day: 'MMM d', hour: 'MMM d ha' }
                                    };
                                }
                                // 1M, 3M, 6M, 1Y, YTD — hourly data, show days/weeks/months
                                return {
                                    parser: "yyyy-MM-dd'T'HH:mm:ss",
                                    tooltipFormat: 'MMM d, yyyy h:mm a',
                                    displayFormats: { day: 'MMM d', week: 'MMM d', month: 'MMM yyyy' }
                                };
                            })(),
                            grid: {
                                color: '#2d304040',
                                drawBorder: false
                            },
                            ticks: { color: '#8b8fa3', maxTicksLimit: 8 }
                        },
                        y: {
                            grid: {
                                color: '#2d304040',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#8b8fa3',
                                callback: v => '$' + v.toLocaleString('en-US')
                            }
                        }
                    }
                }
            });
        }

        // Initial load
        fetchAllPrices();
    </script>
</body>
</html>
