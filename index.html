<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crude Oil Price Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1d28, #252836);
            padding: 24px 32px;
            border-bottom: 1px solid #2d3040;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #8b8fa3;
            margin-top: 4px;
            font-size: 14px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .btn-group {
            display: flex;
            background: #1a1d28;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2d3040;
        }

        .btn-group button {
            padding: 10px 20px;
            background: transparent;
            color: #8b8fa3;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-group button.active {
            background: #3b82f6;
            color: white;
        }

        .btn-group button:hover:not(.active) {
            color: #e1e4e8;
            background: #252836;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: #1a1d28;
            color: #8b8fa3;
            border: 1px solid #2d3040;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            margin-left: auto;
        }

        .refresh-btn:hover {
            background: #252836;
            color: #e1e4e8;
        }

        .price-hero {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 24px;
            padding: 24px;
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
        }

        .price-hero .current-price {
            font-size: 48px;
            font-weight: 700;
        }

        .price-hero .price-change {
            font-size: 18px;
            font-weight: 600;
        }

        .price-hero .price-change.up { color: #34d399; }
        .price-hero .price-change.down { color: #f87171; }

        .price-hero .oil-label {
            font-size: 16px;
            color: #8b8fa3;
        }

        .chart-container {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
            margin-bottom: 24px;
        }

        .chart-container canvas {
            max-height: 400px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 13px;
            color: #8b8fa3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-card .value.green { color: #34d399; }
        .stat-card .value.red { color: #f87171; }
        .stat-card .value.blue { color: #60a5fa; }
        .stat-card .value.purple { color: #a78bfa; }

        .recent-table {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
        }

        .recent-table h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        .recent-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .recent-table th {
            text-align: left;
            padding: 10px 12px;
            color: #8b8fa3;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2d3040;
        }

        .recent-table td {
            padding: 12px;
            border-bottom: 1px solid #1e2130;
            font-size: 14px;
        }

        .recent-table tr:last-child td {
            border-bottom: none;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #8b8fa3;
            font-size: 16px;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2d3040;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: #1a1d28;
            border: 1px solid #f8717133;
            color: #f87171;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .data-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 20px;
            background: #1a1d28;
            border-radius: 12px;
            border: 1px solid #2d3040;
            margin-bottom: 24px;
            font-size: 13px;
            color: #8b8fa3;
        }

        .data-status .source-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-status .source-eia { background: #3b82f620; color: #60a5fa; }
        .data-status .source-fred { background: #f59e0b20; color: #fbbf24; }
        .data-status .source-alphavantage { background: #8b5cf620; color: #a78bfa; }
        .data-status .source-twelvedata { background: #ef444420; color: #f87171; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Crude Oil Price Tracker</h1>
        <p>Live data &bull; EIA, FRED, Alpha Vantage &amp; Twelve Data</p>
    </div>

    <div class="container">
        <div class="controls">
            <div class="btn-group" id="oilType">
                <button class="active" data-type="wti">WTI Crude</button>
                <button data-type="brent">Brent Crude</button>
                <button data-type="canadian">Canadian</button>
                <button data-type="maya">Mexican Maya</button>
            </div>
            <div class="btn-group" id="timeRange">
                <button data-range="7">1W</button>
                <button class="active" data-range="30">1M</button>
                <button data-range="90">3M</button>
                <button data-range="180">6M</button>
                <button data-range="365">1Y</button>
            </div>
            <button class="refresh-btn" id="refreshBtn">&#x21bb; Refresh</button>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Loading live crude oil prices...
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'q9kHzRa6tXnuEZOOPw0bbsdgfu9Mq5J0FJmIOrj6';
        const EIA_SPOT = 'https://api.eia.gov/v2/petroleum/pri/spt/data/';
        const EIA_IMPORT = 'https://api.eia.gov/v2/petroleum/pri/imc2/data/';
        const FRED_KEY = 'DEMO_KEY';
        const FRED_BASE = 'https://api.stlouisfed.org/fred/series/observations';

        // Additional API sources for more current data
        // Get free keys at:
        //   Alpha Vantage: https://www.alphavantage.co/support/#api-key (25 req/day free)
        //   Twelve Data:   https://twelvedata.com/account (800 req/day free)
        const ALPHA_VANTAGE_KEY = 'T01QSR206V2E0IR2';
        const TWELVE_DATA_KEY = '52f351e2d67042889eb1c6d16cd9769f';

        let wtiPrices = [];
        let brentPrices = [];
        let canadianPrices = [];
        let mayaPrices = [];
        let selectedType = 'wti';
        let selectedRange = 30;
        let chart = null;
        let lastUpdated = null;
        let dataSources = [];

        // Controls
        document.querySelectorAll('#oilType button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#oilType button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedType = btn.dataset.type;
                render();
            });
        });

        document.querySelectorAll('#timeRange button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#timeRange button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRange = parseInt(btn.dataset.range);
                render();
            });
        });

        document.getElementById('refreshBtn').addEventListener('click', fetchAllPrices);

        async function fetchEIASeries(seriesId) {
            const params = new URLSearchParams({
                api_key: API_KEY,
                frequency: 'daily',
                'data[0]': 'value',
                'sort[0][column]': 'period',
                'sort[0][direction]': 'desc',
                length: '365'
            });
            params.append(`facets[series][]`, seriesId);

            const url = `${EIA_SPOT}?${params.toString()}`;
            const response = await fetch(url);
            const json = await response.json();

            if (json.response && json.response.data) {
                return json.response.data
                    .filter(d => d.value != null && d.value !== '')
                    .map(d => ({
                        date: d.period,
                        price: parseFloat(d.value),
                        source: 'EIA'
                    }))
                    .reverse();
            }
            return [];
        }

        async function fetchEIAImportSeries(seriesId) {
            const params = new URLSearchParams({
                api_key: API_KEY,
                frequency: 'monthly',
                'data[0]': 'value',
                'sort[0][column]': 'period',
                'sort[0][direction]': 'desc',
                length: '36'
            });
            params.append(`facets[series][]`, seriesId);

            const url = `${EIA_IMPORT}?${params.toString()}`;
            const response = await fetch(url);
            const json = await response.json();

            if (json.response && json.response.data) {
                return json.response.data
                    .filter(d => d.value != null && d.value !== '')
                    .map(d => ({
                        date: d.period,
                        price: parseFloat(d.value),
                        source: 'EIA'
                    }))
                    .reverse();
            }
            return [];
        }

        async function fetchFREDSeries(seriesId) {
            try {
                const oneYearAgo = new Date();
                oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
                const startDate = oneYearAgo.toISOString().split('T')[0];

                const params = new URLSearchParams({
                    series_id: seriesId,
                    api_key: FRED_KEY,
                    file_type: 'json',
                    observation_start: startDate,
                    sort_order: 'asc'
                });

                const resp = await fetch(FRED_BASE + '?' + params.toString());
                const json = await resp.json();

                if (json.observations) {
                    return json.observations
                        .filter(d => d.value !== '.' && d.value != null)
                        .map(d => ({ date: d.date, price: parseFloat(d.value), source: 'FRED' }));
                }
            } catch (e) {
                console.warn('FRED fetch failed:', e.message);
            }
            return [];
        }

        // Alpha Vantage - daily commodity prices with history
        async function fetchAlphaVantage(func) {
            try {
                const resp = await fetch(
                    'https://www.alphavantage.co/query?function=' + func +
                    '&interval=daily&apikey=' + ALPHA_VANTAGE_KEY
                );
                const json = await resp.json();
                if (json.data) {
                    return json.data
                        .filter(d => d.value && d.value !== '.')
                        .map(d => ({ date: d.date, price: parseFloat(d.value), source: 'AlphaVantage' }))
                        .sort((a, b) => a.date.localeCompare(b.date));
                }
            } catch (e) {
                console.warn('Alpha Vantage fetch failed:', e.message);
            }
            return [];
        }

        // Twelve Data - real-time and historical commodity data
        async function fetchTwelveData(symbol) {
            try {
                const resp = await fetch(
                    'https://api.twelvedata.com/time_series?symbol=' + symbol +
                    '&interval=1day&outputsize=365&apikey=' + TWELVE_DATA_KEY
                );
                const json = await resp.json();
                if (json.values) {
                    return json.values
                        .map(d => ({ date: d.datetime.split(' ')[0], price: parseFloat(d.close), source: 'TwelveData' }))
                        .reverse();
                }
            } catch (e) {
                console.warn('Twelve Data fetch failed:', e.message);
            }
            return [];
        }

        function mergePrices(...priceSets) {
            const dateMap = new Map();
            priceSets.forEach(prices => {
                prices.forEach(p => {
                    if (!dateMap.has(p.date)) {
                        dateMap.set(p.date, p);
                    }
                });
            });
            return Array.from(dateMap.values()).sort((a, b) => a.date.localeCompare(b.date));
        }

        async function fetchAllPrices() {
            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading from multiple sources...
                </div>`;

            try {
                dataSources = [];

                const [
                    eiaWti, eiaBrent, fredWti, fredBrent, eiaCanadian, eiaMaya,
                    avWti, avBrent, tdWti, tdBrent
                ] = await Promise.allSettled([
                    fetchEIASeries('RWTC'),
                    fetchEIASeries('RBRTE'),
                    fetchFREDSeries('DCOILWTICO'),
                    fetchFREDSeries('DCOILBRENTEU'),
                    fetchEIAImportSeries('I19263000004'),
                    fetchEIAImportSeries('IMX2810004'),
                    // Alpha Vantage
                    fetchAlphaVantage('WTI'),
                    fetchAlphaVantage('BRENT'),
                    // Twelve Data (CL = WTI futures, BZ = Brent futures)
                    fetchTwelveData('CL'),
                    fetchTwelveData('BZ')
                ]);

                const val = r => r.status === 'fulfilled' ? r.value : [];

                const eiaWtiData = val(eiaWti);
                const eiaBrentData = val(eiaBrent);
                const fredWtiData = val(fredWti);
                const fredBrentData = val(fredBrent);
                const avWtiData = val(avWti);
                const avBrentData = val(avBrent);
                const tdWtiData = val(tdWti);
                const tdBrentData = val(tdBrent);

                if (eiaWtiData.length > 0 || eiaBrentData.length > 0) dataSources.push('EIA');
                if (fredWtiData.length > 0 || fredBrentData.length > 0) dataSources.push('FRED');
                if (avWtiData.length > 0 || avBrentData.length > 0) dataSources.push('AlphaVantage');
                if (tdWtiData.length > 0 || tdBrentData.length > 0) dataSources.push('TwelveData');

                // Merge all sources: EIA first (most authoritative), then FRED, Alpha Vantage, Twelve Data
                wtiPrices = mergePrices(eiaWtiData, fredWtiData, avWtiData, tdWtiData);
                brentPrices = mergePrices(eiaBrentData, fredBrentData, avBrentData, tdBrentData);
                canadianPrices = val(eiaCanadian);
                mayaPrices = val(eiaMaya);

                if (canadianPrices.length > 0 || mayaPrices.length > 0) {
                    if (!dataSources.includes('EIA')) dataSources.push('EIA');
                }

                lastUpdated = new Date();

                if (wtiPrices.length === 0 && brentPrices.length === 0 && canadianPrices.length === 0 && mayaPrices.length === 0) {
                    document.getElementById('content').innerHTML = `
                        <div class="error-msg">
                            Unable to fetch data from any source. Check your connection.
                        </div>`;
                    return;
                }

                render();
            } catch (err) {
                document.getElementById('content').innerHTML = `
                    <div class="error-msg">
                        Error fetching data: ${err.message}
                    </div>`;
            }
        }

        function getFilteredPrices() {
            const typeMap = { wti: wtiPrices, brent: brentPrices, canadian: canadianPrices, maya: mayaPrices };
            const all = typeMap[selectedType] || wtiPrices;
            // Monthly data (canadian/maya) - show available data points
            if (selectedType === 'canadian' || selectedType === 'maya') {
                const months = Math.ceil(selectedRange / 30);
                return all.slice(-Math.max(months, 3));
            }
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - selectedRange);
            return all.filter(p => new Date(p.date) >= cutoff);
        }

        function render() {
            const prices = getFilteredPrices();
            if (prices.length === 0) return;

            const latest = prices[prices.length - 1];
            const prev = prices.length >= 2 ? prices[prices.length - 2] : null;
            const change = prev ? latest.price - prev.price : 0;
            const pctChange = prev ? (change / prev.price) * 100 : 0;
            const isUp = change >= 0;

            const high = Math.max(...prices.map(p => p.price));
            const low = Math.min(...prices.map(p => p.price));
            const avg = prices.reduce((s, p) => s + p.price, 0) / prices.length;
            const variance = prices.reduce((s, p) => s + Math.pow(p.price - avg, 2), 0) / (prices.length - 1);
            const volatility = (Math.sqrt(variance) / avg) * 100;

            const typeLabels = { wti: 'WTI Crude Oil', brent: 'Brent Crude Oil', canadian: 'Canadian Light Sour Blend', maya: 'Mexican Maya Crude' };
            const typeColors = { wti: '#3b82f6', brent: '#f59e0b', canadian: '#ef4444', maya: '#10b981' };
            const typeLabel = typeLabels[selectedType];
            const color = typeColors[selectedType];
            const isMonthly = selectedType === 'canadian' || selectedType === 'maya';

            const latestDate = latest.date;
            const updatedStr = lastUpdated ? lastUpdated.toLocaleString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: 'numeric', minute: '2-digit', hour12: true
            }) : '—';
            const sourcesTags = dataSources.map(s =>
                `<span class="source-tag source-${s.toLowerCase()}">${s}</span>`
            ).join(' ');

            document.getElementById('content').innerHTML = `
                <div class="data-status">
                    <div>Latest data: <strong>${latestDate}</strong>${isMonthly ? ' (monthly)' : ''} &bull; Updated: <strong>${updatedStr}</strong></div>
                    <div>Sources: ${sourcesTags}</div>
                </div>
                <div class="price-hero">
                    <div>
                        <div class="oil-label">${typeLabel}</div>
                        <span class="current-price">$${latest.price.toFixed(2)}</span>
                    </div>
                    <div class="price-change ${isUp ? 'up' : 'down'}">
                        ${isUp ? '&#9650;' : '&#9660;'}
                        ${change >= 0 ? '+' : ''}${change.toFixed(2)}
                        (${pctChange >= 0 ? '+' : ''}${pctChange.toFixed(2)}%)
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="label">High</div>
                        <div class="value green">$${high.toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Low</div>
                        <div class="value red">$${low.toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Average</div>
                        <div class="value blue">$${avg.toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Volatility</div>
                        <div class="value purple">${volatility.toFixed(2)}%</div>
                    </div>
                </div>

                <div class="recent-table">
                    <h3>Recent Prices</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Price</th>
                                <th>Change</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${prices.slice(-15).reverse().map((p, i, arr) => {
                                const next = i < arr.length - 1 ? arr[i + 1] : null;
                                const dayChange = next ? p.price - next.price : 0;
                                const dayPct = next ? (dayChange / next.price) * 100 : 0;
                                const cls = dayChange >= 0 ? 'up' : 'down';
                                return `<tr>
                                    <td>${p.date}</td>
                                    <td><strong>$${p.price.toFixed(2)}</strong></td>
                                    <td class="price-change ${cls}">
                                        ${dayChange >= 0 ? '+' : ''}${dayChange.toFixed(2)}
                                        (${dayPct >= 0 ? '+' : ''}${dayPct.toFixed(2)}%)
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            renderChart(prices, color);
        }

        function renderChart(prices, color) {
            const ctx = document.getElementById('priceChart').getContext('2d');

            if (chart) chart.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, color + '40');
            gradient.addColorStop(1, color + '05');

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: prices.map(p => p.date),
                    datasets: [{
                        label: 'Price (USD)',
                        data: prices.map(p => p.price),
                        borderColor: color,
                        backgroundColor: gradient,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHitRadius: 10,
                        pointHoverRadius: 5,
                        pointHoverBackgroundColor: color
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#252836',
                            titleColor: '#e1e4e8',
                            bodyColor: '#e1e4e8',
                            borderColor: '#2d3040',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: ctx => `$${ctx.parsed.y.toFixed(2)}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                parser: 'yyyy-MM-dd',
                                tooltipFormat: 'MMM d, yyyy',
                                displayFormats: {
                                    day: 'MMM d',
                                    week: 'MMM d',
                                    month: 'MMM yyyy'
                                }
                            },
                            grid: {
                                color: '#2d304040',
                                drawBorder: false
                            },
                            ticks: { color: '#8b8fa3', maxTicksLimit: 8 }
                        },
                        y: {
                            grid: {
                                color: '#2d304040',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#8b8fa3',
                                callback: v => '$' + v
                            }
                        }
                    }
                }
            });
        }

        // Initial load
        fetchAllPrices();
    </script>
</body>
</html>
