<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaddlePoint — Gear Admin</title>
<link rel="icon" type="image/svg+xml" href="paddle-pin.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh}
.header{display:flex;align-items:center;padding:16px 24px;border-bottom:1px solid #1e2030;gap:16px;flex-wrap:wrap}
.header h1{font-size:20px;font-weight:700;color:#e1e4e8}
.header .badge{background:#8b5cf6;color:#fff;font-size:11px;padding:3px 10px;border-radius:12px;font-weight:700}
.header .back{color:#60a5fa;text-decoration:none;font-size:13px;margin-left:auto}
#loginView{display:flex;align-items:center;justify-content:center;height:80vh}
#loginView div{text-align:center}
#loginView input{background:#1a1d28;border:1px solid #2d3040;color:#e1e4e8;padding:10px 16px;border-radius:8px;font-size:14px;width:220px;margin:12px 0}
#loginView button{background:#8b5cf6;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
#adminView{display:none;padding:16px 24px}
</style>
</head>
<body>
<style>
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{background:#1a1d28;border:1px solid #2d3040;color:#e1e4e8;padding:8px 12px;border-radius:8px;font-size:13px}
.toolbar input{width:240px}
.toolbar select{min-width:140px}
#statsBar{color:#6b7080;font-size:13px;margin-left:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:#8b8fa3;font-weight:600;border-bottom:1px solid #1e2030;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:#e1e4e8}
td{padding:10px 12px;border-bottom:1px solid #1a1d28;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover{background:#1a1d28}
tr.selected{background:#1e2040}
.link{color:#60a5fa;text-decoration:none;font-size:12px}
.link:hover{text-decoration:underline}
.cat-tag{display:inline-block;background:#252836;color:#a0a4b8;padding:2px 8px;border-radius:6px;font-size:11px;margin:1px}
.pagination{display:flex;gap:8px;align-items:center;margin-top:12px;color:#6b7080;font-size:13px}
.pagination button{background:#252836;color:#e1e4e8;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px}
.pagination button:disabled{opacity:.3;cursor:default}
</style>
<style>
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#1a1d28;border:1px solid #2d3040;border-radius:16px;padding:24px;width:92%;max-width:640px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:18px;margin-bottom:16px;color:#e1e4e8}
.modal label{display:block;font-size:12px;color:#8b8fa3;margin-bottom:4px;margin-top:10px}
.modal input,.modal textarea,.modal select{width:100%;background:#0f1117;border:1px solid #2d3040;color:#e1e4e8;padding:8px 12px;border-radius:6px;font-size:13px}
.modal textarea{min-height:60px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.actions button{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-save{background:#22c55e;color:#fff}
.btn-delete{background:#ef4444;color:#fff}
.btn-cancel{background:#374151;color:#e1e4e8}
.btn-add{background:#8b5cf6;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
.toast{position:fixed;bottom:24px;right:24px;background:#22c55e;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>

<div class="header">
    <h1>🎯 Gear Admin</h1>
    <span class="badge" id="countBadge">0</span>
    <a href="paddle-gear.html" class="back">← Back to Gear</a>
</div>

<div id="loginView">
    <div>
        <h2 style="margin-bottom:8px;">🔒 Admin Access</h2>
        <p style="color:#6b7080;font-size:13px;">Enter admin password to manage gear brands</p>
        <input type="password" id="adminPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
        <br><button onclick="doLogin()">Login</button>
    </div>
</div>

<div id="adminView">
    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search brands..." oninput="applyFilters()">
        <select id="filterCat" onchange="applyFilters()"><option value="">All Categories</option>
            <option>SUP</option><option>surfski</option><option>sprint kayak</option><option>canoe</option>
            <option>outrigger</option><option>va'a</option><option>kayak</option><option>paddles</option><option>PFD</option><option>ocean racing</option>
        </select>
        <button class="btn-add" onclick="showAdd()">➕ Add Brand</button>
        <span id="statsBar"></span>
    </div>
    <table><thead><tr>
        <th onclick="sortBy('name')">Brand ↕</th>
        <th onclick="sortBy('categories')">Categories ↕</th>
        <th onclick="sortBy('country')">Country ↕</th>
        <th>Website</th>
        <th>Social</th>
    </tr></thead><tbody id="tableBody"></tbody></table>
    <div class="pagination"><button onclick="prevPage()" id="btnPrev">← Prev</button><span id="pageInfo"></span><button onclick="nextPage()" id="btnNext">Next →</button></div>
</div>

<!-- EDIT / ADD MODAL -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h2 id="editTitle">Edit Brand</h2>
        <input type="hidden" id="ed_id">
        <div class="row"><div><label>Brand Name *</label><input id="ed_name"></div>
            <div><label>Country</label><input id="ed_country"></div></div>
        <label>Categories</label><input id="ed_categories" placeholder="SUP, surfski, sprint kayak, canoe, outrigger, va'a, kayak, paddles...">
        <div class="row3"><div><label>Brand Type</label><select id="ed_brand_type"><option value="manufacturer">Manufacturer</option><option value="retailer">Retailer</option><option value="distributor">Distributor</option></select></div>
            <div><label>Founded Year</label><input id="ed_year_founded"></div>
            <div><label>Product Types</label><input id="ed_product_types" placeholder="watercraft, paddles, clothing, PFDs..."></div></div>
        <div class="row"><div><label>Website</label><input id="ed_website" placeholder="https://..."></div>
            <div><label>Email</label><input id="ed_email"></div></div>
        <div class="row"><div><label>Phone</label><input id="ed_phone"></div>
            <div><label>City</label><input id="ed_city"></div></div>
        <label>Address</label><input id="ed_address">
        <div class="row"><div><label>Facebook</label><input id="ed_facebook_url" placeholder="https://facebook.com/..."></div>
            <div><label>Instagram</label><input id="ed_instagram_url" placeholder="https://instagram.com/..."></div></div>
        <div class="row"><div><label>YouTube</label><input id="ed_youtube_url"></div>
            <div><label>Logo URL</label><input id="ed_logo_url"></div></div>
        <label>Popular Products</label><textarea id="ed_popular_products" placeholder="e.g. Nelo Cinco K1, Nelo Vanquish C1, Nelo 540 Surfski"></textarea>
        <label>Description</label><textarea id="ed_description" placeholder="Brand story, specialties, what they're known for..."></textarea>
        <div style="margin-top:16px;padding-top:16px;border-top:1px solid #2d3040;">
            <h3 style="font-size:14px;color:#a0a4b8;margin-bottom:12px;">📦 Distributors (up to 4)</h3>
            <div id="distFields"></div>
            <button type="button" onclick="addDistField()" style="background:#252836;color:#60a5fa;border:1px solid #2d3040;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;margin-top:8px;">+ Add Distributor</button>
        </div>
        <div class="actions">
            <button class="btn-delete" id="deleteBtn" onclick="deleteBrand()">🗑️ Delete</button>
            <button style="background:#0ea5e9;color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;" id="enrichBtn" onclick="enrichBrand()">🔍 Enrich from Website</button>
            <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
            <button class="btn-save" onclick="saveBrand()">💾 Save</button>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
const ADMIN_PASS='paddle2026',PER_PAGE=50;
let allBrands=[],filtered=[],currentPage=0,sortCol='name',sortAsc=true;

function doLogin(){
    if(document.getElementById('adminPass').value===ADMIN_PASS){
        document.getElementById('loginView').style.display='none';
        document.getElementById('adminView').style.display='block';
        loadData();
    } else alert('Wrong password');
}
if(new URLSearchParams(location.search).get('autologin')==='1'){document.getElementById('adminPass').value=ADMIN_PASS;doLogin();}

async function loadData(){
    document.getElementById('statsBar').textContent='Loading...';
    try{
        const res=await fetch('/api/gear-brands',{headers:{'X-API-Token':'pp-clubs-7742-v1'}});
        allBrands=await res.json();
    }catch(e){allBrands=[];}
    filtered=[...allBrands];
    currentPage=0;
    applyFilters();
}

function applyFilters(){
    const q=document.getElementById('searchInput').value.toLowerCase();
    const cat=document.getElementById('filterCat').value.toLowerCase();
    filtered=allBrands.filter(b=>{
        if(q&&!b.name.toLowerCase().includes(q)&&!(b.country||'').toLowerCase().includes(q)&&!(b.categories||'').toLowerCase().includes(q)) return false;
        if(cat&&!(b.categories||'').toLowerCase().includes(cat)) return false;
        return true;
    });
    filtered.sort((a,b)=>{
        const va=(a[sortCol]||'').toString().toLowerCase(),vb=(b[sortCol]||'').toString().toLowerCase();
        return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
    });
    currentPage=0;
    renderTable();
}

function sortBy(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}applyFilters();}
function prevPage(){if(currentPage>0){currentPage--;renderTable();}}
function nextPage(){if((currentPage+1)*PER_PAGE<filtered.length){currentPage++;renderTable();}}

function renderTable(){
    const start=currentPage*PER_PAGE,end=Math.min(start+PER_PAGE,filtered.length);
    const page=filtered.slice(start,end);
    document.getElementById('countBadge').textContent=allBrands.length;
    document.getElementById('statsBar').textContent=`Showing ${start+1}-${end} of ${filtered.length}`;
    document.getElementById('pageInfo').textContent=`Page ${currentPage+1} of ${Math.ceil(filtered.length/PER_PAGE)||1}`;
    document.getElementById('btnPrev').disabled=currentPage===0;
    document.getElementById('btnNext').disabled=end>=filtered.length;
    const tbody=document.getElementById('tableBody');
    tbody.innerHTML=page.map(b=>{
        const cats=(b.categories||'').split(',').map(c=>`<span class="cat-tag">${c.trim()}</span>`).join('');
        const web=b.website?`<a href="${b.website}" target="_blank" class="link">${b.website.replace(/^https?:\/\/(www\.)?/,'').slice(0,25)}</a>`:'—';
        const social=[(b.instagram_url?'📸':''), (b.facebook_url?'📘':''), (b.youtube_url?'🎬':'')].filter(Boolean).join(' ')||'—';
        return `<tr onclick="editBrand(${b.id})" style="cursor:pointer">
            <td><strong>${b.name}</strong></td><td>${cats}</td><td>${b.country||'—'}</td>
            <td>${web}</td><td>${social}</td></tr>`;
    }).join('');
}

const FIELDS=['id','name','categories','brand_type','product_types','country','city','website','email','phone','address','description','popular_products','year_founded','logo_url','facebook_url','instagram_url','youtube_url'];

function getDistributors(){
    const divs=document.querySelectorAll('.dist-entry');
    const dists=[];
    divs.forEach(d=>{
        const n=d.querySelector('.dist-name').value.trim();
        const w=d.querySelector('.dist-web').value.trim();
        const fb=d.querySelector('.dist-fb').value.trim();
        const ig=d.querySelector('.dist-ig').value.trim();
        if(n||w) dists.push({name:n,website:w,facebook:fb,instagram:ig});
    });
    return dists;
}

function setDistributors(dists){
    const container=document.getElementById('distFields');
    container.innerHTML='';
    (dists||[]).forEach(d=>addDistField(d));
}

function addDistField(data){
    const container=document.getElementById('distFields');
    if(container.querySelectorAll('.dist-entry').length>=4) return;
    const div=document.createElement('div');
    div.className='dist-entry';
    div.style.cssText='background:#0f1117;border:1px solid #2d3040;border-radius:8px;padding:10px;margin-bottom:8px;position:relative;';
    const d=data||{};
    div.innerHTML=`<button type="button" onclick="this.parentElement.remove()" style="position:absolute;top:6px;right:8px;background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px;">✕</button>
        <div class="row"><div><label>Company Name</label><input class="dist-name" value="${d.name||''}" placeholder="e.g. West Coast Paddler"></div>
        <div><label>Website</label><input class="dist-web" value="${d.website||''}" placeholder="https://..."></div></div>
        <div class="row"><div><label>Facebook</label><input class="dist-fb" value="${d.facebook||''}" placeholder="https://facebook.com/..."></div>
        <div><label>Instagram</label><input class="dist-ig" value="${d.instagram||''}" placeholder="https://instagram.com/..."></div></div>`;
    container.appendChild(div);
}

function editBrand(id){
    const b=allBrands.find(x=>x.id===id);if(!b)return;
    document.getElementById('editTitle').textContent=`Edit: ${b.name}`;
    FIELDS.forEach(f=>{const el=document.getElementById('ed_'+f);if(el)el.value=b[f]||'';});
    try{setDistributors(JSON.parse(b.distributors||'[]'));}catch(e){setDistributors([]);}
    document.getElementById('deleteBtn').style.display='';
    document.getElementById('editModal').classList.add('open');
}

function showAdd(){
    document.getElementById('editTitle').textContent='➕ Add New Brand';
    FIELDS.forEach(f=>{const el=document.getElementById('ed_'+f);if(el)el.value='';});
    document.getElementById('ed_brand_type').value='manufacturer';
    setDistributors([]);
    document.getElementById('deleteBtn').style.display='none';
    document.getElementById('editModal').classList.add('open');
    document.getElementById('ed_name').focus();
}

function closeEdit(){document.getElementById('editModal').classList.remove('open');}

async function saveBrand(){
    const data={};
    FIELDS.forEach(f=>{const el=document.getElementById('ed_'+f);if(el&&el.value)data[f]=el.value;});
    if(data.id)data.id=parseInt(data.id);
    if(!data.name){alert('Brand name required');return;}
    const dists=getDistributors();
    data.distributors=JSON.stringify(dists);
    try{
        const res=await fetch('/api/save-gear-brand',{method:'POST',
            headers:{'Content-Type':'application/json','X-API-Token':'pp-clubs-7742-v1'},
            body:JSON.stringify(data)});
        const r=await res.json();
        if(r.error){alert(r.error);return;}
        closeEdit();showToast(data.id?'Brand updated':'Brand added');loadData();
    }catch(e){alert('Save failed: '+e.message);}
}

async function deleteBrand(){
    const id=document.getElementById('ed_id').value;
    const name=document.getElementById('ed_name').value;
    if(!id||!confirm(`Delete "${name}"?`))return;
    try{
        await fetch('/api/save-gear-brand',{method:'DELETE',
            headers:{'Content-Type':'application/json','X-API-Token':'pp-clubs-7742-v1'},
            body:JSON.stringify({id:parseInt(id)})});
        closeEdit();showToast('Brand deleted');loadData();
    }catch(e){alert('Delete failed');}
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

async function enrichBrand(){
    const website=document.getElementById('ed_website').value.trim();
    const name=document.getElementById('ed_name').value.trim();
    if(!website){alert('Website URL required to enrich');return;}
    const btn=document.getElementById('enrichBtn');
    btn.disabled=true;btn.textContent='⏳ Enriching...';
    try{
        const res=await fetch('/api/enrich-gear-brand',{method:'POST',
            headers:{'Content-Type':'application/json','X-API-Token':'pp-clubs-7742-v1'},
            body:JSON.stringify({name,website,
                facebook_url:document.getElementById('ed_facebook_url').value,
                instagram_url:document.getElementById('ed_instagram_url').value})});
        const data=await res.json();
        if(data.error){alert(data.error);return;}
        // Fill in empty fields only
        const fillIf=(id,val)=>{const el=document.getElementById(id);if(el&&!el.value&&val)el.value=val;};
        fillIf('ed_description',data.description);
        fillIf('ed_logo_url',data.logo_url);
        fillIf('ed_email',data.email);
        fillIf('ed_phone',data.phone);
        fillIf('ed_facebook_url',data.facebook_url);
        fillIf('ed_instagram_url',data.instagram_url);
        fillIf('ed_youtube_url',data.youtube_url);
        showToast('Enriched! Review and save.');
    }catch(e){alert('Enrich failed: '+e.message);}
    finally{btn.disabled=false;btn.textContent='🔍 Enrich from Website';}
}
document.getElementById('editModal').addEventListener('click',e=>{if(e.target.classList.contains('modal-overlay'))closeEdit();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeEdit();});
</script>
</body>
</html>
