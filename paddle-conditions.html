<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paddle Conditions - JMLSD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1d28, #252836);
            padding: 14px 20px;
            border-bottom: 1px solid #2d3040;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, #06b6d4, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .subtitle { color: #8b8fa3; font-size: 12px; margin-top: 2px; }

        .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

        .nav-link {
            padding: 6px 12px;
            background: #252836;
            color: #60a5fa;
            text-decoration: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid #2d3040;
            transition: all 0.2s;
        }
        .nav-link:hover { background: #2d3040; color: #06b6d4; }

        .refresh-btn {
            padding: 6px 14px;
            background: #06b6d420;
            color: #22d3ee;
            border: 1px solid #06b6d440;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .refresh-btn:hover { background: #06b6d430; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Location selector */
        .location-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .location-bar label {
            color: #8b8fa3;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .location-select {
            padding: 8px 14px;
            background: #1a1d28;
            color: #e1e4e8;
            border: 1px solid #2d3040;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            min-width: 220px;
        }
        .location-select:focus { outline: none; border-color: #06b6d4; }

        .location-coords {
            color: #6b7280;
            font-size: 12px;
            font-family: monospace;
        }

        /* Paddle Score Hero */
        .score-hero {
            background: linear-gradient(135deg, #1a1d28, #1e2535);
            border: 1px solid #2d3040;
            border-radius: 20px;
            padding: 28px 32px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .score-circle::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            padding: 4px;
            background: conic-gradient(var(--score-color) calc(var(--score-pct) * 1%), #2d3040 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .score-number {
            font-size: 36px;
            font-weight: 800;
            line-height: 1;
        }

        .score-label {
            font-size: 11px;
            color: #8b8fa3;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .score-details { flex: 1; min-width: 200px; }

        .score-verdict {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .score-summary {
            color: #8b8fa3;
            font-size: 14px;
            line-height: 1.5;
        }

        .score-factors {
            display: flex;
            gap: 16px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .score-factor {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #9ca3af;
        }

        .factor-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* Grid layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .card {
            background: #1a1d28;
            border: 1px solid #2d3040;
            border-radius: 16px;
            padding: 20px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: #8b8fa3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title .icon { font-size: 16px; }

        /* Wind display */
        .wind-main {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
        }

        .wind-compass {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #2d3040;
            position: relative;
            flex-shrink: 0;
            background: #0f1117;
        }

        .wind-arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 32px;
            background: linear-gradient(to top, #06b6d4, #3b82f6);
            border-radius: 2px;
            transform-origin: bottom center;
            transform: translate(-50%, -100%) rotate(0deg);
            transition: transform 0.6s ease;
        }

        .wind-arrow::after {
            content: '';
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 8px solid #06b6d4;
        }

        .compass-label {
            position: absolute;
            font-size: 9px;
            color: #6b7280;
            font-weight: 600;
        }
        .compass-n { top: 4px; left: 50%; transform: translateX(-50%); }
        .compass-s { bottom: 4px; left: 50%; transform: translateX(-50%); }
        .compass-e { right: 4px; top: 50%; transform: translateY(-50%); }
        .compass-w { left: 4px; top: 50%; transform: translateY(-50%); }

        .wind-values h3 {
            font-size: 28px;
            font-weight: 700;
            color: #e1e4e8;
        }
        .wind-values h3 span { font-size: 14px; color: #8b8fa3; font-weight: 400; }

        .wind-values .wind-dir {
            color: #06b6d4;
            font-size: 14px;
            margin-top: 2px;
        }

        .wind-detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-top: 1px solid #2d304060;
            font-size: 13px;
        }

        .wind-detail-row .label { color: #8b8fa3; }
        .wind-detail-row .value { color: #e1e4e8; font-weight: 600; }

        /* Stat rows */
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #2d304040;
        }
        .stat-row:last-child { border-bottom: none; }

        .stat-label {
            color: #8b8fa3;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            font-size: 15px;
            font-weight: 600;
            color: #e1e4e8;
        }

        /* Tide chart */
        .tide-chart-wrap {
            position: relative;
            height: 160px;
            margin: 10px 0;
        }

        .tide-chart-wrap canvas {
            width: 100%;
            height: 100%;
        }

        .tide-times {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }

        .tide-event {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: #0f111780;
            border-radius: 8px;
            font-size: 12px;
        }

        .tide-event .tide-type {
            font-weight: 700;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .tide-high { background: #06b6d420; color: #22d3ee; }
        .tide-low { background: #f9731620; color: #fb923c; }

        /* Water quality */
        .wq-status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .wq-good { background: #22c55e15; border: 1px solid #22c55e30; }
        .wq-fair { background: #f59e0b15; border: 1px solid #f59e0b30; }
        .wq-poor { background: #ef444415; border: 1px solid #ef444430; }

        .wq-icon { font-size: 28px; }

        .wq-text h4 {
            font-size: 15px;
            font-weight: 700;
        }

        .wq-text p {
            font-size: 12px;
            color: #8b8fa3;
            margin-top: 2px;
        }

        /* Hourly forecast */
        .hourly-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 8px;
            scrollbar-width: thin;
            scrollbar-color: #2d3040 transparent;
        }

        .hourly-item {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 12px;
            background: #0f111780;
            border-radius: 10px;
            min-width: 70px;
            font-size: 12px;
        }

        .hourly-item .hour { color: #8b8fa3; font-size: 11px; }
        .hourly-item .wind-speed { font-weight: 700; font-size: 14px; }
        .hourly-item .wind-unit { color: #6b7280; font-size: 10px; }

        .hourly-item .mini-arrow {
            width: 3px;
            height: 14px;
            background: #06b6d4;
            border-radius: 2px;
            position: relative;
        }
        .hourly-item .mini-arrow::after {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 5px solid #06b6d4;
        }

        /* Sport suitability */
        .sport-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .sport-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: #0f111780;
            border-radius: 10px;
        }

        .sport-icon { font-size: 22px; }

        .sport-info .sport-name {
            font-size: 12px;
            font-weight: 600;
            color: #e1e4e8;
        }

        .sport-info .sport-rating {
            font-size: 11px;
            margin-top: 2px;
        }

        .rating-great { color: #34d399; }
        .rating-good { color: #22d3ee; }
        .rating-fair { color: #fbbf24; }
        .rating-poor { color: #f87171; }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #2d3040;
            border-top-color: #06b6d4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .data-source {
            text-align: center;
            padding: 16px;
            color: #6b7280;
            font-size: 11px;
        }

        .data-source a { color: #06b6d4; text-decoration: none; }

        /* Full-width cards */
        .full-width { grid-column: 1 / -1; }

        /* Alerts */
        .alert-banner {
            background: #f59e0b15;
            border: 1px solid #f59e0b40;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #fbbf24;
        }

        .alert-banner .alert-icon { font-size: 18px; }

        @media (max-width: 700px) {
            .header { padding: 10px 14px; }
            .header h1 { font-size: 17px; }
            .container { padding: 14px; }
            .score-hero { padding: 20px; gap: 20px; }
            .score-circle { width: 90px; height: 90px; }
            .score-number { font-size: 28px; }
            .score-verdict { font-size: 18px; }
            .grid { grid-template-columns: 1fr; }
            .sport-grid { grid-template-columns: 1fr; }
            .tide-times { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div>
                <h1>&#x1F6F6; Paddle Conditions</h1>
                <div class="subtitle">Weather, wind, tide &amp; water quality for paddlers</div>
            </div>
        </div>
        <div class="header-right">
            <button class="refresh-btn" onclick="loadAllData()">&#8635; Refresh</button>
            <a href="index.html" class="nav-link">&larr; Home</a>
        </div>
    </div>

    <div class="container">
        <div class="location-bar">
            <label>Paddle Spot</label>
            <select class="location-select" id="locationSelect" onchange="changeLocation()">
                <option value="32.7157,-117.1611" data-name="San Diego Bay" data-station="9410170">San Diego Bay</option>
                <option value="32.8631,-117.2569" data-name="La Jolla Shores" data-station="9410230">La Jolla Shores</option>
                <option value="32.7633,-117.2350" data-name="Mission Bay" data-station="9410170">Mission Bay</option>
                <option value="32.6270,-117.1400" data-name="Chula Vista Marina" data-station="9410170">Chula Vista Marina</option>
                <option value="33.1434,-117.2954" data-name="Oceanside Harbor" data-station="9410580">Oceanside Harbor</option>
                <option value="32.9550,-117.2653" data-name="Del Mar / San Dieguito" data-station="9410230">Del Mar / San Dieguito Lagoon</option>
                <option value="33.8554,-118.3989" data-name="Marina del Rey" data-station="9410660">Marina del Rey</option>
                <option value="33.7448,-118.1140" data-name="Long Beach" data-station="9410660">Long Beach / Alamitos Bay</option>
                <option value="33.4564,-117.6117" data-name="Dana Point Harbor" data-station="9410580">Dana Point Harbor</option>
                <option value="21.3069,-157.8583" data-name="Honolulu / Ala Moana" data-station="1612340">Honolulu / Ala Moana</option>
            </select>
            <span class="location-coords" id="coordsDisplay">32.7157&deg;N, 117.1611&deg;W</span>
        </div>

        <div id="alertArea"></div>

        <div id="mainContent">
            <div class="loading"><div class="spinner"></div></div>
        </div>

        <div class="data-source">
            Data: <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> &bull;
            <a href="https://tidesandcurrents.noaa.gov" target="_blank">NOAA Tides</a> &bull;
            <a href="https://www.ndbc.noaa.gov" target="_blank">NOAA NDBC</a> &bull;
            Updated <span id="lastUpdate">--</span>
        </div>
    </div>

    <script>
        // --- State ---
        let currentLat = 32.7157;
        let currentLon = -117.1611;
        let currentStation = '9410170';
        let currentName = 'San Diego Bay';
        let weatherData = null;
        let tideData = null;

        // --- Paddle spots with popular locations ---
        const NOAA_TIDE_API = 'https://api.tidesandcurrents.noaa.gov/api/prod/datagetter';

        // --- Location change ---
        function changeLocation() {
            const sel = document.getElementById('locationSelect');
            const opt = sel.options[sel.selectedIndex];
            const [lat, lon] = opt.value.split(',').map(Number);
            currentLat = lat;
            currentLon = lon;
            currentStation = opt.dataset.station;
            currentName = opt.dataset.name;
            document.getElementById('coordsDisplay').textContent =
                `${Math.abs(lat).toFixed(4)}°${lat >= 0 ? 'N' : 'S'}, ${Math.abs(lon).toFixed(4)}°${lon >= 0 ? 'E' : 'W'}`;
            loadAllData();
        }

        // --- Fetch weather from Open-Meteo ---
        async function fetchWeather() {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}` +
                `&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,` +
                `wind_speed_10m,wind_direction_10m,wind_gusts_10m,uv_index,visibility,pressure_msl` +
                `&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,precipitation_probability,weather_code,uv_index,visibility` +
                `&daily=sunrise,sunset,uv_index_max,wind_speed_10m_max,wind_gusts_10m_max,precipitation_sum,weather_code` +
                `&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=3`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`Weather API: ${resp.status}`);
            return resp.json();
        }

        // --- Fetch tide data from NOAA ---
        async function fetchTides() {
            const today = new Date();
            const begin = formatDate(today);
            const end = new Date(today);
            end.setDate(end.getDate() + 2);
            const endStr = formatDate(end);

            const url = `${NOAA_TIDE_API}?begin_date=${begin}&end_date=${endStr}` +
                `&station=${currentStation}&product=predictions&datum=MLLW` +
                `&time_zone=lst_ldt&units=english&interval=hilo&format=json`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`Tide API: ${resp.status}`);
            return resp.json();
        }

        // --- Fetch hourly tide predictions for chart ---
        async function fetchTideHourly() {
            const today = new Date();
            const begin = formatDate(today);
            const end = new Date(today);
            end.setDate(end.getDate() + 1);
            const endStr = formatDate(end);

            const url = `${NOAA_TIDE_API}?begin_date=${begin}&end_date=${endStr}` +
                `&station=${currentStation}&product=predictions&datum=MLLW` +
                `&time_zone=lst_ldt&units=english&interval=6&format=json`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`Tide Hourly API: ${resp.status}`);
            return resp.json();
        }

        function formatDate(d) {
            return `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;
        }

        // --- Paddle score calculation ---
        function calcPaddleScore(weather) {
            const c = weather.current;
            let score = 100;
            const factors = [];

            // Wind penalty
            const wind = c.wind_speed_10m;
            if (wind > 20) { score -= 40; factors.push({ label: 'High winds', color: '#f87171' }); }
            else if (wind > 15) { score -= 25; factors.push({ label: 'Moderate winds', color: '#fbbf24' }); }
            else if (wind > 10) { score -= 10; factors.push({ label: 'Light winds', color: '#22d3ee' }); }
            else { factors.push({ label: 'Calm winds', color: '#34d399' }); }

            // Gust penalty
            const gust = c.wind_gusts_10m;
            if (gust > 30) { score -= 20; factors.push({ label: 'Strong gusts', color: '#f87171' }); }
            else if (gust > 20) { score -= 10; factors.push({ label: 'Gusty', color: '#fbbf24' }); }

            // Precipitation penalty
            if (c.precipitation > 0.1) { score -= 15; factors.push({ label: 'Rain', color: '#fbbf24' }); }

            // UV consideration
            if (c.uv_index >= 8) { factors.push({ label: 'High UV', color: '#f97316' }); }

            // Visibility
            if (c.visibility < 5000) { score -= 15; factors.push({ label: 'Low visibility', color: '#f87171' }); }
            else if (c.visibility < 10000) { score -= 5; }

            // Weather code severe
            const wc = c.weather_code;
            if (wc >= 95) { score -= 30; factors.push({ label: 'Thunderstorms', color: '#f87171' }); }
            else if (wc >= 71) { score -= 15; }
            else if (wc >= 51) { score -= 10; }

            score = Math.max(0, Math.min(100, score));
            return { score, factors };
        }

        function scoreColor(s) {
            if (s >= 80) return '#34d399';
            if (s >= 60) return '#22d3ee';
            if (s >= 40) return '#fbbf24';
            return '#f87171';
        }

        function scoreVerdict(s) {
            if (s >= 80) return 'Excellent Conditions';
            if (s >= 60) return 'Good Conditions';
            if (s >= 40) return 'Fair Conditions';
            if (s >= 20) return 'Poor Conditions';
            return 'Stay On Shore';
        }

        function scoreSummary(s, weather) {
            const c = weather.current;
            const wind = c.wind_speed_10m;
            const gust = c.wind_gusts_10m;
            if (s >= 80) return `Light winds at ${wind.toFixed(0)} mph with calm conditions. Great day to get on the water!`;
            if (s >= 60) return `Winds at ${wind.toFixed(0)} mph with gusts to ${gust.toFixed(0)} mph. Good for experienced paddlers.`;
            if (s >= 40) return `Winds at ${wind.toFixed(0)} mph, gusts to ${gust.toFixed(0)} mph. Use caution, stay close to shore.`;
            return `Winds ${wind.toFixed(0)} mph, gusts ${gust.toFixed(0)} mph. Conditions are hazardous for paddle sports.`;
        }

        // --- Sport suitability ---
        function sportSuitability(weather) {
            const wind = weather.current.wind_speed_10m;
            const gust = weather.current.wind_gusts_10m;

            function rate(idealMax, cautionMax) {
                if (wind <= idealMax && gust <= idealMax + 5) return { label: 'Great', cls: 'rating-great' };
                if (wind <= cautionMax && gust <= cautionMax + 8) return { label: 'Good', cls: 'rating-good' };
                if (wind <= cautionMax + 5) return { label: 'Fair', cls: 'rating-fair' };
                return { label: 'Poor', cls: 'rating-poor' };
            }

            return [
                { icon: '&#x1F6F6;', name: 'Kayaking', ...rate(12, 18) },
                { icon: '&#x1F6A3;', name: 'Rowing / Crew', ...rate(10, 16) },
                { icon: '&#x1F3C4;', name: 'SUP', ...rate(8, 14) },
                { icon: '&#x1F409;', name: 'Dragon Boat', ...rate(12, 18) },
                { icon: '&#x26F5;', name: 'Outrigger (OC)', ...rate(15, 22) },
                { icon: '&#x1F6F6;', name: 'K1 Sprint', ...rate(8, 13) },
                { icon: '&#x1F6A3;', name: 'Sculling', ...rate(8, 14) },
                { icon: '&#x1F3D5;', name: 'Canoe / Camp', ...rate(10, 16) },
            ];
        }

        // --- Wind direction label ---
        function windDirLabel(deg) {
            const dirs = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE',
                          'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
            return dirs[Math.round(deg / 22.5) % 16];
        }

        // --- Weather description from code ---
        function weatherDesc(code) {
            const map = {
                0: 'Clear sky', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
                45: 'Foggy', 48: 'Rime fog', 51: 'Light drizzle', 53: 'Drizzle',
                55: 'Heavy drizzle', 61: 'Light rain', 63: 'Rain', 65: 'Heavy rain',
                71: 'Light snow', 73: 'Snow', 75: 'Heavy snow', 80: 'Rain showers',
                81: 'Moderate showers', 82: 'Heavy showers', 95: 'Thunderstorm',
                96: 'Thunderstorm w/ hail', 99: 'Severe thunderstorm'
            };
            return map[code] || 'Unknown';
        }

        // --- Water quality (simulated based on weather) ---
        function estimateWaterQuality(weather) {
            const precip24h = weather.daily?.precipitation_sum?.[0] || 0;
            const wc = weather.current.weather_code;

            if (precip24h > 0.5 || wc >= 80) {
                return {
                    status: 'fair',
                    label: 'Advisory - Recent Rain',
                    desc: 'Runoff may affect water quality. Check local advisories before paddling.',
                    cls: 'wq-fair',
                    icon: '&#x26A0;'
                };
            }
            if (precip24h > 1.0) {
                return {
                    status: 'poor',
                    label: 'Poor - Heavy Rain Runoff',
                    desc: 'Significant runoff expected. Avoid contact with water for 72 hours after heavy rain.',
                    cls: 'wq-poor',
                    icon: '&#x1F6AB;'
                };
            }
            return {
                status: 'good',
                label: 'Good - Safe for Contact',
                desc: 'No recent rain or advisories. Water quality is expected to be good.',
                cls: 'wq-good',
                icon: '&#x2705;'
            };
        }

        // --- Draw tide chart on canvas ---
        function drawTideChart(canvasId, predictions) {
            const canvas = document.getElementById(canvasId);
            if (!canvas || !predictions || predictions.length === 0) return;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(dpr, dpr);

            const W = rect.width;
            const H = rect.height;
            const pad = { top: 20, right: 10, bottom: 30, left: 36 };

            const values = predictions.map(p => parseFloat(p.v));
            const minV = Math.min(...values);
            const maxV = Math.max(...values);
            const range = maxV - minV || 1;

            const now = new Date();

            ctx.clearRect(0, 0, W, H);

            // Grid lines
            ctx.strokeStyle = '#2d304060';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = pad.top + (H - pad.top - pad.bottom) * i / 4;
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(W - pad.right, y);
                ctx.stroke();

                ctx.fillStyle = '#6b7280';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'right';
                const val = maxV - (range * i / 4);
                ctx.fillText(val.toFixed(1) + 'ft', pad.left - 4, y + 3);
            }

            // Draw curve
            const plotW = W - pad.left - pad.right;
            const plotH = H - pad.top - pad.bottom;

            ctx.beginPath();
            ctx.strokeStyle = '#06b6d4';
            ctx.lineWidth = 2;

            let nowX = null;
            let nowY = null;

            predictions.forEach((p, i) => {
                const x = pad.left + (i / (predictions.length - 1)) * plotW;
                const y = pad.top + plotH - ((parseFloat(p.v) - minV) / range) * plotH;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);

                const pTime = new Date(p.t.replace(' ', 'T'));
                if (!nowX && pTime >= now) {
                    nowX = x;
                    nowY = y;
                }
            });
            ctx.stroke();

            // Fill under curve
            const lastIdx = predictions.length - 1;
            const lastX = pad.left + plotW;
            ctx.lineTo(lastX, pad.top + plotH);
            ctx.lineTo(pad.left, pad.top + plotH);
            ctx.closePath();
            const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + plotH);
            grad.addColorStop(0, '#06b6d425');
            grad.addColorStop(1, '#06b6d405');
            ctx.fillStyle = grad;
            ctx.fill();

            // Now marker
            if (nowX !== null) {
                ctx.beginPath();
                ctx.arc(nowX, nowY, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#f97316';
                ctx.fill();
                ctx.strokeStyle = '#0f1117';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#f97316';
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('NOW', nowX, nowY - 10);
            }

            // Time labels
            ctx.fillStyle = '#6b7280';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            const step = Math.floor(predictions.length / 6);
            for (let i = 0; i < predictions.length; i += step) {
                const x = pad.left + (i / (predictions.length - 1)) * plotW;
                const t = new Date(predictions[i].t.replace(' ', 'T'));
                const label = t.toLocaleTimeString([], { hour: 'numeric', hour12: true });
                ctx.fillText(label, x, H - 8);
            }
        }

        // --- Render everything ---
        function render(weather, tides, tideHourly) {
            const c = weather.current;
            const { score, factors } = calcPaddleScore(weather);
            const color = scoreColor(score);
            const wq = estimateWaterQuality(weather);
            const sports = sportSuitability(weather);

            // Alerts
            let alertHtml = '';
            if (score < 40) {
                alertHtml = `<div class="alert-banner">
                    <span class="alert-icon">&#x26A0;</span>
                    <span>Conditions are unfavorable for most paddle sports. Check forecast before heading out.</span>
                </div>`;
            }
            if (c.weather_code >= 95) {
                alertHtml = `<div class="alert-banner" style="border-color: #ef444460; background: #ef444415; color: #f87171;">
                    <span class="alert-icon">&#x26A1;</span>
                    <span>Thunderstorm activity detected. Do NOT go on the water.</span>
                </div>`;
            }
            document.getElementById('alertArea').innerHTML = alertHtml;

            // Hourly wind forecast (next 12 hours)
            const nowHour = new Date().getHours();
            let hourlyHtml = '';
            for (let i = 0; i < 12; i++) {
                const idx = nowHour + i;
                if (idx >= weather.hourly.wind_speed_10m.length) break;
                const hr = (idx % 24);
                const ampm = hr >= 12 ? 'PM' : 'AM';
                const h12 = hr === 0 ? 12 : hr > 12 ? hr - 12 : hr;
                const ws = weather.hourly.wind_speed_10m[idx];
                const wd = weather.hourly.wind_direction_10m[idx];
                hourlyHtml += `<div class="hourly-item">
                    <span class="hour">${i === 0 ? 'Now' : h12 + ampm}</span>
                    <div class="mini-arrow" style="transform: rotate(${wd}deg);"></div>
                    <span class="wind-speed">${ws.toFixed(0)}</span>
                    <span class="wind-unit">mph</span>
                </div>`;
            }

            // Tide events
            let tideEventsHtml = '';
            if (tides?.predictions) {
                const now = new Date();
                const upcoming = tides.predictions
                    .filter(p => new Date(p.t.replace(' ', 'T')) >= now)
                    .slice(0, 4);
                upcoming.forEach(p => {
                    const t = new Date(p.t.replace(' ', 'T'));
                    const time = t.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: true });
                    const isHigh = parseFloat(p.v) > 3;
                    tideEventsHtml += `<div class="tide-event">
                        <span class="tide-type ${isHigh ? 'tide-high' : 'tide-low'}">${isHigh ? 'HIGH' : 'LOW'}</span>
                        <span>${time}</span>
                        <span style="color:#8b8fa3;margin-left:auto;">${parseFloat(p.v).toFixed(1)} ft</span>
                    </div>`;
                });
            }

            // Sunrise / sunset
            const sunrise = weather.daily?.sunrise?.[0];
            const sunset = weather.daily?.sunset?.[0];
            const sunriseTime = sunrise ? new Date(sunrise).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: true }) : '--';
            const sunsetTime = sunset ? new Date(sunset).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: true }) : '--';

            const html = `
                <!-- Paddle Score -->
                <div class="score-hero">
                    <div class="score-circle" style="--score-color: ${color}; --score-pct: ${score};">
                        <span class="score-number" style="color: ${color};">${score}</span>
                        <span class="score-label">Score</span>
                    </div>
                    <div class="score-details">
                        <div class="score-verdict" style="color: ${color};">${scoreVerdict(score)}</div>
                        <div class="score-summary">${scoreSummary(score, weather)}</div>
                        <div class="score-factors">
                            ${factors.map(f => `<div class="score-factor">
                                <div class="factor-dot" style="background:${f.color};"></div>
                                ${f.label}
                            </div>`).join('')}
                        </div>
                    </div>
                </div>

                <div class="grid">
                    <!-- Wind Card -->
                    <div class="card">
                        <div class="card-title"><span class="icon">&#x1F4A8;</span> Wind</div>
                        <div class="wind-main">
                            <div class="wind-compass">
                                <span class="compass-label compass-n">N</span>
                                <span class="compass-label compass-s">S</span>
                                <span class="compass-label compass-e">E</span>
                                <span class="compass-label compass-w">W</span>
                                <div class="wind-arrow" style="transform: translate(-50%, -100%) rotate(${c.wind_direction_10m}deg);"></div>
                            </div>
                            <div class="wind-values">
                                <h3>${c.wind_speed_10m.toFixed(0)} <span>mph</span></h3>
                                <div class="wind-dir">${windDirLabel(c.wind_direction_10m)} (${c.wind_direction_10m}°)</div>
                            </div>
                        </div>
                        <div class="wind-detail-row">
                            <span class="label">Gusts</span>
                            <span class="value">${c.wind_gusts_10m.toFixed(0)} mph</span>
                        </div>
                        <div class="wind-detail-row">
                            <span class="label">Max Today</span>
                            <span class="value">${weather.daily.wind_speed_10m_max[0].toFixed(0)} mph</span>
                        </div>
                        <div class="wind-detail-row">
                            <span class="label">Max Gusts Today</span>
                            <span class="value">${weather.daily.wind_gusts_10m_max[0].toFixed(0)} mph</span>
                        </div>
                    </div>

                    <!-- Weather Card -->
                    <div class="card">
                        <div class="card-title"><span class="icon">&#x2600;</span> Weather</div>
                        <div class="stat-row">
                            <span class="stat-label">Conditions</span>
                            <span class="stat-value">${weatherDesc(c.weather_code)}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Temperature</span>
                            <span class="stat-value">${c.temperature_2m.toFixed(0)}°F</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Feels Like</span>
                            <span class="stat-value">${c.apparent_temperature.toFixed(0)}°F</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Humidity</span>
                            <span class="stat-value">${c.relative_humidity_2m}%</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">UV Index</span>
                            <span class="stat-value" style="color: ${c.uv_index >= 8 ? '#f87171' : c.uv_index >= 5 ? '#fbbf24' : '#34d399'};">${c.uv_index.toFixed(1)}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Visibility</span>
                            <span class="stat-value">${(c.visibility / 1609.34).toFixed(1)} mi</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Pressure</span>
                            <span class="stat-value">${c.pressure_msl.toFixed(0)} hPa</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">&#x1F305; Sunrise</span>
                            <span class="stat-value">${sunriseTime}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">&#x1F307; Sunset</span>
                            <span class="stat-value">${sunsetTime}</span>
                        </div>
                    </div>

                    <!-- Tides Card -->
                    <div class="card">
                        <div class="card-title"><span class="icon">&#x1F30A;</span> Tides</div>
                        <div class="tide-chart-wrap">
                            <canvas id="tideCanvas"></canvas>
                        </div>
                        <div class="tide-times">${tideEventsHtml || '<div style="color:#6b7280;font-size:13px;">Tide data unavailable</div>'}</div>
                    </div>

                    <!-- Water Quality Card -->
                    <div class="card">
                        <div class="card-title"><span class="icon">&#x1F4A7;</span> Water Quality</div>
                        <div class="wq-status ${wq.cls}">
                            <span class="wq-icon">${wq.icon}</span>
                            <div class="wq-text">
                                <h4>${wq.label}</h4>
                                <p>${wq.desc}</p>
                            </div>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Precipitation Today</span>
                            <span class="stat-value">${(weather.daily.precipitation_sum?.[0] || 0).toFixed(2)} in</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Precipitation (24h)</span>
                            <span class="stat-value">${c.precipitation.toFixed(2)} in</span>
                        </div>
                    </div>

                    <!-- Hourly Wind Forecast -->
                    <div class="card full-width">
                        <div class="card-title"><span class="icon">&#x1F552;</span> Wind Forecast (Next 12 Hours)</div>
                        <div class="hourly-scroll">${hourlyHtml}</div>
                    </div>

                    <!-- Sport Suitability -->
                    <div class="card full-width">
                        <div class="card-title"><span class="icon">&#x1F3C6;</span> Sport Suitability</div>
                        <div class="sport-grid">
                            ${sports.map(s => `<div class="sport-item">
                                <span class="sport-icon">${s.icon}</span>
                                <div class="sport-info">
                                    <div class="sport-name">${s.name}</div>
                                    <div class="sport-rating ${s.cls}">${s.label}</div>
                                </div>
                            </div>`).join('')}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('mainContent').innerHTML = html;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();

            // Draw tide chart after DOM update
            if (tideHourly?.predictions) {
                setTimeout(() => drawTideChart('tideCanvas', tideHourly.predictions), 50);
            }
        }

        // --- Load all data ---
        async function loadAllData() {
            document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            document.getElementById('alertArea').innerHTML = '';

            try {
                const [weather, tides, tideHourly] = await Promise.all([
                    fetchWeather(),
                    fetchTides().catch(e => { console.warn('Tides failed:', e); return null; }),
                    fetchTideHourly().catch(e => { console.warn('Tide hourly failed:', e); return null; })
                ]);

                weatherData = weather;
                tideData = tides;
                render(weather, tides, tideHourly);
            } catch (e) {
                console.error('Load failed:', e);
                document.getElementById('mainContent').innerHTML = `
                    <div style="text-align:center;padding:60px;color:#f87171;">
                        <div style="font-size:36px;margin-bottom:12px;">&#x26A0;</div>
                        <div style="font-size:16px;font-weight:600;">Failed to load conditions</div>
                        <div style="color:#8b8fa3;margin-top:6px;font-size:13px;">${e.message}</div>
                        <button class="refresh-btn" onclick="loadAllData()" style="margin-top:16px;">Try Again</button>
                    </div>`;
            }
        }

        // --- Handle window resize for tide chart ---
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                const canvas = document.getElementById('tideCanvas');
                if (canvas && tideData) {
                    fetchTideHourly().then(h => {
                        if (h?.predictions) drawTideChart('tideCanvas', h.predictions);
                    }).catch(() => {});
                }
            }, 250);
        });

        // --- Init ---
        loadAllData();
    </script>
</body>
</html>
