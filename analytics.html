<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — PaddlePoint</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1d28, #252836);
            padding: 24px 24px 20px;
            border-bottom: 1px solid #2d3040;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #6b7080;
            font-size: 14px;
            margin-top: 4px;
        }

        .back-link {
            position: absolute;
            left: 20px;
            top: 28px;
            color: #60a5fa;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover { text-decoration: underline; }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .page-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .page-tab {
            padding: 8px 18px;
            border-radius: 8px;
            background: #1a1d28;
            border: 1px solid #2d3040;
            color: #a0a4b8;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-tab:hover { border-color: #60a5fa; color: #e1e4e8; }
        .page-tab.active { background: #60a5fa22; border-color: #60a5fa; color: #60a5fa; font-weight: 600; }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .card {
            background: #1a1d28;
            border: 1px solid #2d3040;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .card-label {
            font-size: 12px;
            color: #6b7080;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .card-value {
            font-size: 32px;
            font-weight: 700;
        }

        .card-value.blue { color: #60a5fa; }
        .card-value.purple { color: #a78bfa; }
        .card-value.pink { color: #f472b6; }

        .section {
            background: #1a1d28;
            border: 1px solid #2d3040;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #e1e4e8;
            margin-bottom: 16px;
        }

        /* Referrer bars */
        .ref-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .ref-row:last-child { margin-bottom: 0; }

        .ref-label {
            min-width: 140px;
            font-size: 14px;
            color: #e1e4e8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ref-bar-wrap {
            flex: 1;
            height: 10px;
            background: #252836;
            border-radius: 5px;
            overflow: hidden;
        }

        .ref-bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .ref-count {
            min-width: 36px;
            text-align: right;
            font-size: 14px;
            font-weight: 600;
            color: #a0a4b8;
        }

        /* Daily chart */
        .chart {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 8px;
            height: 160px;
            margin-bottom: 8px;
        }

        .chart-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 80px;
        }

        .chart-bar {
            width: 100%;
            min-height: 4px;
            background: linear-gradient(to top, #60a5fa, #a78bfa);
            border-radius: 6px 6px 2px 2px;
            transition: height 0.5s ease;
        }

        .chart-val {
            font-size: 12px;
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 4px;
        }

        .chart-label {
            font-size: 11px;
            color: #6b7080;
            margin-top: 6px;
        }

        /* Visitor log */
        .log-table {
            width: 100%;
            border-collapse: collapse;
        }

        .log-table th {
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7080;
            padding: 8px 12px;
            border-bottom: 1px solid #2d3040;
        }

        .log-table td {
            padding: 10px 12px;
            font-size: 13px;
            color: #a0a4b8;
            border-bottom: 1px solid #1e2130;
        }

        .log-table tr:last-child td { border-bottom: none; }

        .log-date {
            color: #e1e4e8;
            font-weight: 600;
            white-space: nowrap;
        }

        .log-visitors {
            color: #60a5fa;
            font-weight: 600;
        }

        .city-tag {
            display: inline-block;
            font-size: 12px;
            color: #8b8fa3;
            background: #252836;
            padding: 2px 8px;
            border-radius: 6px;
            margin: 2px 4px 2px 0;
        }

        .city-tag .count {
            color: #60a5fa;
            font-weight: 600;
            margin-left: 4px;
        }

        .ref-tag {
            display: inline-block;
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 6px;
            margin: 2px 4px 2px 0;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            color: #6b7080;
            padding: 40px;
            font-size: 14px;
        }

        .loading .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #2d3040;
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .cards { grid-template-columns: 1fr; }
            .ref-label { min-width: 100px; font-size: 13px; }
            .chart { height: 120px; }
            .back-link { position: static; display: block; text-align: center; margin-bottom: 8px; }
            .log-table { font-size: 12px; }
            .log-table th, .log-table td { padding: 8px 6px; }
        }
    </style>
</head>
<body>
    <div class="header" style="position: relative;">
        <a class="back-link" href="paddle-conditions.html">&larr; PaddlePoint</a>
        <h1>PaddlePoint Analytics</h1>
        <p>Visitor traffic for paddlepoint.org</p>
    </div>

    <div class="container">
        <div class="page-tabs">
            <div class="page-tab active" data-page="conditions">Conditions</div>
            <div class="page-tab" data-page="clubs">Paddle Clubs</div>
        </div>

        <div id="content">
            <div class="loading"><div class="spinner"></div><br>Loading analytics...</div>
        </div>
    </div>

    <script>
        const COUNTER_API = 'https://visitor-counter.newtonmac.workers.dev';
        let currentPage = 'conditions';

        const REFERRER_COLORS = {
            'google.com': '#34a853', 'google.co.uk': '#34a853', 'google.ca': '#34a853',
            'facebook.com': '#1877f2', 'instagram.com': '#e4405f',
            'twitter.com': '#1da1f2', 'x.com': '#1da1f2',
            'linkedin.com': '#0a66c2', 'reddit.com': '#ff4500',
            'youtube.com': '#ff0000', 'bing.com': '#008373',
            'duckduckgo.com': '#de5833', 'Direct': '#a78bfa',
        };

        function getColor(name) {
            return REFERRER_COLORS[name] || '#60a5fa';
        }

        function displayName(name) {
            if (name === 'Direct') return 'Direct / Bookmark';
            if (name.startsWith('google.')) return 'Google';
            return name;
        }

        document.querySelectorAll('.page-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentPage = tab.dataset.page;
                loadAnalytics();
            });
        });

        async function loadAnalytics() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading analytics...</div>';

            const pageParam = currentPage ? `?page=${currentPage}` : '';

            try {
                const [statsRes, refRes] = await Promise.all([
                    fetch(`${COUNTER_API}/stats${pageParam}`),
                    fetch(`${COUNTER_API}/stats/referrers${pageParam}`),
                ]);
                const stats = await statsRes.json();
                const refData = await refRes.json();

                const today = new Date().toISOString().slice(0, 10);
                const todayData = stats.days.find(d => d.date === today);
                const todayCount = todayData ? todayData.uniqueVisitors : 0;
                const weekTotal = stats.days.reduce((s, d) => s + d.uniqueVisitors, 0);

                let html = '';

                // Summary cards
                html += `<div class="cards">
                    <div class="card">
                        <div class="card-label">All Time</div>
                        <div class="card-value blue">${stats.total.toLocaleString()}</div>
                    </div>
                    <div class="card">
                        <div class="card-label">Last 7 Days</div>
                        <div class="card-value purple">${weekTotal.toLocaleString()}</div>
                    </div>
                    <div class="card">
                        <div class="card-label">Today</div>
                        <div class="card-value pink">${todayCount.toLocaleString()}</div>
                    </div>
                </div>`;

                // Traffic Sources section
                const refEntries = Object.entries(refData.totals || {}).sort((a, b) => b[1] - a[1]);
                html += `<div class="section">
                    <div class="section-title">Traffic Sources — Last 7 Days</div>`;
                if (refEntries.length === 0) {
                    html += '<p style="color:#6b7080;font-size:13px;">No referrer data yet. Sources like Google, Facebook, etc. will appear here as visitors arrive.</p>';
                } else {
                    const maxRef = refEntries[0][1];
                    html += refEntries.map(([name, count]) => {
                        const pct = Math.round((count / maxRef) * 100);
                        const color = getColor(name);
                        return `<div class="ref-row">
                            <span class="ref-label" title="${name}">${displayName(name)}</span>
                            <div class="ref-bar-wrap">
                                <div class="ref-bar-fill" style="width:${pct}%;background:${color};"></div>
                            </div>
                            <span class="ref-count">${count}</span>
                        </div>`;
                    }).join('');
                }
                html += '</div>';

                // Daily visitors bar chart
                if (stats.days && stats.days.length > 0) {
                    const days = stats.days.slice().reverse();
                    const maxV = Math.max(...days.map(d => d.uniqueVisitors), 1);

                    html += `<div class="section">
                        <div class="section-title">Daily Visitors</div>
                        <div class="chart">
                            ${days.map(day => {
                                const pct = Math.max((day.uniqueVisitors / maxV) * 100, 3);
                                const label = new Date(day.date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                                return `<div class="chart-col">
                                    <div class="chart-val">${day.uniqueVisitors}</div>
                                    <div class="chart-bar" style="height:${pct}%;"></div>
                                    <div class="chart-label">${label}</div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;

                    // Detailed visitor log table
                    html += `<div class="section">
                        <div class="section-title">Visitor Log — Last 7 Days</div>
                        <div style="overflow-x:auto;">
                        <table class="log-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Visitors</th>
                                    <th>Locations</th>
                                    <th>Sources</th>
                                </tr>
                            </thead>
                            <tbody>`;

                    // Build referrer data per day from refData
                    const refByDay = {};
                    (refData.days || []).forEach(d => { refByDay[d.date] = d.referrers || {}; });

                    html += days.map(day => {
                        const dateLabel = new Date(day.date + 'T12:00:00').toLocaleDateString('en-US', {
                            weekday: 'short', month: 'short', day: 'numeric'
                        });

                        const cityTags = day.cities ? Object.entries(day.cities)
                            .sort((a, b) => b[1] - a[1])
                            .slice(0, 5)
                            .map(([city, count]) => `<span class="city-tag">${city}<span class="count">${count}</span></span>`)
                            .join('') : '<span style="color:#6b7080">—</span>';

                        const dayRefs = refByDay[day.date] || {};
                        const refTags = Object.entries(dayRefs).length > 0
                            ? Object.entries(dayRefs)
                                .sort((a, b) => b[1] - a[1])
                                .map(([name, count]) => {
                                    const color = getColor(name);
                                    return `<span class="ref-tag" style="background:${color}22;color:${color};">${displayName(name)} (${count})</span>`;
                                }).join('')
                            : '<span style="color:#6b7080">—</span>';

                        return `<tr>
                            <td class="log-date">${dateLabel}</td>
                            <td class="log-visitors">${day.uniqueVisitors}</td>
                            <td>${cityTags}</td>
                            <td>${refTags}</td>
                        </tr>`;
                    }).join('');

                    html += `</tbody></table></div></div>`;
                }

                content.innerHTML = html;

            } catch (err) {
                content.innerHTML = `<div class="section" style="text-align:center;color:#ef4444;">
                    Could not load analytics. Please try again later.
                </div>`;
            }
        }

        loadAnalytics();
    </script>
</body>
</html>
