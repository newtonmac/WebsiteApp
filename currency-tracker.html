<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MXN/USD Currency Exchange Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1d28, #252836);
            padding: 24px 32px;
            border-bottom: 1px solid #2d3040;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #8b8fa3;
            margin-top: 4px;
            font-size: 14px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .btn-group {
            display: flex;
            background: #1a1d28;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2d3040;
        }

        .btn-group button {
            padding: 10px 20px;
            background: transparent;
            color: #8b8fa3;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-group button.active {
            background: #3b82f6;
            color: white;
        }

        .btn-group button:hover:not(.active) {
            color: #e1e4e8;
            background: #252836;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: #1a1d28;
            color: #8b8fa3;
            border: 1px solid #2d3040;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            margin-left: auto;
        }

        .refresh-btn:hover {
            background: #252836;
            color: #e1e4e8;
        }

        .price-hero {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 24px;
            padding: 24px;
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            flex-wrap: wrap;
        }

        .price-hero .current-price {
            font-size: 48px;
            font-weight: 700;
        }

        .price-hero .price-change {
            font-size: 18px;
            font-weight: 600;
        }

        .price-hero .price-change.up { color: #34d399; }
        .price-hero .price-change.down { color: #f87171; }

        .price-hero .pair-label {
            font-size: 16px;
            color: #8b8fa3;
        }

        .price-hero .inverse-rate {
            font-size: 14px;
            color: #8b8fa3;
            margin-top: 4px;
        }

        .flag-pair {
            font-size: 28px;
            margin-right: 4px;
        }

        .chart-container {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
            position: relative;
            height: 350px;
            margin-bottom: 24px;
        }

        .chart-container canvas {
            max-height: 400px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 13px;
            color: #8b8fa3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-card .value.green { color: #34d399; }
        .stat-card .value.red { color: #f87171; }
        .stat-card .value.blue { color: #60a5fa; }
        .stat-card .value.purple { color: #a78bfa; }
        .stat-card .value.amber { color: #fbbf24; }

        .recent-table {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
        }

        .recent-table h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        .recent-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .recent-table th {
            text-align: left;
            padding: 10px 12px;
            color: #8b8fa3;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2d3040;
        }

        .recent-table td {
            padding: 12px;
            border-bottom: 1px solid #1e2130;
            font-size: 14px;
        }

        .recent-table tr:last-child td {
            border-bottom: none;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #8b8fa3;
            font-size: 16px;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2d3040;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: #1a1d28;
            border: 1px solid #f8717133;
            color: #f87171;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .data-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 20px;
            background: #1a1d28;
            border-radius: 12px;
            border: 1px solid #2d3040;
            margin-bottom: 24px;
            font-size: 13px;
            color: #8b8fa3;
        }

        .data-status .source-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-status .source-fred { background: #f59e0b20; color: #fbbf24; }
        .data-status .source-frankfurter { background: #10b98120; color: #34d399; }

        .nav-links {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .nav-link {
            display: inline-block;
            padding: 6px 14px;
            background: #252836;
            color: #60a5fa;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #2d3040;
            transition: all 0.2s;
        }
        .nav-link:hover { background: #2d3040; color: #a78bfa; }

        @media (max-width: 600px) {
            .header { padding: 20px 16px; }
            .header h1 { font-size: 22px; }
            .container { padding: 16px; }
            .price-hero .current-price { font-size: 36px; }
            .chart-container { height: 280px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .stat-card .value { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>MXN / USD Exchange Rate Tracker</h1>
        <p>Mexican Peso to US Dollar &bull; FRED &amp; Frankfurter &bull; Updated daily</p>
        <div class="nav-links">
            <a href="index.html" class="nav-link">&larr; Oil Tracker</a>
            <a href="flight-tracker.html" class="nav-link">Flight Tracker &rarr;</a>
        </div>
    </div>

    <div class="container">
        <div class="controls">
            <div class="btn-group" id="viewMode">
                <button class="active" data-mode="mxn-usd">MXN &rarr; USD</button>
                <button data-mode="usd-mxn">USD &rarr; MXN</button>
            </div>
            <div class="btn-group" id="timeRange">
                <button data-range="7">1W</button>
                <button class="active" data-range="30">1M</button>
                <button data-range="90">3M</button>
                <button data-range="180">6M</button>
                <button data-range="365">1Y</button>
            </div>
            <button class="refresh-btn" id="refreshBtn">&#x21bb; Refresh</button>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Loading exchange rate data...
            </div>
        </div>
    </div>

    <script>
        let rateData = []; // { date, rate } where rate = 1 MXN in USD
        let selectedRange = 30;
        let selectedMode = 'mxn-usd'; // 'mxn-usd' or 'usd-mxn'
        let chart = null;
        let lastUpdated = null;
        let dataSources = [];

        // Controls
        document.querySelectorAll('#viewMode button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#viewMode button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedMode = btn.dataset.mode;
                render();
            });
        });

        document.querySelectorAll('#timeRange button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#timeRange button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRange = parseInt(btn.dataset.range);
                render();
            });
        });

        document.getElementById('refreshBtn').addEventListener('click', fetchRates);

        const FRED_KEY = 'b157e132862f8b31185abd4da930b21a';
        const FRED_BASE = 'https://api.stlouisfed.org/fred/series/observations';

        // FRED API - DEXMXUS series (MXN per 1 USD, daily business days)
        async function fetchFRED() {
            try {
                const oneYearAgo = new Date();
                oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
                const startDate = oneYearAgo.toISOString().split('T')[0];

                const params = new URLSearchParams({
                    series_id: 'DEXMXUS',
                    api_key: FRED_KEY,
                    file_type: 'json',
                    observation_start: startDate,
                    sort_order: 'asc'
                });

                const resp = await fetch(FRED_BASE + '?' + params.toString());
                const json = await resp.json();

                if (json.observations) {
                    return json.observations
                        .filter(d => d.value !== '.' && d.value != null)
                        .map(d => ({
                            date: d.date,
                            rate: 1 / parseFloat(d.value), // FRED gives MXN per USD, we want USD per MXN
                            source: 'FRED'
                        }));
                }
            } catch (e) {
                console.warn('FRED fetch failed:', e.message);
            }
            return [];
        }

        // Frankfurter API - free, no key required, ECB data (backup)
        async function fetchFrankfurter() {
            try {
                const endDate = new Date().toISOString().split('T')[0];
                const startDate = new Date();
                startDate.setFullYear(startDate.getFullYear() - 1);
                const startStr = startDate.toISOString().split('T')[0];

                const resp = await fetch(
                    `https://api.frankfurter.app/${startStr}..${endDate}?from=MXN&to=USD`
                );
                const json = await resp.json();

                if (json.rates) {
                    return Object.entries(json.rates).map(([date, rates]) => ({
                        date,
                        rate: rates.USD,
                        source: 'Frankfurter'
                    })).sort((a, b) => a.date.localeCompare(b.date));
                }
            } catch (e) {
                console.warn('Frankfurter fetch failed:', e.message);
            }
            return [];
        }

        function mergePrices(...priceSets) {
            const dateMap = new Map();
            priceSets.forEach(prices => {
                prices.forEach(p => {
                    if (!dateMap.has(p.date)) {
                        dateMap.set(p.date, p);
                    }
                });
            });
            return Array.from(dateMap.values()).sort((a, b) => a.date.localeCompare(b.date));
        }

        async function fetchRates() {
            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading exchange rate data...
                </div>`;

            try {
                dataSources = [];

                const [fredResult, frankfurterResult] = await Promise.allSettled([
                    fetchFRED(),
                    fetchFrankfurter()
                ]);

                const val = r => r.status === 'fulfilled' ? r.value : [];

                const fredData = val(fredResult);
                const frankfurterData = val(frankfurterResult);

                if (fredData.length > 0) dataSources.push('FRED');
                if (frankfurterData.length > 0) dataSources.push('Frankfurter');

                // FRED is primary (daily), Frankfurter fills gaps
                rateData = mergePrices(fredData, frankfurterData);

                lastUpdated = new Date();

                if (rateData.length === 0) {
                    document.getElementById('content').innerHTML = `
                        <div class="error-msg">
                            Unable to fetch exchange rate data from any source. Check your connection.
                        </div>`;
                    return;
                }

                render();
            } catch (err) {
                document.getElementById('content').innerHTML = `
                    <div class="error-msg">
                        Error fetching data: ${err.message}
                    </div>`;
            }
        }

        function getFilteredRates() {
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - selectedRange);
            return rateData.filter(p => new Date(p.date) >= cutoff);
        }

        function getDisplayRate(rate) {
            if (selectedMode === 'usd-mxn') {
                return 1 / rate;
            }
            return rate;
        }

        function render() {
            const rates = getFilteredRates();
            if (rates.length === 0) return;

            const isMxnToUsd = selectedMode === 'mxn-usd';
            const pairLabel = isMxnToUsd ? '1 MXN in USD' : '1 USD in MXN';
            const currencySymbol = isMxnToUsd ? '$' : '$';
            const decimals = isMxnToUsd ? 4 : 2;

            const latest = rates[rates.length - 1];
            const prev = rates.length >= 2 ? rates[rates.length - 2] : null;

            const latestRate = getDisplayRate(latest.rate);
            const prevRate = prev ? getDisplayRate(prev.rate) : null;

            const change = prevRate ? latestRate - prevRate : 0;
            const pctChange = prevRate ? (change / prevRate) * 100 : 0;
            const isUp = change >= 0;

            const displayRates = rates.map(r => getDisplayRate(r.rate));
            const high = Math.max(...displayRates);
            const low = Math.min(...displayRates);
            const avg = displayRates.reduce((s, r) => s + r, 0) / displayRates.length;
            const variance = displayRates.reduce((s, r) => s + Math.pow(r - avg, 2), 0) / (displayRates.length - 1);
            const volatility = (Math.sqrt(variance) / avg) * 100;

            // 30-day change
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            const oldRate = rateData.find(r => new Date(r.date) >= thirtyDaysAgo);
            const monthChange = oldRate
                ? ((latestRate - getDisplayRate(oldRate.rate)) / getDisplayRate(oldRate.rate)) * 100
                : 0;

            const inverseRate = isMxnToUsd ? (1 / latest.rate).toFixed(2) : (latest.rate).toFixed(4);
            const inverseLabel = isMxnToUsd ? `1 USD = ${inverseRate} MXN` : `1 MXN = ${inverseRate} USD`;

            const latestDate = latest.date;
            const updatedStr = lastUpdated ? lastUpdated.toLocaleString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: 'numeric', minute: '2-digit', hour12: true
            }) : '—';
            const sourcesTags = dataSources.map(s =>
                `<span class="source-tag source-${s.toLowerCase()}">${s}</span>`
            ).join(' ');

            const color = '#10b981';

            document.getElementById('content').innerHTML = `
                <div class="data-status">
                    <div>Latest data: <strong>${latestDate}</strong> &bull; Updated: <strong>${updatedStr}</strong></div>
                    <div>Sources: ${sourcesTags}</div>
                </div>
                <div class="price-hero">
                    <div>
                        <div class="pair-label"><span class="flag-pair">🇲🇽🇺🇸</span> ${pairLabel}</div>
                        <span class="current-price">${currencySymbol}${latestRate.toFixed(decimals)}</span>
                        <div class="inverse-rate">${inverseLabel}</div>
                    </div>
                    <div class="price-change ${isUp ? 'up' : 'down'}">
                        ${isUp ? '&#9650;' : '&#9660;'}
                        ${change >= 0 ? '+' : ''}${change.toFixed(decimals)}
                        (${pctChange >= 0 ? '+' : ''}${pctChange.toFixed(2)}%)
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="rateChart"></canvas>
                    <div id="chartError" style="color:#f87171;font-size:13px;text-align:center;margin-top:8px;"></div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="label">High</div>
                        <div class="value green">${currencySymbol}${high.toFixed(decimals)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Low</div>
                        <div class="value red">${currencySymbol}${low.toFixed(decimals)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Average</div>
                        <div class="value blue">${currencySymbol}${avg.toFixed(decimals)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Volatility</div>
                        <div class="value purple">${volatility.toFixed(2)}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">30-Day Change</div>
                        <div class="value ${monthChange >= 0 ? 'green' : 'red'}">${monthChange >= 0 ? '+' : ''}${monthChange.toFixed(2)}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Spread (H-L)</div>
                        <div class="value amber">${currencySymbol}${(high - low).toFixed(decimals)}</div>
                    </div>
                </div>

                <div class="recent-table">
                    <h3>Recent Exchange Rates</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Rate</th>
                                <th>Change</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rates.slice(-15).reverse().map((r, i, arr) => {
                                const displayRate = getDisplayRate(r.rate);
                                const next = i < arr.length - 1 ? arr[i + 1] : null;
                                const nextRate = next ? getDisplayRate(next.rate) : null;
                                const dayChange = nextRate ? displayRate - nextRate : 0;
                                const dayPct = nextRate ? (dayChange / nextRate) * 100 : 0;
                                const cls = dayChange >= 0 ? 'up' : 'down';
                                return `<tr>
                                    <td>${r.date}</td>
                                    <td><strong>${currencySymbol}${displayRate.toFixed(decimals)}</strong></td>
                                    <td class="price-change ${cls}">
                                        ${dayChange >= 0 ? '+' : ''}${dayChange.toFixed(decimals)}
                                        (${dayPct >= 0 ? '+' : ''}${dayPct.toFixed(2)}%)
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            try {
                renderChart(rates, color, decimals, currencySymbol);
            } catch (e) {
                document.getElementById('chartError').textContent = 'Chart error: ' + e.message;
            }
        }

        function formatDateLabel(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return months[d.getMonth()] + ' ' + d.getDate();
        }

        function renderChart(rates, color, decimals, symbol) {
            const canvas = document.getElementById('rateChart');
            if (!canvas) return;

            // Draw chart manually on canvas (no Chart.js dependency)
            if (chart && chart.destroy) chart.destroy();

            const parent = canvas.parentElement;
            const w = parent.clientWidth - 48; // padding
            const h = parent.clientHeight - 48;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';

            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);

            const data = rates.map(r => getDisplayRate(r.rate));
            const labels = rates.map(r => r.date);
            const minVal = Math.min(...data);
            const maxVal = Math.max(...data);
            const range = maxVal - minVal || 0.001;
            const padTop = 30;
            const padBottom = 40;
            const padLeft = 70;
            const padRight = 20;
            const chartW = w - padLeft - padRight;
            const chartH = h - padTop - padBottom;

            // Grid lines and Y-axis labels
            ctx.strokeStyle = '#2d304040';
            ctx.fillStyle = '#8b8fa3';
            ctx.font = '11px -apple-system, sans-serif';
            ctx.textAlign = 'right';
            const ySteps = 5;
            for (let i = 0; i <= ySteps; i++) {
                const y = padTop + (chartH / ySteps) * i;
                const val = maxVal - (range / ySteps) * i;
                ctx.beginPath();
                ctx.setLineDash([4, 4]);
                ctx.moveTo(padLeft, y);
                ctx.lineTo(w - padRight, y);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillText(symbol + val.toFixed(decimals), padLeft - 8, y + 4);
            }

            // X-axis labels
            ctx.textAlign = 'center';
            const xLabelCount = Math.min(8, data.length);
            for (let i = 0; i < xLabelCount; i++) {
                const idx = Math.round((data.length - 1) * i / (xLabelCount - 1));
                const x = padLeft + (chartW * idx / (data.length - 1));
                ctx.fillText(formatDateLabel(labels[idx]), x, h - 8);
            }

            // Area fill
            const gradient = ctx.createLinearGradient(0, padTop, 0, padTop + chartH);
            gradient.addColorStop(0, color + '40');
            gradient.addColorStop(1, color + '05');

            ctx.beginPath();
            ctx.moveTo(padLeft, padTop + chartH);
            for (let i = 0; i < data.length; i++) {
                const x = padLeft + (chartW * i / (data.length - 1));
                const y = padTop + chartH - ((data[i] - minVal) / range) * chartH;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(padLeft + chartW, padTop + chartH);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();

            // Line
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.lineJoin = 'round';
            for (let i = 0; i < data.length; i++) {
                const x = padLeft + (chartW * i / (data.length - 1));
                const y = padTop + chartH - ((data[i] - minVal) / range) * chartH;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Store reference for cleanup
            chart = { destroy: () => {} };
        }

        // Initial load
        fetchRates();
    </script>
</body>
</html>
