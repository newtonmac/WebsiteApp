<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Price Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1d28, #252836);
            padding: 24px 32px;
            border-bottom: 1px solid #2d3040;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #f97316, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #8b8fa3;
            margin-top: 4px;
            font-size: 14px;
        }

        .nav-links { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .btn-group {
            display: flex;
            background: #1a1d28;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2d3040;
        }

        .btn-group button {
            padding: 10px 20px;
            background: transparent;
            color: #8b8fa3;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-group button.active {
            background: #f97316;
            color: white;
        }

        .btn-group button:hover:not(.active) {
            color: #e1e4e8;
            background: #252836;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: #1a1d28;
            color: #8b8fa3;
            border: 1px solid #2d3040;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            margin-left: auto;
        }

        .refresh-btn:hover {
            background: #252836;
            color: #e1e4e8;
        }

        .price-hero {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 24px;
            padding: 24px;
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
        }

        .price-hero .current-price {
            font-size: 48px;
            font-weight: 700;
        }

        .price-hero .price-change {
            font-size: 18px;
            font-weight: 600;
        }

        .price-hero .price-change.up { color: #34d399; }
        .price-hero .price-change.down { color: #f87171; }

        .price-hero .asset-label {
            font-size: 16px;
            color: #8b8fa3;
        }

        .chart-container {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
            position: relative;
            height: 350px;
            margin-bottom: 24px;
        }

        .chart-container canvas {
            max-height: 400px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 13px;
            color: #8b8fa3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value { font-size: 24px; font-weight: 700; }
        .stat-card .value.green { color: #34d399; }
        .stat-card .value.red { color: #f87171; }
        .stat-card .value.blue { color: #60a5fa; }
        .stat-card .value.purple { color: #a78bfa; }

        .recent-table {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 24px;
        }

        .recent-table h3 { margin-bottom: 16px; font-size: 18px; }

        .recent-table table { width: 100%; border-collapse: collapse; }

        .recent-table th {
            text-align: left;
            padding: 10px 12px;
            color: #8b8fa3;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2d3040;
        }

        .recent-table td {
            padding: 12px;
            border-bottom: 1px solid #1e2130;
            font-size: 14px;
        }

        .recent-table tr:last-child td { border-bottom: none; }

        .loading {
            text-align: center;
            padding: 60px;
            color: #8b8fa3;
            font-size: 16px;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2d3040;
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: #1a1d28;
            border: 1px solid #f8717133;
            color: #f87171;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .data-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 20px;
            background: #1a1d28;
            border-radius: 12px;
            border: 1px solid #2d3040;
            margin-bottom: 24px;
            font-size: 13px;
            color: #8b8fa3;
        }

        .data-status .source-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-status .source-yahoo { background: #6d28d920; color: #c084fc; }
        .data-status .source-twelvedata { background: #10b98120; color: #34d399; }

        .nav-link {
            display: inline-block;
            padding: 6px 14px;
            background: #252836;
            color: #60a5fa;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #2d3040;
            transition: all 0.2s;
        }
        .nav-link:hover { background: #2d3040; color: #a78bfa; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Bitcoin Price Tracker</h1>
        <p>Live data &bull; Yahoo Finance &bull; Updated daily</p>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Oil Tracker</a>
            <a href="gold-tracker.html" class="nav-link">Gold Tracker</a>
            <a href="silver-tracker.html" class="nav-link">Silver Tracker</a>
            <a href="flight-tracker.html" class="nav-link">Flight Tracker</a>
        </div>
    </div>

    <div class="container">
        <div class="controls">
            <div class="btn-group" id="timeRange">
                <button data-range="7">1W</button>
                <button class="active" data-range="30">1M</button>
                <button data-range="90">3M</button>
                <button data-range="180">6M</button>
                <button data-range="365">1Y</button>
            </div>
            <button class="refresh-btn" id="refreshBtn">&#x21bb; Refresh</button>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Loading live bitcoin prices...
            </div>
        </div>
    </div>

    <script>
        let btcPrices = [];
        let selectedRange = 30;
        let chart = null;
        let lastUpdated = null;

        document.querySelectorAll('#timeRange button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#timeRange button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRange = parseInt(btn.dataset.range);
                render();
            });
        });

        document.getElementById('refreshBtn').addEventListener('click', fetchPrices);

        const TWELVE_DATA_KEY = '52f351e2d67042889eb1c6d16cd9769f';

        async function fetchTwelveData(symbol) {
            try {
                const resp = await fetch(
                    'https://api.twelvedata.com/time_series?symbol=' + encodeURIComponent(symbol) +
                    '&interval=1day&outputsize=365&apikey=' + TWELVE_DATA_KEY
                );
                const json = await resp.json();
                if (json.values) {
                    return json.values
                        .filter(d => d.close && d.close !== 'null')
                        .map(d => ({ date: d.datetime, price: parseFloat(d.close), source: 'TwelveData' }))
                        .sort((a, b) => a.date.localeCompare(b.date));
                }
            } catch (e) {
                console.warn('Twelve Data fetch failed:', e.message);
            }
            return [];
        }

        function mergePrices(...priceSets) {
            const dateMap = new Map();
            priceSets.forEach(prices => {
                prices.forEach(p => {
                    if (!dateMap.has(p.date)) dateMap.set(p.date, p);
                });
            });
            return Array.from(dateMap.values()).sort((a, b) => a.date.localeCompare(b.date));
        }

        async function fetchYahooFinance(symbol, range) {
            const resp = await fetch(
                'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(symbol) +
                '?range=' + range + '&interval=1d'
            );
            const json = await resp.json();
            if (json.chart && json.chart.result && json.chart.result[0]) {
                const result = json.chart.result[0];
                const timestamps = result.timestamp || [];
                const closes = result.indicators.quote[0].close || [];
                return timestamps.map((ts, i) => {
                    const d = new Date(ts * 1000);
                    const dateStr = d.toISOString().split('T')[0];
                    return { date: dateStr, price: closes[i], source: 'Yahoo' };
                }).filter(p => p.price != null && !isNaN(p.price));
            }
            return [];
        }

        async function fetchPrices() {
            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading bitcoin prices from Yahoo Finance...
                </div>`;

            try {
                const [yahooResult, tdResult] = await Promise.allSettled([
                    fetchYahooFinance('BTC-USD', '1y'),
                    fetchTwelveData('BTC/USD')
                ]);
                const val = r => r.status === 'fulfilled' ? r.value : [];
                const yahooData = val(yahooResult);
                const tdData = val(tdResult);

                const sources = [];
                if (yahooData.length > 0) sources.push('Yahoo');
                if (tdData.length > 0) sources.push('TwelveData');

                btcPrices = mergePrices(yahooData, tdData);
                btcPrices._sources = sources;
                lastUpdated = new Date();

                if (btcPrices.length === 0) {
                    document.getElementById('content').innerHTML = `
                        <div class="error-msg">
                            Unable to fetch bitcoin prices. Check your connection.
                        </div>`;
                    return;
                }
                render();
            } catch (err) {
                document.getElementById('content').innerHTML = `
                    <div class="error-msg">
                        Error fetching data: ${err.message}
                    </div>`;
            }
        }

        function getFilteredPrices() {
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - selectedRange);
            return btcPrices.filter(p => new Date(p.date) >= cutoff);
        }

        function formatPrice(val) {
            return val >= 1000 ? '$' + val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '$' + val.toFixed(2);
        }

        function render() {
            const prices = getFilteredPrices();
            if (prices.length === 0) return;

            const latest = prices[prices.length - 1];
            const prev = prices.length >= 2 ? prices[prices.length - 2] : null;
            const change = prev ? latest.price - prev.price : 0;
            const pctChange = prev ? (change / prev.price) * 100 : 0;
            const isUp = change >= 0;

            const high = Math.max(...prices.map(p => p.price));
            const low = Math.min(...prices.map(p => p.price));
            const avg = prices.reduce((s, p) => s + p.price, 0) / prices.length;
            const variance = prices.reduce((s, p) => s + Math.pow(p.price - avg, 2), 0) / (prices.length - 1);
            const volatility = (Math.sqrt(variance) / avg) * 100;

            const updatedStr = lastUpdated ? lastUpdated.toLocaleString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: 'numeric', minute: '2-digit', hour12: true
            }) : '—';

            document.getElementById('content').innerHTML = `
                <div class="data-status">
                    <div>Latest: <strong>${latest.date}</strong> &bull; Updated: <strong>${updatedStr}</strong></div>
                    <div>Sources: ${(btcPrices._sources || ['Yahoo']).map(s =>
                        '<span class="source-tag source-' + s.toLowerCase() + '">' + s + '</span>'
                    ).join(' ')}</div>
                </div>
                <div class="price-hero">
                    <div>
                        <div class="asset-label">Bitcoin (BTC-USD)</div>
                        <span class="current-price">${formatPrice(latest.price)}</span>
                    </div>
                    <div class="price-change ${isUp ? 'up' : 'down'}">
                        ${isUp ? '&#9650;' : '&#9660;'}
                        ${change >= 0 ? '+' : ''}${formatPrice(Math.abs(change)).replace('$', change < 0 ? '-$' : '$')}
                        (${pctChange >= 0 ? '+' : ''}${pctChange.toFixed(2)}%)
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="label">High</div>
                        <div class="value green">${formatPrice(high)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Low</div>
                        <div class="value red">${formatPrice(low)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Average</div>
                        <div class="value blue">${formatPrice(avg)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Volatility</div>
                        <div class="value purple">${volatility.toFixed(2)}%</div>
                    </div>
                </div>

                <div class="recent-table">
                    <h3>Recent Prices</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Price</th>
                                <th>Change</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${prices.slice(-15).reverse().map((p, i, arr) => {
                                const next = i < arr.length - 1 ? arr[i + 1] : null;
                                const dayChange = next ? p.price - next.price : 0;
                                const dayPct = next ? (dayChange / next.price) * 100 : 0;
                                const cls = dayChange >= 0 ? 'up' : 'down';
                                return `<tr>
                                    <td>${p.date}</td>
                                    <td><strong>${formatPrice(p.price)}</strong></td>
                                    <td class="price-change ${cls}">
                                        ${dayChange >= 0 ? '+' : ''}${dayChange.toFixed(2)}
                                        (${dayPct >= 0 ? '+' : ''}${dayPct.toFixed(2)}%)
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            renderChart(prices);
        }

        function renderChart(prices) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            const color = '#f97316';

            if (chart) chart.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, color + '40');
            gradient.addColorStop(1, color + '05');

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: prices.map(p => p.date),
                    datasets: [{
                        label: 'Price (USD)',
                        data: prices.map(p => p.price),
                        borderColor: color,
                        backgroundColor: gradient,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHitRadius: 10,
                        pointHoverRadius: 5,
                        pointHoverBackgroundColor: color
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#252836',
                            titleColor: '#e1e4e8',
                            bodyColor: '#e1e4e8',
                            borderColor: '#2d3040',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: ctx => '$' + ctx.parsed.y.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                parser: 'yyyy-MM-dd',
                                tooltipFormat: 'MMM d, yyyy',
                                displayFormats: { day: 'MMM d', week: 'MMM d', month: 'MMM yyyy' }
                            },
                            grid: { color: '#2d304040', drawBorder: false },
                            ticks: { color: '#8b8fa3', maxTicksLimit: 8 }
                        },
                        y: {
                            grid: { color: '#2d304040', drawBorder: false },
                            ticks: {
                                color: '#8b8fa3',
                                callback: v => '$' + v.toLocaleString()
                            }
                        }
                    }
                }
            });
        }

        fetchPrices();
    </script>
</body>
</html>
