<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Crude Oil Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
        }

        .header {
            background: linear-gradient(135deg, #1a1d28, #252836);
            padding: 20px 16px;
            border-bottom: 1px solid #2d3040;
            text-align: center;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p { color: #8b8fa3; margin-top: 4px; font-size: 12px; }

        .container { max-width: 800px; margin: 0 auto; padding: 16px; }

        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

        .controls-row { display: flex; gap: 8px; align-items: center; }

        .btn-group {
            display: flex;
            background: #1a1d28;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2d3040;
            flex: 1;
        }

        .btn-group button {
            flex: 1;
            padding: 10px 8px;
            background: transparent;
            color: #8b8fa3;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-group button.active {
            background: #3b82f6;
            color: white;
        }

        .btn-group button:hover:not(.active) {
            color: #e1e4e8;
            background: #252836;
        }

        .refresh-btn {
            padding: 10px 16px;
            background: #1a1d28;
            color: #8b8fa3;
            border: 1px solid #2d3040;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            -webkit-tap-highlight-color: transparent;
        }

        .price-hero {
            padding: 20px;
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            margin-bottom: 16px;
            text-align: center;
        }

        .oil-label { font-size: 14px; color: #8b8fa3; margin-bottom: 4px; }

        .current-price { font-size: 42px; font-weight: 700; display: block; }

        .price-change { font-size: 16px; font-weight: 600; margin-top: 4px; display: block; }
        .price-change.up { color: #34d399; }
        .price-change.down { color: #f87171; }

        .chart-box {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 16px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        canvas { width: 100% !important; height: 280px !important; display: block; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: #1a1d28;
            border-radius: 12px;
            border: 1px solid #2d3040;
            padding: 16px;
        }

        .stat-card .label {
            font-size: 11px;
            color: #8b8fa3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .stat-card .value { font-size: 20px; font-weight: 700; }
        .stat-card .value.green { color: #34d399; }
        .stat-card .value.red { color: #f87171; }
        .stat-card .value.blue { color: #60a5fa; }
        .stat-card .value.purple { color: #a78bfa; }

        .recent-table {
            background: #1a1d28;
            border-radius: 16px;
            border: 1px solid #2d3040;
            padding: 16px;
        }

        .recent-table h3 { margin-bottom: 12px; font-size: 16px; }

        .recent-table table { width: 100%; border-collapse: collapse; }

        .recent-table th {
            text-align: left;
            padding: 8px 6px;
            color: #8b8fa3;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2d3040;
        }

        .recent-table td {
            padding: 10px 6px;
            border-bottom: 1px solid #1e2130;
            font-size: 13px;
        }

        .recent-table tr:last-child td { border-bottom: none; }
        .recent-table .up { color: #34d399; }
        .recent-table .down { color: #f87171; }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #8b8fa3;
        }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #2d3040;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: #1a1d28;
            border: 1px solid #f8717133;
            color: #f87171;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 13px;
            text-align: center;
        }

        .data-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 16px;
            background: #1a1d28;
            border-radius: 10px;
            border: 1px solid #2d3040;
            margin-bottom: 16px;
            font-size: 11px;
            color: #8b8fa3;
        }

        .data-status .source-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-status .source-eia { background: #3b82f620; color: #60a5fa; }
        .data-status .source-fred { background: #f59e0b20; color: #fbbf24; }
        .data-status .source-alphavantage { background: #8b5cf620; color: #a78bfa; }
        .data-status .source-yahoo { background: #6d28d920; color: #c084fc; }
        .data-status .source-twelvedata { background: #10b98120; color: #34d399; }

        .nav-link {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 14px;
            background: #252836;
            color: #60a5fa;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #2d3040;
            transition: all 0.2s;
        }
        .nav-link:hover { background: #2d3040; color: #a78bfa; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Crude Oil Tracker</h1>
        <p>Live data &bull; EIA, FRED, Alpha Vantage, Yahoo &amp; Twelve Data &bull; Updated daily</p>
        <div style="margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap;">
            <a href="gold-tracker.html" class="nav-link">Gold Tracker</a>
            <a href="silver-tracker.html" class="nav-link">Silver Tracker</a>
            <a href="bitcoin-tracker.html" class="nav-link">Bitcoin Tracker</a>
            <a href="flight-tracker.html" class="nav-link">Flight Tracker</a>

    </div>

    <div class="container">
        <div class="controls">
            <div class="controls-row">
                <div class="btn-group" id="oilType">
                    <button class="active" data-type="wti">WTI</button>
                    <button data-type="brent">Brent</button>
                    <button data-type="canadian">Canada</button>
                    <button data-type="maya">Maya</button>
                </div>
                <button class="refresh-btn" id="refreshBtn">&#8635;</button>
            </div>
            <div class="btn-group" id="timeRange">
                <button data-range="7">1W</button>
                <button class="active" data-range="30">1M</button>
                <button data-range="90">3M</button>
                <button data-range="180">6M</button>
                <button data-range="365">1Y</button>
            </div>
        </div>
        <div id="content">
            <div class="loading"><div class="spinner"></div>Loading live prices...</div>
        </div>
    </div>

<script>
// ---- Minimal canvas chart (no external libraries) ----
function drawChart(canvasId, prices, color) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = rect.height;

    const vals = prices.map(p => p.price);
    const minV = Math.min(...vals);
    const maxV = Math.max(...vals);
    const range = maxV - minV || 1;
    const padTop = 20, padBot = 30, padLeft = 50, padRight = 16;
    const chartW = W - padLeft - padRight;
    const chartH = H - padTop - padBot;

    ctx.clearRect(0, 0, W, H);

    // Grid lines & Y labels
    ctx.strokeStyle = '#2d304060';
    ctx.fillStyle = '#8b8fa3';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textAlign = 'right';
    const ySteps = 5;
    for (let i = 0; i <= ySteps; i++) {
        const y = padTop + (chartH / ySteps) * i;
        const val = maxV - (range / ySteps) * i;
        ctx.beginPath();
        ctx.setLineDash([4, 4]);
        ctx.moveTo(padLeft, y);
        ctx.lineTo(W - padRight, y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillText('$' + val.toFixed(0), padLeft - 8, y + 4);
    }

    // X labels
    ctx.textAlign = 'center';
    const labelCount = Math.min(5, prices.length);
    for (let i = 0; i < labelCount; i++) {
        const idx = Math.floor(i * (prices.length - 1) / (labelCount - 1));
        const x = padLeft + (idx / (prices.length - 1)) * chartW;
        const d = new Date(prices[idx].date);
        const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        ctx.fillText(label, x, H - 8);
    }

    if (prices.length < 2) return;

    // Build path points
    const points = prices.map((p, i) => ({
        x: padLeft + (i / (prices.length - 1)) * chartW,
        y: padTop + (1 - (p.price - minV) / range) * chartH
    }));

    // Area fill
    const grad = ctx.createLinearGradient(0, padTop, 0, padTop + chartH);
    grad.addColorStop(0, color + '35');
    grad.addColorStop(1, color + '05');
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
        const prev = points[i - 1];
        const curr = points[i];
        const cpx = (prev.x + curr.x) / 2;
        ctx.bezierCurveTo(cpx, prev.y, cpx, curr.y, curr.x, curr.y);
    }
    ctx.lineTo(points[points.length - 1].x, padTop + chartH);
    ctx.lineTo(points[0].x, padTop + chartH);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Line
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
        const prev = points[i - 1];
        const curr = points[i];
        const cpx = (prev.x + curr.x) / 2;
        ctx.bezierCurveTo(cpx, prev.y, cpx, curr.y, curr.x, curr.y);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Latest dot
    const last = points[points.length - 1];
    ctx.beginPath();
    ctx.arc(last.x, last.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#0f1117';
    ctx.lineWidth = 2;
    ctx.stroke();
}

// ---- App logic ----
const API_KEY = 'q9kHzRa6tXnuEZOOPw0bbsdgfu9Mq5J0FJmIOrj6';
const EIA_SPOT = 'https://api.eia.gov/v2/petroleum/pri/spt/data/';
const EIA_IMPORT = 'https://api.eia.gov/v2/petroleum/pri/imc2/data/';
const FRED_KEY = 'b157e132862f8b31185abd4da930b21a';
const FRED_BASE = 'https://api.stlouisfed.org/fred/series/observations';

// Alpha Vantage: https://www.alphavantage.co/support/#api-key (25 req/day free)
const ALPHA_VANTAGE_KEY = 'T01QSR206V2E0IR2';

let wtiPrices = [];
let brentPrices = [];
let canadianPrices = [];
let mayaPrices = [];
let selectedType = 'wti';
let selectedRange = 30;
let lastUpdated = null;
let dataSources = [];

document.querySelectorAll('#oilType button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#oilType button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedType = btn.dataset.type;
        render();
    });
});

document.querySelectorAll('#timeRange button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#timeRange button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRange = parseInt(btn.dataset.range);
        render();
    });
});

document.getElementById('refreshBtn').addEventListener('click', fetchAllPrices);

async function fetchEIASeries(seriesId) {
    const params = new URLSearchParams({
        api_key: API_KEY,
        frequency: 'daily',
        'data[0]': 'value',
        'sort[0][column]': 'period',
        'sort[0][direction]': 'desc',
        length: '365'
    });
    params.append('facets[series][]', seriesId);

    const resp = await fetch(EIA_SPOT + '?' + params.toString());
    const json = await resp.json();

    if (json.response && json.response.data) {
        return json.response.data
            .filter(d => d.value != null && d.value !== '')
            .map(d => ({ date: d.period, price: parseFloat(d.value), source: 'EIA' }))
            .reverse();
    }
    return [];
}

async function fetchEIAImportSeries(seriesId) {
    const params = new URLSearchParams({
        api_key: API_KEY,
        frequency: 'monthly',
        'data[0]': 'value',
        'sort[0][column]': 'period',
        'sort[0][direction]': 'desc',
        length: '36'
    });
    params.append('facets[series][]', seriesId);

    const resp = await fetch(EIA_IMPORT + '?' + params.toString());
    const json = await resp.json();

    if (json.response && json.response.data) {
        return json.response.data
            .filter(d => d.value != null && d.value !== '')
            .map(d => ({ date: d.period.length === 7 ? d.period + '-01' : d.period, price: parseFloat(d.value), source: 'EIA' }))
            .reverse();
    }
    return [];
}

async function fetchFREDSeries(seriesId) {
    try {
        const oneYearAgo = new Date();
        oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
        const startDate = oneYearAgo.toISOString().split('T')[0];

        const params = new URLSearchParams({
            series_id: seriesId,
            api_key: FRED_KEY,
            file_type: 'json',
            observation_start: startDate,
            sort_order: 'asc'
        });

        const resp = await fetch(FRED_BASE + '?' + params.toString());
        const json = await resp.json();

        if (json.observations) {
            return json.observations
                .filter(d => d.value !== '.' && d.value != null)
                .map(d => ({ date: d.date, price: parseFloat(d.value), source: 'FRED' }));
        }
    } catch (e) {
        console.warn('FRED fetch failed:', e.message);
    }
    return [];
}

// Alpha Vantage - daily commodity prices with history
async function fetchAlphaVantage(func) {
    try {
        const resp = await fetch(
            'https://www.alphavantage.co/query?function=' + func +
            '&interval=daily&apikey=' + ALPHA_VANTAGE_KEY
        );
        const json = await resp.json();
        if (json.data) {
            return json.data
                .filter(d => d.value && d.value !== '.')
                .map(d => ({ date: d.date, price: parseFloat(d.value), source: 'AlphaVantage' }))
                .sort((a, b) => a.date.localeCompare(b.date));
        }
    } catch (e) {
        console.warn('Alpha Vantage fetch failed:', e.message);
    }
    return [];
}

// Twelve Data API
const TWELVE_DATA_KEY = '52f351e2d67042889eb1c6d16cd9769f';

async function fetchTwelveData(symbol) {
    try {
        const resp = await fetch(
            'https://api.twelvedata.com/time_series?symbol=' + encodeURIComponent(symbol) +
            '&interval=1day&outputsize=365&apikey=' + TWELVE_DATA_KEY
        );
        const json = await resp.json();
        if (json.values) {
            return json.values
                .filter(d => d.close && d.close !== 'null')
                .map(d => ({ date: d.datetime, price: parseFloat(d.close), source: 'TwelveData' }))
                .sort((a, b) => a.date.localeCompare(b.date));
        }
    } catch (e) {
        console.warn('Twelve Data fetch failed:', e.message);
    }
    return [];
}

// Yahoo Finance - daily commodity prices
async function fetchYahooFinance(symbol) {
    try {
        const resp = await fetch(
            'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(symbol) +
            '?range=1y&interval=1d'
        );
        const json = await resp.json();
        if (json.chart && json.chart.result && json.chart.result[0]) {
            const result = json.chart.result[0];
            const timestamps = result.timestamp || [];
            const closes = result.indicators.quote[0].close || [];
            return timestamps.map((ts, i) => {
                const d = new Date(ts * 1000);
                const dateStr = d.toISOString().split('T')[0];
                return { date: dateStr, price: closes[i], source: 'Yahoo' };
            }).filter(p => p.price != null && !isNaN(p.price));
        }
    } catch (e) {
        console.warn('Yahoo Finance fetch failed:', e.message);
    }
    return [];
}

function mergePrices(...priceSets) {
    const dateMap = new Map();
    // First set has highest priority, subsequent sets fill gaps
    priceSets.forEach(prices => {
        prices.forEach(p => {
            if (!dateMap.has(p.date)) {
                dateMap.set(p.date, p);
            }
        });
    });
    return Array.from(dateMap.values()).sort((a, b) => a.date.localeCompare(b.date));
}

async function fetchAllPrices() {
    document.getElementById('content').innerHTML =
        '<div class="loading"><div class="spinner"></div>Loading from multiple sources...</div>';

    try {
        dataSources = [];

        const [
            eiaWti, eiaBrent, fredWti, fredBrent, eiaCanadian, eiaMaya,
            avWti, avBrent, yahooWti, yahooBrent, tdWti, tdBrent
        ] = await Promise.allSettled([
            fetchEIASeries('RWTC'),
            fetchEIASeries('RBRTE'),
            fetchFREDSeries('DCOILWTICO'),
            fetchFREDSeries('DCOILBRENTEU'),
            fetchEIAImportSeries('I19263000004'),
            fetchEIAImportSeries('IMX2810004'),
            // Alpha Vantage (built-in commodity functions)
            fetchAlphaVantage('WTI'),
            fetchAlphaVantage('BRENT'),
            // Yahoo Finance
            fetchYahooFinance('CL=F'),
            fetchYahooFinance('BZ=F'),
            // Twelve Data
            fetchTwelveData('CL'),
            fetchTwelveData('BZ')
        ]);

        const val = r => r.status === 'fulfilled' ? r.value : [];

        const eiaWtiData = val(eiaWti);
        const eiaBrentData = val(eiaBrent);
        const fredWtiData = val(fredWti);
        const fredBrentData = val(fredBrent);
        const avWtiData = val(avWti);
        const avBrentData = val(avBrent);
        const yahooWtiData = val(yahooWti);
        const yahooBrentData = val(yahooBrent);
        const tdWtiData = val(tdWti);
        const tdBrentData = val(tdBrent);

        if (eiaWtiData.length > 0 || eiaBrentData.length > 0) dataSources.push('EIA');
        if (fredWtiData.length > 0 || fredBrentData.length > 0) dataSources.push('FRED');
        if (avWtiData.length > 0 || avBrentData.length > 0) dataSources.push('AlphaVantage');
        if (yahooWtiData.length > 0 || yahooBrentData.length > 0) dataSources.push('Yahoo');
        if (tdWtiData.length > 0 || tdBrentData.length > 0) dataSources.push('TwelveData');

        // Merge all sources: EIA first (most authoritative), then FRED, Alpha Vantage, Yahoo, Twelve Data
        wtiPrices = mergePrices(eiaWtiData, fredWtiData, avWtiData, yahooWtiData, tdWtiData);
        brentPrices = mergePrices(eiaBrentData, fredBrentData, avBrentData, yahooBrentData, tdBrentData);
        canadianPrices = val(eiaCanadian);
        mayaPrices = val(eiaMaya);

        if (canadianPrices.length > 0 || mayaPrices.length > 0) {
            if (!dataSources.includes('EIA')) dataSources.push('EIA');
        }

        lastUpdated = new Date();

        if (wtiPrices.length === 0 && brentPrices.length === 0 && canadianPrices.length === 0 && mayaPrices.length === 0) {
            document.getElementById('content').innerHTML =
                '<div class="error-msg">Unable to fetch data from any source. Check your connection.</div>';
            return;
        }
        render();
    } catch (err) {
        document.getElementById('content').innerHTML =
            '<div class="error-msg">Error: ' + err.message + '</div>';
    }
}

function getFiltered() {
    const typeMap = { wti: wtiPrices, brent: brentPrices, canadian: canadianPrices, maya: mayaPrices };
    const all = typeMap[selectedType] || wtiPrices;
    // Monthly data (canadian/maya) - show more points for a useful chart
    if (selectedType === 'canadian' || selectedType === 'maya') {
        const rangeToMonths = { 7: 6, 30: 12, 90: 18, 180: 24, 365: 36 };
        const months = rangeToMonths[selectedRange] || 12;
        return all.slice(-months);
    }
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - selectedRange);
    return all.filter(p => new Date(p.date) >= cutoff);
}

function render() {
    const prices = getFiltered();
    if (prices.length === 0) return;

    const latest = prices[prices.length - 1];
    const prev = prices.length >= 2 ? prices[prices.length - 2] : null;
    const change = prev ? latest.price - prev.price : 0;
    const pct = prev ? (change / prev.price) * 100 : 0;
    const isUp = change >= 0;

    const high = Math.max(...prices.map(p => p.price));
    const low = Math.min(...prices.map(p => p.price));
    const avg = prices.reduce((s, p) => s + p.price, 0) / prices.length;
    const variance = prices.reduce((s, p) => s + Math.pow(p.price - avg, 2), 0) / (prices.length - 1);
    const vol = (Math.sqrt(variance) / avg) * 100;

    const labels = { wti: 'WTI Crude Oil', brent: 'Brent Crude Oil', canadian: 'Canadian Light Sour Blend', maya: 'Mexican Maya Crude' };
    const colors = { wti: '#3b82f6', brent: '#f59e0b', canadian: '#ef4444', maya: '#10b981' };
    const label = labels[selectedType];
    const color = colors[selectedType];
    const isMonthly = selectedType === 'canadian' || selectedType === 'maya';

    const latestDate = latest.date;
    const updatedStr = lastUpdated ? lastUpdated.toLocaleString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true
    }) : '—';
    const sourcesTags = dataSources.map(s =>
        `<span class="source-tag source-${s.toLowerCase()}">${s}</span>`
    ).join(' ');

    document.getElementById('content').innerHTML = `
        <div class="data-status">
            <div>Latest data: <strong>${latestDate}</strong>${isMonthly ? ' (monthly)' : ''} &bull; Updated: <strong>${updatedStr}</strong></div>
            <div>Sources: ${sourcesTags}</div>
        </div>
        <div class="price-hero">
            <div class="oil-label">${label}</div>
            <span class="current-price">$${latest.price.toFixed(2)}</span>
            <span class="price-change ${isUp ? 'up' : 'down'}">
                ${isUp ? '\u25B2' : '\u25BC'}
                ${change >= 0 ? '+' : ''}${change.toFixed(2)}
                (${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%)
            </span>
        </div>

        <div class="chart-box">
            <canvas id="priceChart"></canvas>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="label">High</div><div class="value green">$${high.toFixed(2)}</div></div>
            <div class="stat-card"><div class="label">Low</div><div class="value red">$${low.toFixed(2)}</div></div>
            <div class="stat-card"><div class="label">Average</div><div class="value blue">$${avg.toFixed(2)}</div></div>
            <div class="stat-card"><div class="label">Volatility</div><div class="value purple">${vol.toFixed(2)}%</div></div>
        </div>

        <div class="recent-table">
            <h3>Recent Prices</h3>
            <table>
                <thead><tr><th>Date</th><th>Price</th><th>Change</th></tr></thead>
                <tbody>
                    ${prices.slice(-15).reverse().map((p, i, arr) => {
                        const nxt = i < arr.length - 1 ? arr[i + 1] : null;
                        const dc = nxt ? p.price - nxt.price : 0;
                        const dp = nxt ? (dc / nxt.price) * 100 : 0;
                        const cls = dc >= 0 ? 'up' : 'down';
                        return `<tr>
                            <td>${p.date}</td>
                            <td><strong>$${p.price.toFixed(2)}</strong></td>
                            <td class="${cls}">${dc >= 0 ? '+' : ''}${dc.toFixed(2)} (${dp >= 0 ? '+' : ''}${dp.toFixed(2)}%)</td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>
        </div>`;

    drawChart('priceChart', prices, color);
}

fetchAllPrices();
</script>
</body>
</html>
