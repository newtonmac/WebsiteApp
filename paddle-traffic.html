<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaddlePoint — Traffic</title>
<link rel="icon" type="image/svg+xml" href="paddle-pin.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh}
.header{display:flex;align-items:center;padding:16px 24px;border-bottom:1px solid #1e2030;justify-content:space-between}
.header h1{font-size:20px;font-weight:700;background:linear-gradient(90deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats{color:#8b8fa3;font-size:13px}
.container{max-width:1400px;margin:0 auto;padding:20px}
</style>
</head>
<body>
<style>
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:#1a1d28;border:1px solid #2d3040;border-radius:12px;padding:16px;text-align:center}
.kpi .num{font-size:28px;font-weight:800;color:#06b6d4}
.kpi .label{font-size:11px;color:#6b7080;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.kpi .sub{font-size:12px;color:#8b8fa3;margin-top:2px}
.section{background:#1a1d28;border:1px solid #2d3040;border-radius:12px;padding:20px;margin-bottom:16px}
.section h3{font-size:14px;color:#8b8fa3;margin-bottom:14px;text-transform:uppercase;letter-spacing:1px}
.chart-bar{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.chart-bar .bar-label{width:120px;font-size:13px;color:#e1e4e8;text-align:right;flex-shrink:0}
.chart-bar .bar-track{flex:1;height:24px;background:#252836;border-radius:6px;overflow:hidden;position:relative}
.chart-bar .bar-fill{height:100%;border-radius:6px;transition:width .5s ease}
.chart-bar .bar-val{font-size:12px;color:#8b8fa3;width:50px;text-align:right;flex-shrink:0}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}}
</style>
<style>
.day-chart{display:flex;align-items:flex-end;gap:3px;height:120px;padding:0 4px}
.day-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.day-col .day-bar{width:100%;min-width:16px;background:linear-gradient(180deg,#06b6d4,#3b82f6);border-radius:4px 4px 0 0;transition:height .4s ease;cursor:pointer;position:relative}
.day-col .day-bar:hover{opacity:.8}
.day-col .day-label{font-size:9px;color:#6b7080}
.day-col .day-val{font-size:10px;color:#8b8fa3;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:#6b7080;font-weight:600;border-bottom:1px solid #2d3040;font-size:11px;text-transform:uppercase}
td{padding:8px 10px;border-bottom:1px solid #1a1d28}
tr:hover{background:#1a1d28}
.flag{display:inline-block;width:16px;height:12px;border-radius:2px;margin-right:6px;vertical-align:middle}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.loading{text-align:center;padding:40px;color:#6b7080;font-size:14px}
#loginView{display:flex;align-items:center;justify-content:center;height:80vh;flex-direction:column;gap:16px}
#loginView input{background:#1a1d28;border:1px solid #2d3040;color:#e1e4e8;padding:12px 18px;border-radius:10px;font-size:15px;width:260px;text-align:center}
#loginView button{background:linear-gradient(135deg,#06b6d4,#8b5cf6);color:#fff;border:none;padding:12px 32px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
</style>

<div id="loginView">
    <h2 style="font-size:22px;font-weight:800;background:linear-gradient(90deg,#06b6d4,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">📊 Traffic Dashboard</h2>
    <p style="color:#6b7080;font-size:13px;">Enter admin password to view traffic stats</p>
    <input type="password" id="passInput" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Login</button>
</div>

<div id="dashboard" style="display:none;">
<div class="header">
    <h1>📊 PaddlePoint Traffic</h1>
    <div class="stats" id="headerStats">Loading...</div>
</div>
<div class="container">
    <!-- KPI Cards -->
    <div class="kpi-row" id="kpiRow"></div>

    <!-- Daily Chart -->
    <div class="section">
        <h3>Daily Visitors (Last 7 Days)</h3>
        <div class="day-chart" id="dailyChart"></div>
    </div>

    <div class="grid-2">
        <!-- Page Breakdown -->
        <div class="section">
            <h3>Page Views</h3>
            <div id="pageBreakdown"></div>
        </div>
        <!-- Top Cities -->
        <div class="section">
            <h3>Top Visitor Cities</h3>
            <div id="topCities"></div>
        </div>
    </div>

    <div class="grid-2">
        <!-- Countries -->
        <div class="section">
            <h3>Top Countries</h3>
            <div id="topCountries"></div>
        </div>
        <!-- Today's Live Activity -->
        <div class="section">
            <h3>Today's Activity by Page</h3>
            <table id="todayTable"><thead><tr><th>Page</th><th>Visitors</th><th>Top City</th></tr></thead><tbody></tbody></table>
        </div>
    </div>
</div>
</div>

<script>
const PASS='paddle2026';
const API='https://visitor-counter.newtonmac.workers.dev/stats';
const PAGES=['conditions','weather','clubs','events','gear','federations','home'];
const PAGE_NAMES={conditions:'Water Conditions',weather:'Weather',clubs:'Paddle Clubs',events:'Events',gear:'Gear',federations:'Federations',home:'Home'};
const PAGE_COLORS={conditions:'#06b6d4',weather:'#3b82f6',clubs:'#8b5cf6',events:'#f59e0b',gear:'#22c55e',federations:'#ec4899',home:'#f97316'};
let allData={};

function doLogin(){
    if(document.getElementById('passInput').value===PASS){
        document.getElementById('loginView').style.display='none';
        document.getElementById('dashboard').style.display='block';
        loadTraffic();
    } else alert('Wrong password');
}
if(new URLSearchParams(location.search).get('autologin')==='1'){document.getElementById('passInput').value=PASS;doLogin();}

async function loadTraffic(){
    const results = await Promise.all(PAGES.map(p=>
        fetch(`${API}?page=${p}`).then(r=>r.json()).catch(()=>({total:0,days:[]}))
    ));
    PAGES.forEach((p,i)=>allData[p]=results[i]);

    // Compute aggregates
    let totalAll=0, todayAll=0, yesterdayAll=0;
    const allCities={}, allCountries={}, dailyTotals={};

    PAGES.forEach(p=>{
        const d=allData[p];
        totalAll+=d.total||0;
        (d.days||[]).forEach(day=>{
            dailyTotals[day.date]=(dailyTotals[day.date]||0)+day.uniqueVisitors;
            Object.entries(day.cities||{}).forEach(([city,cnt])=>{
                allCities[city]=(allCities[city]||0)+cnt;
                const parts=city.split(', ');
                const country=parts[parts.length-1]||'Unknown';
                allCountries[country]=(allCountries[country]||0)+cnt;
            });
        });
    });

    const today=new Date().toISOString().slice(0,10);
    const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
    todayAll=dailyTotals[today]||0;
    yesterdayAll=dailyTotals[yesterday]||0;
    const uniqueCities=Object.keys(allCities).length;
    const uniqueCountries=Object.keys(allCountries).length;

    // KPI Cards
    document.getElementById('headerStats').textContent=`${totalAll} total visitors · ${uniqueCities} cities · ${uniqueCountries} countries`;
    document.getElementById('kpiRow').innerHTML=[
        kpi(todayAll,'Today','visitors'),
        kpi(yesterdayAll,'Yesterday','visitors'),
        kpi(totalAll,'All Time','total visitors'),
        kpi(uniqueCities,'Cities','unique locations'),
        kpi(uniqueCountries,'Countries','reached'),
        kpi(PAGES.reduce((best,p)=>{const t=allData[p].total||0;return t>best.t?{p,t}:best;},{p:'',t:0}).p?PAGE_NAMES[PAGES.reduce((best,p)=>{const t=allData[p].total||0;return t>best.t?{p,t}:best;},{p:'',t:0}).p]:'—','Top Page','most visited'),
    ].join('');

    // Daily Chart (last 7 days)
    const dates=[];
    for(let i=6;i>=0;i--){const d=new Date(Date.now()-i*86400000);dates.push(d.toISOString().slice(0,10));}
    const maxDay=Math.max(...dates.map(d=>dailyTotals[d]||0),1);
    document.getElementById('dailyChart').innerHTML=dates.map(d=>{
        const v=dailyTotals[d]||0;
        const h=Math.max((v/maxDay)*100,2);
        const dayName=new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'});
        const dateStr=new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
        return `<div class="day-col"><div class="day-val">${v}</div><div class="day-bar" style="height:${h}px" title="${dateStr}: ${v} visitors"></div><div class="day-label">${dayName}</div></div>`;
    }).join('');

    // Page Breakdown
    const pageData=PAGES.map(p=>({name:PAGE_NAMES[p],total:allData[p].total||0,color:PAGE_COLORS[p]})).sort((a,b)=>b.total-a.total);
    const maxPage=Math.max(...pageData.map(p=>p.total),1);
    document.getElementById('pageBreakdown').innerHTML=pageData.map(p=>
        `<div class="chart-bar"><div class="bar-label">${p.name}</div><div class="bar-track"><div class="bar-fill" style="width:${(p.total/maxPage)*100}%;background:${p.color}"></div></div><div class="bar-val">${p.total}</div></div>`
    ).join('');

    // Top Cities
    const cities=Object.entries(allCities).sort((a,b)=>b[1]-a[1]).slice(0,12);
    const maxCity=cities.length?cities[0][1]:1;
    document.getElementById('topCities').innerHTML=cities.map(([city,cnt])=>
        `<div class="chart-bar"><div class="bar-label" style="width:180px;font-size:12px;">${city.split(',')[0]}</div><div class="bar-track"><div class="bar-fill" style="width:${(cnt/maxCity)*100}%;background:#8b5cf6"></div></div><div class="bar-val">${cnt}</div></div>`
    ).join('');

    // Top Countries
    const COUNTRY_NAMES={'US':'🇺🇸 United States','MX':'🇲🇽 Mexico','CA':'🇨🇦 Canada','GB':'🇬🇧 United Kingdom','AU':'🇦🇺 Australia','NZ':'🇳🇿 New Zealand','DE':'🇩🇪 Germany','FR':'🇫🇷 France','ES':'🇪🇸 Spain','JP':'🇯🇵 Japan','BR':'🇧🇷 Brazil','IN':'🇮🇳 India','SG':'🇸🇬 Singapore'};
    const countries=Object.entries(allCountries).sort((a,b)=>b[1]-a[1]).slice(0,10);
    const maxCountry=countries.length?countries[0][1]:1;
    document.getElementById('topCountries').innerHTML=countries.map(([code,cnt])=>
        `<div class="chart-bar"><div class="bar-label" style="width:160px;font-size:12px;">${COUNTRY_NAMES[code]||code}</div><div class="bar-track"><div class="bar-fill" style="width:${(cnt/maxCountry)*100}%;background:#f59e0b"></div></div><div class="bar-val">${cnt}</div></div>`
    ).join('');

    // Today's Activity Table
    const tbody=document.querySelector('#todayTable tbody');
    tbody.innerHTML=PAGES.map(p=>{
        const d=allData[p];
        const todayData=(d.days||[]).find(dy=>dy.date===today);
        const visitors=todayData?todayData.uniqueVisitors:0;
        const topCity=todayData?Object.entries(todayData.cities||{}).sort((a,b)=>b[1]-a[1])[0]:null;
        return `<tr><td><span class="dot" style="background:${PAGE_COLORS[p]}"></span>${PAGE_NAMES[p]}</td><td style="font-weight:700;color:#06b6d4;">${visitors}</td><td style="color:#8b8fa3;">${topCity?topCity[0].split(',')[0]:'—'}</td></tr>`;
    }).sort((a,b)=>0).join('');
}

function kpi(val,label,sub){
    return `<div class="kpi"><div class="num">${val}</div><div class="label">${label}</div><div class="sub">${sub}</div></div>`;
}
</script>
</body>
</html>
